# Apply migrations/009_rls_batch3.sql to live Postgres.
#
# Extends M1.6 RLS to the RFQ family (5 tables):
#
#   rfqs                  (root; buyer-created)
#   rfq_items             (line items, parent rfqs)
#   rfq_supplier_targets  (junction; buyer-tagged)
#   rfq_responses         (supplier replies; buyer-tagged for now)
#   rfq_response_items    (2-hop chain via response -> rfq)
#
# Same shape as 007 / 008:
#   * Idempotent migration file.
#   * Parallel-run policy with NULL escape.
#   * Pre-flight verifies migration 003 helpers exist.
#   * Default mode is DRY-RUN. Re-run with `-f confirm=BATCH3_RLS_APPLY`
#     to commit.
#
# Tenant convention: all 5 rows carry the BUYER's tenant_id (derived
# from rfqs.user_id). Suppliers see junction + response rows via the
# parallel-run NULL escape. The strict policy in Phase 7 will need a
# supplier_id-aware extension -- deferred.
#
# Rollback: psql against the same DB with `ALTER TABLE <t> DISABLE ROW
# LEVEL SECURITY; DROP POLICY <t>_tenant_isolation ON <t>; ALTER TABLE
# <t> DROP COLUMN tenant_id;` for each of the 5 tables.

name: Apply Migration 009 (Batch 3 RLS)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "DRY-RUN by default. Type BATCH3_RLS_APPLY to commit migration 009 to live Postgres."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      CONFIRM:        ${{ inputs.confirm }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Resolve mode
        run: |
          if [ "$CONFIRM" = "BATCH3_RLS_APPLY" ]; then
            echo "MODE=apply" >> $GITHUB_ENV
            echo "=== APPLY MODE -- migration 009 will be committed to live Postgres ==="
          else
            echo "MODE=dryrun" >> $GITHUB_ENV
            echo "=== DRY-RUN MODE -- migration 009 will be parsed + previewed only ==="
            echo "Re-run with -f confirm=BATCH3_RLS_APPLY to commit."
          fi

      - name: Verify migration file exists
        run: |
          test -f migrations/009_rls_batch3.sql
          echo "OK: migrations/009_rls_batch3.sql present"
          wc -l migrations/009_rls_batch3.sql

      - name: Resolve solarpro-postgres
        id: pg
        run: |
          set -e
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/postgres?limit=20" -o /tmp/pg.json
          PG_ID=$(python3 -c "
          import json
          d=json.load(open('/tmp/pg.json'))
          for item in (d if isinstance(d,list) else []):
              pg=item.get('postgres', item)
              if pg.get('name')=='solarpro-postgres':
                  print(pg.get('id','')); break
          ")
          if [ -z "$PG_ID" ]; then
            echo "::error::solarpro-postgres not found"; exit 1
          fi
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/postgres/$PG_ID/connection-info" -o /tmp/conn.json
          EXT=$(python3 -c "import json; print(json.load(open('/tmp/conn.json')).get('externalConnectionString',''))")
          echo "::add-mask::$EXT"
          echo "external=$EXT" >> $GITHUB_OUTPUT

      - name: Pre-flight -- migration 003 helpers present
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
        run: |
          set -e
          HELPER_COUNT=$(psql "$DATABASE_URL" -A -t -c \
            "SELECT COUNT(*) FROM pg_proc WHERE proname IN ('current_tenant_id','_phase4_user_to_tenant')")
          if [ "$HELPER_COUNT" -lt "2" ]; then
            echo "::error::Pre-flight failed: migration 003 helpers missing ($HELPER_COUNT found)."
            echo "Apply migration 003 first via the Apply Keycloak Migrations workflow."
            exit 1
          fi
          echo "OK: migration 003 helpers present (current_tenant_id + _phase4_user_to_tenant)."

      - name: Pre-flight -- count current RFQ rows
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
        run: |
          echo "--- row counts BEFORE migration ---"
          for t in rfqs rfq_items rfq_supplier_targets rfq_responses rfq_response_items; do
            COUNT=$(psql "$DATABASE_URL" -A -t -c "SELECT COUNT(*) FROM $t" 2>/dev/null || echo "(table missing)")
            printf "  %-30s %s\n" "$t:" "$COUNT"
          done

      - name: Show migration overview
        run: |
          echo "--- migrations/009_rls_batch3.sql ---"
          grep -E "^-- (PART|=)" migrations/009_rls_batch3.sql | head -30

      - name: Dry-run preview (only when MODE=dryrun)
        if: env.MODE == 'dryrun'
        run: |
          echo "================================================================"
          echo "  DRY-RUN. The SQL below WOULD have been applied. Nothing was."
          echo "================================================================"
          head -60 migrations/009_rls_batch3.sql

      - name: Apply migration 009 (only when MODE=apply)
        if: env.MODE == 'apply'
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
        run: |
          set -e
          echo "Applying migrations/009_rls_batch3.sql ..."
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/009_rls_batch3.sql
          echo "OK: migration 009 applied."

      - name: Verify post-apply -- columns
        if: env.MODE == 'apply'
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
        run: |
          set -e
          echo "--- expect: 5 tables now carry tenant_id ---"
          COLS=$(psql "$DATABASE_URL" -A -t -c "
            SELECT table_name FROM information_schema.columns
             WHERE column_name='tenant_id' AND table_schema='public'
               AND table_name IN ('rfqs','rfq_items','rfq_supplier_targets',
                                   'rfq_responses','rfq_response_items')
             ORDER BY table_name")
          echo "$COLS"
          N=$(echo "$COLS" | grep -c .)
          if [ "$N" -lt "5" ]; then
            echo "::error::expected 5 tenant_id columns, found $N"
            exit 1
          fi
          echo "OK: 5 tenant_id columns confirmed."

      - name: Verify post-apply -- RLS policies
        if: env.MODE == 'apply'
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
        run: |
          set -e
          echo "--- expect: 5 RFQ _tenant_isolation policies ---"
          POLICIES=$(psql "$DATABASE_URL" -A -t -c "
            SELECT tablename || ':' || policyname FROM pg_policies
             WHERE policyname IN (
               'rfqs_tenant_isolation',
               'rfq_items_tenant_isolation',
               'rfq_supplier_targets_tenant_isolation',
               'rfq_responses_tenant_isolation',
               'rfq_response_items_tenant_isolation'
             )
             ORDER BY tablename")
          echo "$POLICIES"
          N=$(echo "$POLICIES" | grep -c .)
          if [ "$N" -lt "5" ]; then
            echo "::error::expected 5 RLS policies, found $N"
            exit 1
          fi
          echo "OK: 5 RLS policies confirmed."

      - name: Verify post-apply -- backfill coverage
        if: env.MODE == 'apply'
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
        run: |
          set -e
          echo "--- unbackfilled (tenant_id IS NULL) counts ---"
          for t in rfqs rfq_items rfq_supplier_targets rfq_responses rfq_response_items; do
            COUNT=$(psql "$DATABASE_URL" -A -t -c "SELECT COUNT(*) FROM $t WHERE tenant_id IS NULL" 2>/dev/null || echo "?")
            printf "  %-30s %s\n" "$t:" "$COUNT"
          done
          echo "(Non-zero is OK on the parallel-run flavour -- the policy"
          echo " tolerates NULL. Orphan children whose parent rfq has been"
          echo " deleted stay NULL. Watch this trend to zero before Phase 7's"
          echo " FORCE ROW LEVEL SECURITY cutover.)"

      - name: Summary
        if: always()
        run: |
          if [ "$MODE" = "apply" ]; then
            echo "================================================================"
            echo " M1.6 BATCH 3 COMPLETE -- 5 RFQ tables now RLS-enforced."
            echo "================================================================"
            echo " Parallel-run NULL escapes still in effect."
            echo " Tenant convention: all 5 rows carry the BUYER's tenant_id."
            echo " Phase 7's strict policy will need a supplier_id-aware"
            echo " extension so suppliers see junction + response rows under"
            echo " their own GUC. Deferred."
          else
            echo "DRY-RUN -- no Render changes. Re-run with confirm=BATCH3_RLS_APPLY to commit."
          fi
