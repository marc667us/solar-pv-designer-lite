# Apply migrations/010_rls_batch3b.sql to live Postgres.
#
# Closes the parent gap left by migration 008 -- both
# marketplace_boms and marketplace_price_sheets now get tenant_id +
# RLS. Both backfill from direct user_id (NOT NULL by schema).
#
# Same shape as 007 / 008 / 009:
#   * Idempotent migration file.
#   * Parallel-run policy with NULL escape.
#   * Pre-flight verifies migration 003 helpers exist.
#   * Default mode is DRY-RUN. Re-run with `-f confirm=BATCH3B_RLS_APPLY`
#     to commit.
#
# Rollback: psql against the same DB with `ALTER TABLE <t> DISABLE ROW
# LEVEL SECURITY; DROP POLICY <t>_tenant_isolation ON <t>; ALTER TABLE
# <t> DROP COLUMN tenant_id;` for each of the 2 tables.

name: Apply Migration 010 (Batch 3b RLS)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "DRY-RUN by default. Type BATCH3B_RLS_APPLY to commit migration 010 to live Postgres."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      CONFIRM:        ${{ inputs.confirm }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Resolve mode
        run: |
          if [ "$CONFIRM" = "BATCH3B_RLS_APPLY" ]; then
            echo "MODE=apply" >> $GITHUB_ENV
            echo "=== APPLY MODE -- migration 010 will be committed to live Postgres ==="
          else
            echo "MODE=dryrun" >> $GITHUB_ENV
            echo "=== DRY-RUN MODE -- migration 010 will be parsed + previewed only ==="
            echo "Re-run with -f confirm=BATCH3B_RLS_APPLY to commit."
          fi

      - name: Verify migration file exists
        run: |
          test -f migrations/010_rls_batch3b.sql
          echo "OK: migrations/010_rls_batch3b.sql present"
          wc -l migrations/010_rls_batch3b.sql

      - name: Resolve solarpro-postgres
        id: pg
        run: |
          set -e
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/postgres?limit=20" -o /tmp/pg.json
          PG_ID=$(python3 -c "
          import json
          d=json.load(open('/tmp/pg.json'))
          for item in (d if isinstance(d,list) else []):
              pg=item.get('postgres', item)
              if pg.get('name')=='solarpro-postgres':
                  print(pg.get('id','')); break
          ")
          if [ -z "$PG_ID" ]; then
            echo "::error::solarpro-postgres not found"; exit 1
          fi
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/postgres/$PG_ID/connection-info" -o /tmp/conn.json
          EXT=$(python3 -c "import json; print(json.load(open('/tmp/conn.json')).get('externalConnectionString',''))")
          echo "::add-mask::$EXT"
          echo "external=$EXT" >> $GITHUB_OUTPUT

      - name: Pre-flight -- migration 003 helpers present
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
        run: |
          set -e
          HELPER_COUNT=$(psql "$DATABASE_URL" -A -t -c \
            "SELECT COUNT(*) FROM pg_proc WHERE proname IN ('current_tenant_id','_phase4_user_to_tenant')")
          if [ "$HELPER_COUNT" -lt "2" ]; then
            echo "::error::Pre-flight failed: migration 003 helpers missing ($HELPER_COUNT found)."
            echo "Apply migration 003 first via the Apply Keycloak Migrations workflow."
            exit 1
          fi
          echo "OK: migration 003 helpers present (current_tenant_id + _phase4_user_to_tenant)."

      - name: Pre-flight -- count current batch-3b rows
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
        run: |
          echo "--- row counts BEFORE migration ---"
          for t in marketplace_boms marketplace_price_sheets; do
            COUNT=$(psql "$DATABASE_URL" -A -t -c "SELECT COUNT(*) FROM $t" 2>/dev/null || echo "(table missing)")
            printf "  %-30s %s\n" "$t:" "$COUNT"
          done

      - name: Show migration overview
        run: |
          echo "--- migrations/010_rls_batch3b.sql ---"
          grep -E "^-- (PART|=)" migrations/010_rls_batch3b.sql | head -30

      - name: Dry-run preview (only when MODE=dryrun)
        if: env.MODE == 'dryrun'
        run: |
          echo "================================================================"
          echo "  DRY-RUN. The SQL below WOULD have been applied. Nothing was."
          echo "================================================================"
          head -60 migrations/010_rls_batch3b.sql

      - name: Apply migration 010 (only when MODE=apply)
        if: env.MODE == 'apply'
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
        run: |
          set -e
          echo "Applying migrations/010_rls_batch3b.sql ..."
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/010_rls_batch3b.sql
          echo "OK: migration 010 applied."

      - name: Verify post-apply -- columns
        if: env.MODE == 'apply'
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
        run: |
          set -e
          echo "--- expect: 2 tables now carry tenant_id ---"
          COLS=$(psql "$DATABASE_URL" -A -t -c "
            SELECT table_name FROM information_schema.columns
             WHERE column_name='tenant_id' AND table_schema='public'
               AND table_name IN ('marketplace_boms','marketplace_price_sheets')
             ORDER BY table_name")
          echo "$COLS"
          N=$(echo "$COLS" | grep -c .)
          if [ "$N" -lt "2" ]; then
            echo "::error::expected 2 tenant_id columns, found $N"
            exit 1
          fi
          echo "OK: 2 tenant_id columns confirmed."

      - name: Verify post-apply -- RLS policies
        if: env.MODE == 'apply'
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
        run: |
          set -e
          echo "--- expect: 2 batch-3b _tenant_isolation policies ---"
          POLICIES=$(psql "$DATABASE_URL" -A -t -c "
            SELECT tablename || ':' || policyname FROM pg_policies
             WHERE policyname IN (
               'marketplace_boms_tenant_isolation',
               'marketplace_price_sheets_tenant_isolation'
             )
             ORDER BY tablename")
          echo "$POLICIES"
          N=$(echo "$POLICIES" | grep -c .)
          if [ "$N" -lt "2" ]; then
            echo "::error::expected 2 RLS policies, found $N"
            exit 1
          fi
          echo "OK: 2 RLS policies confirmed."

      - name: Verify post-apply -- backfill coverage
        if: env.MODE == 'apply'
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
        run: |
          set -e
          echo "--- unbackfilled (tenant_id IS NULL) counts ---"
          for t in marketplace_boms marketplace_price_sheets; do
            COUNT=$(psql "$DATABASE_URL" -A -t -c "SELECT COUNT(*) FROM $t WHERE tenant_id IS NULL" 2>/dev/null || echo "?")
            printf "  %-30s %s\n" "$t:" "$COUNT"
          done
          echo "(Expected zero on both -- user_id is NOT NULL by schema.)"

      - name: Summary
        if: always()
        run: |
          if [ "$MODE" = "apply" ]; then
            echo "================================================================"
            echo " M1.6 BATCH 3b COMPLETE -- 2 parent tables now RLS-enforced."
            echo "================================================================"
            echo " The batch-2 parent gap is now closed. After this:"
            echo "   marketplace_boms + marketplace_price_sheets fully scoped"
            echo "   marketplace_bom_rates + marketplace_price_sheet_items"
            echo "   (children from batch 2) end-to-end protected."
            echo ""
            echo " 3 orphan marketplace_price_sheet_items still NULL from batch 2."
            echo " A pre-Phase-7 cleanup run should DELETE them, OR confirm the"
            echo " parent rows really are missing before deleting."
          else
            echo "DRY-RUN -- no Render changes. Re-run with confirm=BATCH3B_RLS_APPLY to commit."
          fi
