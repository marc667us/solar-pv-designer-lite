# Backfill growth_share_assets.payload_json with the real-schema
# extraction. Old rows created before commit e78b29e have payload_json
# values of mostly 0/blank because _safe_card_payload was reading the
# wrong keys (pv_size_kw vs pv_kw, annual_savings_usd vs
# economics.annual_sav, etc.). This workflow rewrites those rows in
# place from projects.data_json which is unchanged and authoritative.
#
# Dry-run by default. Apply with -f confirm=BACKFILL_APPLY.

name: Backfill Growth Share Payloads

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "DRY-RUN by default. Type BACKFILL_APPLY to commit."
        required: false
        default: ""

permissions: { contents: read }

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      CONFIRM:        ${{ inputs.confirm }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install --quiet psycopg2-binary

      - name: Resolve mode
        run: |
          if [ "$CONFIRM" = "BACKFILL_APPLY" ]; then
            echo "MODE=apply" >> $GITHUB_ENV
            echo "=== APPLY MODE -- payload_json rewrites commit to live PG ==="
          else
            echo "MODE=dryrun" >> $GITHUB_ENV
            echo "=== DRY-RUN MODE -- nothing will be written ==="
            echo "Re-run with -f confirm=BACKFILL_APPLY to commit."
          fi

      - name: Resolve solarpro-postgres connection string
        id: pg
        run: |
          set -e
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/postgres?limit=20" -o /tmp/pg.json
          PG_ID=$(python3 -c "
          import json
          d=json.load(open('/tmp/pg.json'))
          for item in (d if isinstance(d,list) else []):
              pg=item.get('postgres', item)
              if pg.get('name')=='solarpro-postgres':
                  print(pg.get('id','')); break
          ")
          if [ -z "$PG_ID" ]; then echo "::error::solarpro-postgres not found"; exit 1; fi
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/postgres/$PG_ID/connection-info" -o /tmp/conn.json
          EXT=$(python3 -c "import json; print(json.load(open('/tmp/conn.json')).get('externalConnectionString',''))")
          echo "::add-mask::$EXT"
          echo "external=$EXT" >> $GITHUB_OUTPUT

      - name: Backfill
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
          MODE: ${{ env.MODE }}
        run: |
          python3 <<'PY'
          import os, json, sys
          import psycopg2
          import psycopg2.extras

          MODE = os.environ["MODE"]
          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          conn.autocommit = False
          cur = conn.cursor(cursor_factory=psycopg2.extras.RealDictCursor)

          # Inline _safe_card_payload (single source of truth lives in
          # web_app.py; this is a verified port of it, see commit e78b29e).
          ALLOWED = (
              "solar_savings_card", "energy_score_card", "boq_summary_card",
              "proposal_preview", "installer_achievement_card",
              "supplier_product_card", "roof_before_after_card",
          )

          def safe_payload(project_row, asset_type):
              try: data = json.loads(project_row["data_json"] or "{}")
              except Exception: data = {}
              results = data.get("results") or {}
              eco = results.get("economics") or {}
              project_name = project_row.get("name") or "Solar project"
              location = (data.get("location") or data.get("country")
                          or data.get("location_label") or "")
              if isinstance(location, dict):
                  location = location.get("label", "") or ""
              location = str(location)[:80]
              currency = str(data.get("symbol") or data.get("currency") or "USD")[:6]

              pv_kw = (results.get("pv_kw") or results.get("pv_size_kw")
                       or results.get("system_kw") or 0)
              annual_savings = (eco.get("annual_sav")
                                or results.get("annual_savings_usd")
                                or results.get("annual_savings") or 0)
              payback = (eco.get("payback") or results.get("payback_years")
                         or results.get("payback") or 0)
              try: payback = float(payback)
              except Exception: payback = 0
              if payback != payback or payback == float("inf"): payback = 0

              if asset_type == "solar_savings_card":
                  return {"project_name": project_name, "location": location,
                          "system_size_kw": round(float(pv_kw or 0), 2),
                          "annual_savings": round(float(annual_savings or 0), 0),
                          "payback_years": round(float(payback or 0), 1),
                          "currency": currency}
              if asset_type == "energy_score_card":
                  system_type = (data.get("system_type", "") or "").lower()
                  default_score = (95 if "off-grid" in system_type or "off grid" in system_type
                                   else 70 if "hybrid" in system_type else 35)
                  score = (results.get("energy_independence_score")
                           or results.get("self_sufficiency_pct")
                           or results.get("solar_fraction_pct") or default_score)
                  return {"project_name": project_name, "location": location,
                          "energy_score": round(float(score or 0), 0),
                          "system_size_kw": round(float(pv_kw or 0), 2),
                          "daily_kwh": round(float(results.get("daily_kwh") or 0), 1)}
              if asset_type == "boq_summary_card":
                  return {"project_name": project_name, "location": location,
                          "system_size_kw": round(float(pv_kw or 0), 2),
                          "module_count": int(results.get("num_panels") or 0),
                          "battery_kwh": round(float(results.get("bat_kwh") or 0), 1),
                          "inverter_kw": round(float(results.get("inv_kw") or 0), 1)}
              if asset_type in ("proposal_preview", "roof_before_after_card"):
                  out = {"project_name": project_name, "location": location,
                         "system_size_kw": round(float(pv_kw or 0), 2),
                         "annual_savings": round(float(annual_savings or 0), 0),
                         "currency": currency}
                  if asset_type == "proposal_preview":
                      out["payback_years"] = round(float(payback or 0), 1)
                  return out
              return {"project_name": project_name, "location": location}

          # Pull every project-linked share asset
          cur.execute("""
              SELECT a.id, a.asset_type, a.payload_json, a.share_slug,
                     a.revoked_at IS NOT NULL AS revoked,
                     p.name, p.data_json
                FROM growth_share_assets a
           LEFT JOIN projects p ON p.id = a.project_id
               WHERE a.project_id IS NOT NULL
               ORDER BY a.id
          """)
          rows = cur.fetchall()
          print(f"\n=== {len(rows)} project-linked share assets found ===\n")

          to_update = []
          for r in rows:
              if not r["data_json"]:
                  print(f"  id={r['id']:4d} slug={r['share_slug']:12s} SKIP (orphan project, no data_json)")
                  continue
              if r["asset_type"] not in ALLOWED:
                  print(f"  id={r['id']:4d} slug={r['share_slug']:12s} SKIP (unknown asset_type={r['asset_type']})")
                  continue
              try:
                  old = json.loads(r["payload_json"] or "{}")
              except Exception:
                  old = {}
              new = safe_payload({"name": r["name"], "data_json": r["data_json"]},
                                 r["asset_type"])
              if json.dumps(old, sort_keys=True) == json.dumps(new, sort_keys=True):
                  print(f"  id={r['id']:4d} slug={r['share_slug']:12s} unchanged ({r['asset_type']})")
                  continue
              tag = "REVOKED" if r["revoked"] else "LIVE"
              # Print a tight diff of changed-or-new keys
              diffs = []
              for k in set(old) | set(new):
                  if old.get(k) != new.get(k):
                      diffs.append(f"{k}: {old.get(k)!r} -> {new.get(k)!r}")
              print(f"  id={r['id']:4d} slug={r['share_slug']:12s} {tag:8s} {r['asset_type']:25s}")
              for d in diffs[:6]:
                  print(f"          {d}")
              to_update.append((r["id"], json.dumps(new, separators=(',',':'))))

          print(f"\n=== {len(to_update)} rows need rewrite ===\n")
          if MODE != "apply":
              print("DRY-RUN: no writes performed. Re-run with -f confirm=BACKFILL_APPLY.")
              conn.close(); sys.exit(0)
          for aid, payload in to_update:
              cur.execute(
                  "UPDATE growth_share_assets SET payload_json = %s, "
                  "updated_at = CURRENT_TIMESTAMP WHERE id = %s",
                  (payload, aid))
          conn.commit()
          print(f"APPLY: committed {len(to_update)} payload rewrites.")
          conn.close()
          PY
