name: CI — Test, Security Scan, Build

on:
  push:
    branches: ["master", "dev", "staging"]
  pull_request:
    branches: ["master", "staging"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: marc667us/solarpro-backend

jobs:

  # ── 1. Lint & Style ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linting tools
        run: pip install flake8 black

      - name: Flake8
        run: flake8 web_app.py wsgi.py calculation/ config/ --max-line-length=120 --ignore=E501,W503 || true

      - name: Black format check
        run: black --check --line-length=120 web_app.py wsgi.py || true

  # ── 2. Security Scan (pip-audit + Semgrep + Trivy) ──────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit (dependency vulnerability scan)
        run: |
          pip install -r requirements.txt
          pip-audit --format=json --output=pip-audit.json || true
          pip-audit || echo "pip-audit found issues — review above"

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit.json
        if: always()

      - name: Semgrep (code security scan)
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/python
            p/flask
            p/owasp-top-ten
        continue-on-error: true

      - name: Trivy filesystem scan (CRITICAL + HIGH only)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"         # don't fail build on scan findings (report only)
          format: "table"
        continue-on-error: true

  # ── 3. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Syntax check web_app.py
        run: python -c "import ast; ast.parse(open('web_app.py','rb').read()); print('web_app.py: syntax OK')"

      - name: Run smoke tests
        env:
          SECRET_KEY: test-secret-key-for-ci
          APP_ENV: test
        run: |
          python -c "
          import os, sys
          os.environ['SECRET_KEY'] = 'ci-test-key'
          os.environ['TESTING'] = '1'
          import web_app
          print('Flask app imports OK')
          print('Routes registered:', len([r.rule for r in web_app.app.url_map.iter_rules()]))
          "

      - name: Run test suite (if exists)
        env:
          SECRET_KEY: test-secret-key-for-ci
          APP_ENV: test
        run: |
          if [ -f test_render.py ]; then
            echo "Skipping live Render tests in CI"
          fi
          if ls test_*.py &>/dev/null 2>&1; then
            pytest test_*.py -v --ignore=test_render.py || true
          else
            echo "No unit test files found"
          fi

  # ── 4. Build Docker Image ────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.sha }}

      - name: Trivy image scan (built image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: "CRITICAL"
          exit-code: "0"
        continue-on-error: true
