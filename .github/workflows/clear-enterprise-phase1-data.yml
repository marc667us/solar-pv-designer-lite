# Clear the OLD (Phase-1) Enterprise Programme data from live Postgres.
#
# WHY: the owner walked the Phase-1 module on live and created test programmes,
# phases and beneficiaries through its forms. The module is being REPLACED by the
# rebuild (slices 1-6), whose tables are entirely different names
# (enterprise_programme_registry, enterprise_beneficiary_register, ...). The old
# rows are test data for a module that is going away, and the owner wants the
# dashboard clean.
#
# WHAT IT TOUCHES -- and nothing else:
#   enterprise_programme_audit          (migration 024)
#   enterprise_programme_jobs           (migration 024)
#   enterprise_programme_project_links  (migration 024)
#   enterprise_beneficiaries            (migration 024)
#   enterprise_programme_phases         (migration 024)
#   enterprise_programmes               (migration 024)
#   enterprise_memberships              (migration 024)
#   enterprise_organisations            (migration 024)
#
# WHAT IT MUST NEVER TOUCH:
#   * `projects` and `capital_investment_projects` -- a programme LINKS a project,
#     it never OWNS it. Deleting a project link deletes the LINK. The project, its
#     wizard data and any BOQ behind it are the user's and are not this module's to
#     destroy. The DELETEs below name the eight tables explicitly; there is no
#     CASCADE from them into either projects table (the link's project_id is
#     deliberately NOT a foreign key, precisely so this can never happen).
#   * `users`, `admin_settings`, the feature flags, or ANY marketplace/BOQ table.
#   * The REBUILD's tables (enterprise_programme_registry, _phase_states,
#     enterprise_beneficiary_register, enterprise_tenants, ...). Those are not
#     applied to live yet; if they ever are, this workflow still will not see them
#     -- it names the eight old tables and only those.
#
# TABLES ARE EMPTIED, NOT DROPPED. Owner decision D1: migration 024's tables are
# SUPERSEDED, never dropped -- dropping them would make 024 non-idempotent and take
# the live schema somewhere no migration describes. DELETE, not DROP TABLE.
#
# DEFAULT IS DRY-RUN. It prints the row counts it WOULD delete and writes nothing.
# Committing needs -f confirm=CLEAR_ENTERPRISE_PHASE1.
#
# TAKE A BACKUP FIRST: run the `Backup Postgres` workflow. This one refuses to be
# useful otherwise -- see the reminder it prints.

name: Clear Enterprise Phase-1 Data

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "DRY-RUN by default. Type CLEAR_ENTERPRISE_PHASE1 to actually delete."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  clear:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      CONFIRM:        ${{ inputs.confirm }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Resolve mode
        run: |
          if [ "$CONFIRM" = "CLEAR_ENTERPRISE_PHASE1" ]; then
            echo "MODE=apply" >> $GITHUB_ENV
            echo "=== APPLY MODE -- rows WILL be deleted from live Postgres ==="
            echo "=== Did you run the Backup Postgres workflow first? ==="
          else
            echo "MODE=dryrun" >> $GITHUB_ENV
            echo "=== DRY-RUN -- counts only, nothing will be written ==="
            echo "Re-run with -f confirm=CLEAR_ENTERPRISE_PHASE1 to delete."
          fi

      - name: Resolve solarpro-postgres
        id: pg
        run: |
          set -e
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/postgres?limit=20" -o /tmp/pg.json
          PG_ID=$(python3 -c "
          import json
          d=json.load(open('/tmp/pg.json'))
          for item in (d if isinstance(d,list) else []):
              pg=item.get('postgres', item)
              if pg.get('name')=='solarpro-postgres':
                  print(pg.get('id','')); break
          ")
          if [ -z "$PG_ID" ]; then
            echo "::error::solarpro-postgres not found"; exit 1
          fi
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/postgres/$PG_ID/connection-info" -o /tmp/conn.json
          EXT=$(python3 -c "import json; print(json.load(open('/tmp/conn.json')).get('externalConnectionString',''))")
          echo "::add-mask::$EXT"
          echo "external=$EXT" >> $GITHUB_OUTPUT

      - name: What is actually there right now
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
        run: |
          set -e
          echo "=================== PHASE-1 ENTERPRISE DATA ===================="
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "
            SELECT 'enterprise_organisations'          AS tbl, count(*) FROM enterprise_organisations
            UNION ALL SELECT 'enterprise_memberships',            count(*) FROM enterprise_memberships
            UNION ALL SELECT 'enterprise_programmes',             count(*) FROM enterprise_programmes
            UNION ALL SELECT 'enterprise_programme_phases',       count(*) FROM enterprise_programme_phases
            UNION ALL SELECT 'enterprise_beneficiaries',          count(*) FROM enterprise_beneficiaries
            UNION ALL SELECT 'enterprise_programme_project_links',count(*) FROM enterprise_programme_project_links
            UNION ALL SELECT 'enterprise_programme_jobs',         count(*) FROM enterprise_programme_jobs
            UNION ALL SELECT 'enterprise_programme_audit',        count(*) FROM enterprise_programme_audit
            ORDER BY 1;"
          echo ""
          echo "=================== THE PROGRAMMES THEMSELVES =================="
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "
            SELECT id, name, status, created_at FROM enterprise_programmes ORDER BY id;"
          echo ""
          echo "======= PROJECTS THESE LINK TO (these are NOT deleted) ========="
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "
            SELECT project_kind, project_id, count(*) AS links
              FROM enterprise_programme_project_links
             GROUP BY 1,2 ORDER BY 1,2;"
          echo ""
          echo "PROOF the user's own projects are untouched by this workflow --"
          echo "counts BEFORE (they must be identical AFTER):"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "
            SELECT 'projects' AS tbl, count(*) FROM projects
            UNION ALL SELECT 'capital_investment_projects', count(*)
              FROM capital_investment_projects;"

      - name: Dry-run -- nothing written
        if: env.MODE == 'dryrun'
        run: |
          echo "================================================================"
          echo "  DRY-RUN. The rows counted above WOULD be deleted. Nothing was."
          echo ""
          echo "  To actually delete:"
          echo "    1. Run the 'Backup Postgres' workflow and let it finish."
          echo "    2. Re-run this one with:"
          echo "         -f confirm=CLEAR_ENTERPRISE_PHASE1"
          echo "================================================================"

      - name: Delete (only when MODE=apply)
        if: env.MODE == 'apply'
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
        run: |
          set -e
          # ONE transaction: either the whole Phase-1 dataset goes, or none of it
          # does. A half-cleared module -- programmes gone, beneficiaries orphaned --
          # is worse than either end state.
          #
          # Children first, parents last, so the FKs are satisfied without relying on
          # ON DELETE CASCADE (which would work, but leaves what was actually deleted
          # implicit; here every table is named and its count reported).
          #
          # RLS: migration 024's policies are ENABLE (not FORCE) and this connection
          # is the table owner, so the owner bypasses them. The DELETEs see every row.
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          BEGIN;

          DELETE FROM enterprise_programme_audit;
          DELETE FROM enterprise_programme_jobs;
          DELETE FROM enterprise_programme_project_links;
          DELETE FROM enterprise_beneficiaries;
          DELETE FROM enterprise_programme_phases;
          DELETE FROM enterprise_programmes;
          DELETE FROM enterprise_memberships;
          DELETE FROM enterprise_organisations;

          COMMIT;
          SQL
          echo "OK: Phase-1 enterprise data cleared."

      - name: Verify -- module empty, user projects untouched
        if: env.MODE == 'apply'
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
        run: |
          set -e
          echo "=== enterprise_* must all be 0 ==="
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "
            SELECT 'enterprise_organisations'          AS tbl, count(*) FROM enterprise_organisations
            UNION ALL SELECT 'enterprise_memberships',            count(*) FROM enterprise_memberships
            UNION ALL SELECT 'enterprise_programmes',             count(*) FROM enterprise_programmes
            UNION ALL SELECT 'enterprise_programme_phases',       count(*) FROM enterprise_programme_phases
            UNION ALL SELECT 'enterprise_beneficiaries',          count(*) FROM enterprise_beneficiaries
            UNION ALL SELECT 'enterprise_programme_project_links',count(*) FROM enterprise_programme_project_links
            UNION ALL SELECT 'enterprise_programme_jobs',         count(*) FROM enterprise_programme_jobs
            UNION ALL SELECT 'enterprise_programme_audit',        count(*) FROM enterprise_programme_audit
            ORDER BY 1;"
          echo ""
          echo "=== the user's OWN projects -- must match the BEFORE counts ==="
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "
            SELECT 'projects' AS tbl, count(*) FROM projects
            UNION ALL SELECT 'capital_investment_projects', count(*)
              FROM capital_investment_projects;"
