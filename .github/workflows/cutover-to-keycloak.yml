# Phase 7 cutover: flip KEYCLOAK_ENABLED=true on the live web service
# and verify the new auth surface is serving.
#
# Pre-conditions (verified by this workflow):
#   1. The repository must already declare KEYCLOAK_ISSUER as a GH Secret
#      (cutover plugs it into Render env). Without it the deploy will
#      503 on /auth/login.
#   2. The repository must declare KEYCLOAK_WEBHOOK_SECRET (HMAC for
#      /api/keycloak/events). 401 fail-loud is the default if absent.
#   3. The repository must declare KEYCLOAK_CLIENT_ID + KEYCLOAK_REDIRECT_URI
#      (with /auth/callback path).
#   4. migrations/003_rls_tenant.sql + 004_audit_log_tenant.sql must
#      already be live -- the previous "Apply Keycloak Migrations"
#      workflow run handles that.
#
# Behaviour:
#   1. Reads the current Render env-var list.
#   2. Merges KEYCLOAK_ENABLED=true + the 4 OIDC-related env vars from
#      GitHub Secrets onto it (PUT replaces the set; we preserve every
#      other env var the service already holds).
#   3. Triggers a redeploy.
#   4. Polls for "live" status (timeout 5 minutes).
#   5. Smokes /auth/login -- should now 302 to Keycloak (not /login?legacy=1).
#
# Rollback: run `.github/workflows/rollback-from-keycloak.yml`.
# That workflow strips KEYCLOAK_ENABLED and redeploys; the parallel-run
# routes fall straight back to /login?legacy=1.

name: Cut Over To Keycloak

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type CUTOVER to confirm. Anything else aborts."
        required: true

permissions:
  contents: read

jobs:
  cutover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RENDER_API_KEY:           ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID:        ${{ secrets.RENDER_SERVICE_ID }}
      KEYCLOAK_ISSUER:          ${{ secrets.KEYCLOAK_ISSUER }}
      KEYCLOAK_CLIENT_ID:       ${{ secrets.KEYCLOAK_CLIENT_ID }}
      KEYCLOAK_REDIRECT_URI:    ${{ secrets.KEYCLOAK_REDIRECT_URI }}
      KEYCLOAK_WEBHOOK_SECRET:  ${{ secrets.KEYCLOAK_WEBHOOK_SECRET }}
      CONFIRM:                  ${{ github.event.inputs.confirm }}
    steps:
      - name: Verify confirmation
        run: |
          if [ "$CONFIRM" != "CUTOVER" ]; then
            echo "::error::confirm input must be exactly 'CUTOVER' (case-sensitive)."
            exit 1
          fi
          echo "Confirmation accepted."

      - name: Verify Keycloak secrets present
        run: |
          MISSING=""
          for v in KEYCLOAK_ISSUER KEYCLOAK_CLIENT_ID KEYCLOAK_REDIRECT_URI KEYCLOAK_WEBHOOK_SECRET; do
            eval val=\"\$$v\"
            if [ -z "$val" ]; then
              MISSING="$MISSING $v"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Missing GH Secrets:$MISSING"
            exit 1
          fi
          echo "All four Keycloak secrets present."

      - name: Fetch current Render env vars
        id: env
        run: |
          set -e
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            -o /tmp/env_current.json
          NCOUNT=$(jq 'length' /tmp/env_current.json)
          echo "Render currently holds $NCOUNT env vars."

      - name: Merge KEYCLOAK_* into env set
        run: |
          set -e
          # Build the merged env-var list:
          #   * Drop any existing KEYCLOAK_* entries (so cutover is idempotent).
          #   * Append the five required entries from GH Secrets.
          jq --arg ena "true" \
             --arg iss "$KEYCLOAK_ISSUER" \
             --arg cli "$KEYCLOAK_CLIENT_ID" \
             --arg red "$KEYCLOAK_REDIRECT_URI" \
             --arg sec "$KEYCLOAK_WEBHOOK_SECRET" '
            [.[] | .envVar | {key, value}]
            | map(select(.key | startswith("KEYCLOAK_") | not))
            | . + [
                {key: "KEYCLOAK_ENABLED",         value: $ena},
                {key: "KEYCLOAK_ISSUER",          value: $iss},
                {key: "KEYCLOAK_CLIENT_ID",       value: $cli},
                {key: "KEYCLOAK_REDIRECT_URI",    value: $red},
                {key: "KEYCLOAK_WEBHOOK_SECRET",  value: $sec}
            ]
          ' /tmp/env_current.json > /tmp/env_merged.json
          NCOUNT=$(jq 'length' /tmp/env_merged.json)
          echo "Merged set has $NCOUNT env vars."

      - name: PUT merged env-var set
        run: |
          set -e
          curl -fsS -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary "@/tmp/env_merged.json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars" \
            | jq 'length as $n | "Render confirmed \($n) env vars set."'

      - name: Trigger redeploy
        id: deploy
        run: |
          set -e
          DEPLOY=$(curl -fsS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          DEPLOY_ID=$(echo "$DEPLOY" | jq -r '.id')
          echo "Render deploy id: $DEPLOY_ID"
          echo "id=$DEPLOY_ID" >> $GITHUB_OUTPUT

      - name: Wait for deploy live (up to 5 minutes)
        env:
          DEPLOY_ID: ${{ steps.deploy.outputs.id }}
        run: |
          set -e
          for i in $(seq 1 20); do
            STATUS=$(curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
              | jq -r '.status')
            echo "[$i/20] deploy status: $STATUS"
            case "$STATUS" in
              live)            exit 0 ;;
              build_failed|deactivated|canceled|update_failed)
                echo "::error::deploy failed: $STATUS"; exit 1 ;;
            esac
            sleep 15
          done
          echo "::warning::deploy did not reach 'live' in 5 minutes; continuing anyway."

      - name: Smoke /auth/login expects redirect to Keycloak (not legacy)
        run: |
          set -e
          # Render's edge may take an extra ~30 s after "live" to route
          # to the new instance. Retry-with-backoff before giving up.
          for i in $(seq 1 6); do
            LOC=$(curl -sS -o /dev/null -w "%{redirect_url}" \
              https://solarpro.aiappinvent.com/auth/login)
            echo "[$i/6] /auth/login -> $LOC"
            if echo "$LOC" | grep -q "/protocol/openid-connect/auth"; then
              echo "Cutover smoke PASS."
              exit 0
            fi
            sleep 10
          done
          echo "::error::/auth/login still redirects to legacy form; cutover did not take effect."
          exit 1

      - name: Summary
        run: |
          echo "KEYCLOAK_ENABLED=true is live on Render."
          echo "Existing /login form remains reachable via /login?legacy=1"
          echo "for the marc667us emergency channel + the 7-day rollback window."
          echo "Verify by tailing audit_logs for KC_* + LOGIN_SUCCESS rows over the next hour."
