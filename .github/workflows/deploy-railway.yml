name: Deploy to Railway

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Railway auto-deploys on push
        # Railway watches GitHub directly and deploys automatically on every push.
        # This step just confirms the deploy was triggered and gives the dashboard link.
        run: |
          echo "Railway auto-deploy triggered by git push to master."
          echo "Check status at: https://railway.app/dashboard"
          echo ""
          echo "To view logs: railway logs --tail"
          echo "Service URL will be set in RAILWAY_PUBLIC_DOMAIN env var once deployed."
