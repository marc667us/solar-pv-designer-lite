name: Deploy Test (no env sync)

# One-time test to verify deploy works without env var sync
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy (no env var sync, no cache clear)
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          HTTP_CODE=$(curl -s -o /tmp/deploy_resp.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")

          echo "Render API response (HTTP $HTTP_CODE):"
          cat /tmp/deploy_resp.json | python3 -m json.tool 2>/dev/null || cat /tmp/deploy_resp.json

          if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Deploy trigger failed (HTTP $HTTP_CODE)"
            exit 1
          fi

          DEPLOY_ID=$(cat /tmp/deploy_resp.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('id',''))")
          echo "Deploy queued: $DEPLOY_ID"

          for i in $(seq 1 16); do
            sleep 30
            STATUS=$(curl -s \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('status','unknown'))")
            echo "  [$i/16] $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "Deploy is LIVE ✓"
              exit 0
            elif [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "update_failed" ] || [ "$STATUS" = "canceled" ]; then
              echo "::error::Deploy ended with: $STATUS"
              exit 1
            fi
          done
          echo "::warning::Timed out"
