name: Deploy to Render

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            | jq '{id: .id, status: .status}'

      - name: Sync secrets to Render (skips empty values)
        env:
          RENDER_API_KEY:          ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID:       ${{ secrets.RENDER_SERVICE_ID }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          MISTRAL_API_KEY:         ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY:      ${{ secrets.OPENROUTER_API_KEY }}
          OLLAMA_URL:              ${{ secrets.OLLAMA_URL }}
          OLLAMA_MODEL:            ${{ secrets.OLLAMA_MODEL }}
          SECRET_KEY:              ${{ secrets.SECRET_KEY }}
          PAYSTACK_SECRET_KEY:     ${{ secrets.PAYSTACK_SECRET_KEY }}
          RESEND_API_KEY:          ${{ secrets.RESEND_API_KEY }}
          EMAIL_SALES:             ${{ secrets.EMAIL_SALES }}
          EMAIL_SUPPORT:           ${{ secrets.EMAIL_SUPPORT }}
          EMAIL_BILLING:           ${{ secrets.EMAIL_BILLING }}
          EMAIL_HELLO:             ${{ secrets.EMAIL_HELLO }}
          EMAIL_PROPOSALS:         ${{ secrets.EMAIL_PROPOSALS }}
          SMTP_HOST:               ${{ secrets.SMTP_HOST }}
          SMTP_PORT:               ${{ secrets.SMTP_PORT }}
          SMTP_USER:               ${{ secrets.SMTP_USER }}
          SMTP_PASS:               ${{ secrets.SMTP_PASS }}
          SMTP_FROM:               ${{ secrets.SMTP_FROM }}
        run: |
          NEW_VARS='[]'
          add() {
            local key="$1" val="$2"
            if [ -n "$val" ]; then
              NEW_VARS=$(printf '%s' "$NEW_VARS" | \
                jq --arg k "$key" --arg v "$val" '. + [{"key":$k,"value":$v}]')
            fi
          }
          add ANTHROPIC_API_KEY  "$ANTHROPIC_API_KEY"
          add MISTRAL_API_KEY    "$MISTRAL_API_KEY"
          add OPENROUTER_API_KEY "$OPENROUTER_API_KEY"
          add OLLAMA_URL         "$OLLAMA_URL"
          add OLLAMA_MODEL       "$OLLAMA_MODEL"
          add SECRET_KEY         "$SECRET_KEY"
          add PAYSTACK_SECRET_KEY "$PAYSTACK_SECRET_KEY"
          add RESEND_API_KEY     "$RESEND_API_KEY"
          add EMAIL_SALES        "$EMAIL_SALES"
          add EMAIL_SUPPORT      "$EMAIL_SUPPORT"
          add EMAIL_BILLING      "$EMAIL_BILLING"
          add EMAIL_HELLO        "$EMAIL_HELLO"
          add EMAIL_PROPOSALS    "$EMAIL_PROPOSALS"
          add SMTP_HOST          "$SMTP_HOST"
          add SMTP_PORT          "$SMTP_PORT"
          add SMTP_USER          "$SMTP_USER"
          add SMTP_PASS          "$SMTP_PASS"
          add SMTP_FROM          "$SMTP_FROM"

          if [ "$NEW_VARS" = '[]' ]; then
            echo "No GitHub Secrets configured — skipping env-var sync"
            exit 0
          fi

          echo "Syncing $(echo "$NEW_VARS" | jq 'length') secret(s) to Render..."

          # GET current vars — Render v1 returns array of objects with nested envVar
          # Format: [{"cursor":"...", "envVar":{"key":"K","value":"V"}},...] OR flat [{key,value},...]
          CURRENT_RAW=$(curl -s \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          echo "GET response (first 200): ${CURRENT_RAW:0:200}"

          # Normalise both flat [{key,value}] and nested [{envVar:{key,value}}] formats
          CURRENT_CLEAN=$(echo "$CURRENT_RAW" | \
            jq 'if (.[0] | has("envVar")) then [.[].envVar | {key:.key,value:.value}]
                else [.[] | {key:.key,value:.value}] end' 2>/dev/null || echo '[]')
          echo "Parsed $(echo "$CURRENT_CLEAN" | jq 'length') existing vars"

          # Merge: keep existing vars not in NEW_VARS, then append NEW_VARS
          UPDATED=$(echo "$CURRENT_CLEAN" | jq \
            --argjson new "$NEW_VARS" \
            'map(select(.key as $k | ($new | map(.key) | index($k)) == null)) + $new')
          echo "PUT payload has $(echo "$UPDATED" | jq 'length') vars total"

          HTTP_STATUS=$(curl -s -o /tmp/render_put.txt -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$UPDATED" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          echo "PUT status: $HTTP_STATUS"
          cat /tmp/render_put.txt | head -c 300
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
            echo "Env vars synced successfully."
          else
            echo "Env-var sync failed (non-fatal) — set vars manually in Render dashboard if needed"
          fi
