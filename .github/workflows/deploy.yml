name: Deploy to Railway

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Railway auto-deploy confirmed
        run: |
          echo "Push to master — Railway deploys automatically via GitHub integration."
          echo ""
          echo "Monitor: https://railway.app/dashboard"
          echo "Logs:    railway logs --tail  (Railway CLI + RAILWAY_TOKEN)"
          echo ""
          echo "Required env vars (set once in Railway dashboard → Variables tab):"
          echo "  ANTHROPIC_API_KEY  OPENROUTER_API_KEY  RESEND_API_KEY"
          echo "  PAYSTACK_SECRET_KEY  SECRET_KEY"
          echo "  SMTP_HOST  SMTP_PORT  SMTP_USER  SMTP_PASS  SMTP_FROM  SMTP_TLS"
          echo "  EMAIL_SALES  EMAIL_SUPPORT  EMAIL_BILLING"
          echo "  OLLAMA_URL  OLLAMA_MODEL"
