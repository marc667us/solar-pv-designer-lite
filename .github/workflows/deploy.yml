name: Deploy to Render

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            | jq '{id: .id, status: .status}'

      - name: Sync secrets to Render (skips empty values)
        env:
          RENDER_API_KEY:          ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID:       ${{ secrets.RENDER_SERVICE_ID }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          SECRET_KEY:              ${{ secrets.SECRET_KEY }}
          PAYSTACK_SECRET_KEY:     ${{ secrets.PAYSTACK_SECRET_KEY }}
          STRIPE_SECRET_KEY:       ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET:   ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SMTP_HOST:               ${{ secrets.SMTP_HOST }}
          SMTP_PORT:               ${{ secrets.SMTP_PORT }}
          SMTP_USER:               ${{ secrets.SMTP_USER }}
          SMTP_PASS:               ${{ secrets.SMTP_PASS }}
        run: |
          # Build update list — only include secrets with non-empty values
          # so missing GitHub Secrets never overwrite values set in Render dashboard
          NEW_VARS='[]'
          add() {
            local key="$1" val="$2"
            if [ -n "$val" ]; then
              NEW_VARS=$(printf '%s' "$NEW_VARS" | \
                jq --arg k "$key" --arg v "$val" '. + [{"key":$k,"value":$v}]')
            fi
          }
          add ANTHROPIC_API_KEY     "$ANTHROPIC_API_KEY"
          add SECRET_KEY            "$SECRET_KEY"
          add PAYSTACK_SECRET_KEY   "$PAYSTACK_SECRET_KEY"
          add STRIPE_SECRET_KEY     "$STRIPE_SECRET_KEY"
          add STRIPE_WEBHOOK_SECRET "$STRIPE_WEBHOOK_SECRET"
          add SMTP_HOST             "$SMTP_HOST"
          add SMTP_PORT             "$SMTP_PORT"
          add SMTP_USER             "$SMTP_USER"
          add SMTP_PASS             "$SMTP_PASS"

          if [ "$NEW_VARS" = '[]' ]; then
            echo "No GitHub Secrets configured — skipping Render env-var sync"
            exit 0
          fi

          echo "Syncing $(echo "$NEW_VARS" | jq 'length') secret(s) to Render..."

          CURRENT=$(curl -sf \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")

          UPDATED=$(echo "$CURRENT" | jq \
            --argjson new "$NEW_VARS" \
            'map(select(.key as $k | ($new | map(.key) | index($k)) == null)) + $new')

          curl -sf -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$UPDATED" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars"
