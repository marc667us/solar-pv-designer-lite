name: Deploy to Render

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            | jq '{id: .id, status: .status}'

      - name: Sync secrets to Render
        env:
          RENDER_API_KEY:          ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID:       ${{ secrets.RENDER_SERVICE_ID }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          SECRET_KEY:              ${{ secrets.SECRET_KEY }}
          PAYSTACK_SECRET_KEY:     ${{ secrets.PAYSTACK_SECRET_KEY }}
          STRIPE_SECRET_KEY:       ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET:   ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SMTP_HOST:               ${{ secrets.SMTP_HOST }}
          SMTP_PORT:               ${{ secrets.SMTP_PORT }}
          SMTP_USER:               ${{ secrets.SMTP_USER }}
          SMTP_PASS:               ${{ secrets.SMTP_PASS }}
        run: |
          CURRENT=$(curl -sf \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")

          UPDATED=$(echo "$CURRENT" | jq \
            --arg anthropic  "$ANTHROPIC_API_KEY" \
            --arg secret_key "$SECRET_KEY" \
            --arg paystack   "$PAYSTACK_SECRET_KEY" \
            --arg stripe     "$STRIPE_SECRET_KEY" \
            --arg stripe_wh  "$STRIPE_WEBHOOK_SECRET" \
            --arg smtp_host  "$SMTP_HOST" \
            --arg smtp_port  "$SMTP_PORT" \
            --arg smtp_user  "$SMTP_USER" \
            --arg smtp_pass  "$SMTP_PASS" \
            '[
              map(select(.key | IN(
                "ANTHROPIC_API_KEY","SECRET_KEY",
                "PAYSTACK_SECRET_KEY","STRIPE_SECRET_KEY","STRIPE_WEBHOOK_SECRET",
                "SMTP_HOST","SMTP_PORT","SMTP_USER","SMTP_PASS"
              ) | not)),
              [
                {"key":"ANTHROPIC_API_KEY",     "value":$anthropic},
                {"key":"SECRET_KEY",            "value":$secret_key},
                {"key":"PAYSTACK_SECRET_KEY",   "value":$paystack},
                {"key":"STRIPE_SECRET_KEY",     "value":$stripe},
                {"key":"STRIPE_WEBHOOK_SECRET", "value":$stripe_wh},
                {"key":"SMTP_HOST",             "value":$smtp_host},
                {"key":"SMTP_PORT",             "value":$smtp_port},
                {"key":"SMTP_USER",             "value":$smtp_user},
                {"key":"SMTP_PASS",             "value":$smtp_pass}
              ]
            ] | add')

          curl -sf -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$UPDATED" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars"
