name: Sync secrets to Render

on:
  push:
    branches: [master]

jobs:
  sync-env:
    runs-on: ubuntu-latest
    steps:
      - name: Sync API keys to Render service
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Fetch current env vars from Render
          CURRENT=$(curl -sf \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")

          # Upsert both API keys without touching other vars
          UPDATED=$(echo "$CURRENT" | jq \
            --arg ant "$ANTHROPIC_API_KEY" \
            --arg gem "$GEMINI_API_KEY" \
            '[map(select(.key != "ANTHROPIC_API_KEY" and .key != "GEMINI_API_KEY")),
              (if $ant != "" then [{"key":"ANTHROPIC_API_KEY","value":$ant}] else [] end),
              (if $gem != "" then [{"key":"GEMINI_API_KEY","value":$gem}] else [] end)
            ] | add')

          # Write updated env vars back to Render
          curl -sf -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$UPDATED" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars"
