name: Diag BOQ Generate 500
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Login + fresh project + template save + dump 500 if any
        env:
          OWNER_PW: ${{ secrets.SOLARPRO_OWNER_PASSWORD }}
        run: |
          set +e
          BASE="https://solarpro.aiappinvent.com"
          COOKIE=$(mktemp)
          # Login (legacy bypass)
          BODY=$(curl -sS -c "$COOKIE" -b "$COOKIE" "$BASE/login?legacy=1")
          CSRF=$(echo "$BODY" | grep -oE 'name="_csrf"[^>]+value="[^"]+"' | head -1 | sed -E 's/.*value="([^"]+)".*/\1/')
          curl -sS -o /dev/null -b "$COOKIE" -c "$COOKIE" -X POST \
            -d "username=marc667us&password=${OWNER_PW}&_csrf=${CSRF}" \
            "$BASE/login?legacy=1"

          # Create a boq project
          BODY=$(curl -sS -b "$COOKIE" "$BASE/boq-projects/new")
          CSRF=$(echo "$BODY" | grep -oE 'name="_csrf"[^>]+value="[^"]+"' | head -1 | sed -E 's/.*value="([^"]+)".*/\1/')
          curl -sS -b "$COOKIE" -X POST \
            -d "_csrf=${CSRF}&project_name=DiagTest&project_type=single_building" \
            "$BASE/boq-projects/new" -o /dev/null
          # Find the just-created project id from the boq-projects list
          LIST=$(curl -sS -b "$COOKIE" "$BASE/boq-projects")
          PID=$(echo "$LIST" | grep -oE '/boq-projects/[0-9]+"' | head -1 | grep -oE '[0-9]+')
          echo "project_id=$PID"

          # Add a building
          BODY=$(curl -sS -b "$COOKIE" "$BASE/boq-projects/${PID}/buildings/new")
          CSRF=$(echo "$BODY" | grep -oE 'name="_csrf"[^>]+value="[^"]+"' | head -1 | sed -E 's/.*value="([^"]+)".*/\1/')
          curl -sS -b "$COOKIE" -X POST \
            -d "_csrf=${CSRF}&building_name=BLK&primary_purpose=residential&purpose_subtype=Hostel&number_of_floors=1" \
            "$BASE/boq-projects/${PID}/buildings/new" -o /dev/null

          # Find building + floor ids
          PROJ=$(curl -sS -b "$COOKIE" "$BASE/boq-projects/${PID}")
          BID=$(echo "$PROJ" | grep -oE '/buildings/[0-9]+"' | head -1 | grep -oE '[0-9]+')
          BLD=$(curl -sS -b "$COOKIE" "$BASE/boq-projects/${PID}/buildings/${BID}")
          FID=$(echo "$BLD" | grep -oE '/floors/[0-9]+"' | head -1 | grep -oE '[0-9]+')
          echo "building_id=$BID floor_id=$FID"

          # GET template-checkbox view
          echo "---- GET /from-template/hostel-typical ----"
          OUT=$(curl -sS -b "$COOKIE" -w "\nHTTP=%{http_code}" \
            "$BASE/boq-projects/${PID}/buildings/${BID}/floors/${FID}/from-template/hostel-typical")
          STATUS=$(echo "$OUT" | tail -1 | sed 's/HTTP=//')
          echo "  status=$STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "  body: $(echo "$OUT" | head -c -8 | tail -c 2048)"
          fi

          # Extract CSRF from template page
          BODY=$(curl -sS -b "$COOKIE" \
            "$BASE/boq-projects/${PID}/buildings/${BID}/floors/${FID}/from-template/hostel-typical")
          CSRF=$(echo "$BODY" | grep -oE 'name="_csrf"[^>]+value="[^"]+"' | head -1 | sed -E 's/.*value="([^"]+)".*/\1/')
          echo "  csrf_len=${#CSRF}"

          # POST template save with 3 ticks (THIS IS THE GENERATE BOQ FLOW)
          echo "---- POST /from-template/hostel-typical/save (GENERATE) ----"
          OUT=$(curl -sS -b "$COOKIE" -X POST \
            -d "_csrf=${CSRF}&overhead_pct=30&profit_pct=0&contingency_pct=0&vat_pct=0&tick=0&tick=1&tick=2" \
            -w "\nHTTP=%{http_code}\nLOC=%{redirect_url}" \
            "$BASE/boq-projects/${PID}/buildings/${BID}/floors/${FID}/from-template/hostel-typical/save")
          STATUS=$(echo "$OUT" | grep '^HTTP=' | sed 's/HTTP=//')
          LOC=$(echo "$OUT" | grep '^LOC=' | sed 's/LOC=//')
          echo "  status=$STATUS"
          echo "  redirect=$LOC"
          if [ "$STATUS" = "500" ]; then
            echo "---- 500 BODY ----"
            echo "$OUT" | head -c -200 | tail -c 6000
          fi

          # If save redirected, follow to /boq view
          if [ -n "$LOC" ]; then
            echo "---- GET redirect target ($LOC) ----"
            OUT=$(curl -sS -b "$COOKIE" -w "\nHTTP=%{http_code}" "$LOC")
            STATUS=$(echo "$OUT" | tail -1 | sed 's/HTTP=//')
            echo "  status=$STATUS"
            if [ "$STATUS" = "500" ]; then
              echo "---- BOQ VIEW 500 BODY ----"
              echo "$OUT" | head -c -8 | tail -c 6000
            fi
          fi
