# Full E2E proof that /admin/agent/run returns real solar prospects after
# the Google News RSS + href/url key fix. Uses pure-requests OIDC PKCE
# (no headless Chrome) so the Render-cold-start + chromium-headless-shell
# quirks that broke the Playwright version don't matter here.
#
# Flow:
#   1. Warm KC + solarpro
#   2. GET /auth/login -> Flask seeds session w/ PKCE verifier + state,
#      302s us to KC authorize URL.
#   3. GET KC authorize page -> renders login form with action URL.
#   4. POST creds to KC action URL -> 302 back to solarpro /auth/callback
#      with ?code=... &state=...
#   5. GET /auth/callback -> Flask exchanges code, sets session cookies.
#   6. GET /admin/agent -> scrape CSRF token from form.
#   7. POST /admin/agent/run -> parse JSON, assert prospects.

name: Diag Deep-Crawl Agent E2E

on:
  workflow_dispatch:
    inputs:
      country:
        description: "Country to prospect (default: Ghana)"
        required: false
        default: "Ghana"
      sector:
        description: "Sector (default: Commercial)"
        required: false
        default: "Commercial"

permissions: { contents: read }

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SOLAR_BASE: https://solarpro.aiappinvent.com
      KC_BASE:    https://auth.aiappinvent.com
      ADMIN_EMAIL: support@aiappinvent.com
      ADMIN_PASSWORD: ${{ secrets.SOLARPRO_ADMIN_PASSWORD }}
      AGENT_COUNTRY: ${{ inputs.country }}
      AGENT_SECTOR:  ${{ inputs.sector }}
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install --quiet requests beautifulsoup4

      - name: Warm KC + solarpro
        run: |
          curl -fsS -o /dev/null -w "kc discovery   -> %{http_code} in %{time_total}s\n" \
            --retry 5 --retry-delay 5 --retry-all-errors --max-time 60 \
            "$KC_BASE/realms/solarpro/.well-known/openid-configuration"
          curl -fsS -o /dev/null -w "solarpro /     -> %{http_code} in %{time_total}s\n" \
            --max-time 30 "$SOLAR_BASE/"

      - name: Drive /admin/agent/run via OIDC PKCE
        run: |
          python3 <<'PY'
          import os, re, sys, time
          import requests
          from bs4 import BeautifulSoup
          from urllib.parse import urlparse, parse_qs

          BASE  = os.environ["SOLAR_BASE"]
          KC    = os.environ["KC_BASE"]
          EMAIL = os.environ["ADMIN_EMAIL"]
          PW    = os.environ["ADMIN_PASSWORD"]
          COUNTRY = os.environ.get("AGENT_COUNTRY") or "Ghana"
          SECTOR  = os.environ.get("AGENT_SECTOR")  or "Commercial"

          s = requests.Session()
          s.headers["User-Agent"] = "Mozilla/5.0 (e2e-bot)"
          # Persistent cookie jar across the OIDC redirect chain. By
          # default requests follows redirects + keeps cookies for the
          # same domain; we manage redirects manually so we can inspect
          # the chain.

          def hop(label, method, url, **kw):
              kw.setdefault("allow_redirects", False)
              kw.setdefault("timeout", 60)
              r = s.request(method, url, **kw)
              print(f"  [{label}] {method} {url[:90]}... -> {r.status_code}"
                    + (f"  -> {r.headers.get('Location','')[:90]}..." if r.is_redirect else ""))
              return r

          print("[1/7] GET /auth/login (seeds PKCE in Flask session) ...")
          r = hop("auth-login", "GET", f"{BASE}/auth/login")
          if not r.is_redirect:
              print(f"  FAIL: expected 302, got {r.status_code}; body: {r.text[:300]}"); sys.exit(2)
          kc_authorize_url = r.headers["Location"]
          if not kc_authorize_url.startswith(KC):
              print(f"  FAIL: redirect went to {kc_authorize_url[:120]}"); sys.exit(2)

          print("[2/7] GET KC authorize (loads login form) ...")
          r = hop("kc-auth", "GET", kc_authorize_url, allow_redirects=True)
          if r.status_code != 200:
              print(f"  FAIL: KC returned {r.status_code}; body: {r.text[:300]}"); sys.exit(2)
          soup = BeautifulSoup(r.text, "html.parser")
          form = soup.find("form", id="kc-form-login") or soup.find("form")
          if not form:
              print("  FAIL: KC login form not found"); sys.exit(2)
          action = form.get("action")
          if not action:
              print("  FAIL: KC form has no action attribute"); sys.exit(2)
          print(f"  form action: {action[:90]}...")

          print(f"[3/7] POST creds to KC for {EMAIL} ...")
          # KC's form posts to its action URL with username/password and
          # any hidden fields (credentialId).
          fields = {"username": EMAIL, "password": PW}
          for inp in form.find_all("input"):
              n = inp.get("name"); t = inp.get("type", "text")
              if n and t == "hidden":
                  fields.setdefault(n, inp.get("value", ""))
          r = hop("kc-post", "POST", action, data=fields)
          if r.status_code == 200:
              # Stayed on KC -- credentials rejected or another step needed
              if "Invalid" in r.text:
                  print("  FAIL: KC says 'Invalid username or password'"); sys.exit(3)
              print(f"  FAIL: KC kept us at 200 (no redirect); body: {r.text[:400]}"); sys.exit(3)
          callback_url = r.headers.get("Location", "")
          if not callback_url:
              print(f"  FAIL: KC POST returned {r.status_code} with no Location"); sys.exit(3)
          # Sometimes KC redirects to itself again (e.g. another execution
          # step). Follow once if it stays on KC.
          if callback_url.startswith(KC):
              print(f"  KC sent us to another KC step: {callback_url[:90]}")
              r = hop("kc-step2", "GET", callback_url, allow_redirects=True)
              if r.status_code != 200:
                  print(f"  FAIL on KC step2: {r.status_code}"); sys.exit(3)
              # If this is yet another form, refuse to loop -- almost certainly
              # an MFA / Terms / consent screen we can't satisfy headless.
              soup = BeautifulSoup(r.text, "html.parser")
              if soup.find("form", id="kc-form-login"):
                  print("  FAIL: KC pushed us back to a login form -- creds likely wrong"); sys.exit(3)
              # If we landed on a non-KC URL (callback), capture it
              if r.url.startswith(BASE):
                  callback_url = r.url
              else:
                  print(f"  FAIL: stuck on KC at {r.url[:90]}"); sys.exit(3)

          print(f"[4/7] GET solarpro /auth/callback (exchanges code) ...")
          # Some KCs return absolute Location; some relative. Handle both.
          if callback_url.startswith("/"):
              callback_url = BASE + callback_url
          r = hop("callback", "GET", callback_url, allow_redirects=False)
          if r.is_redirect:
              next_url = r.headers["Location"]
              if not next_url.startswith("http"): next_url = BASE + next_url
              print(f"  callback set session cookies, redirected to: {next_url[:90]}")
              r = hop("post-callback", "GET", next_url, allow_redirects=True)
          if r.status_code != 200:
              print(f"  FAIL: post-callback returned {r.status_code}; body: {r.text[:400]}"); sys.exit(4)
          print(f"  session cookies set: {[c.name for c in s.cookies]}")

          print("[5/7] GET /admin/agent (extract CSRF) ...")
          r = s.get(f"{BASE}/admin/agent", timeout=30)
          if r.status_code != 200:
              print(f"  FAIL: /admin/agent returned {r.status_code}; body: {r.text[:400]}"); sys.exit(5)
          m = re.search(r'name=["\']_csrf["\']\s+value=["\']([a-f0-9]+)["\']', r.text)
          csrf = m.group(1) if m else ""
          if not csrf:
              # Try meta tag
              m2 = re.search(r'<meta\s+name=["\']csrf-token["\']\s+content=["\']([a-f0-9]+)["\']', r.text)
              csrf = m2.group(1) if m2 else ""
          if not csrf:
              print("  FAIL: no CSRF token found on /admin/agent"); sys.exit(5)
          print(f"  csrf: {csrf[:8]}...")

          print(f"[6/7] POST /admin/agent/run (country={COUNTRY}, sector={SECTOR}, count=8) ...")
          t0 = time.time()
          r = s.post(
              f"{BASE}/admin/agent/run",
              data={
                  "_csrf": csrf,
                  "country": COUNTRY,
                  "sector": SECTOR,
                  "system_kw": "10-100",
                  "budget": "$5,000-$100,000",
                  "focus": "",
                  "count": "8",
              },
              headers={"X-CSRF-Token": csrf},
              timeout=300,
          )
          dt = time.time() - t0
          print(f"  status={r.status_code} in {dt:.1f}s")

          print("[7/7] parse response")
          try:
              body = r.json()
          except Exception:
              body = {"raw": r.text[:800]}
          if not isinstance(body, dict):
              print(f"  FAIL: not a JSON dict: {body!r}"); sys.exit(6)
          ok        = body.get("ok")
          prospects = body.get("prospects") or []
          err       = body.get("search_error")
          ai_prov   = body.get("ai_provider") or body.get("provider") or "?"
          print(f"\n=== RESPONSE ===")
          print(f"  ok            = {ok}")
          print(f"  prospects     = {len(prospects)}")
          print(f"  search_error  = {err}")
          print(f"  ai_provider   = {ai_prov}")
          if "raw" in body: print(f"  raw           = {body['raw'][:400]}")
          print()
          print("=== Top 8 prospects ===")
          for i, p in enumerate(prospects[:8], 1):
              t   = p.get("type", "?")
              pri = p.get("priority", "?")
              org = (p.get("company_name") or "?")[:30]
              loc = (p.get("location") or "?")[:25]
              url_ok = "Y" if p.get("source_url") else "n"
              pitch = (p.get("pitch") or p.get("source_title")
                       or p.get("source_snippet") or "?")[:70]
              print(f"  #{i} [{t:6s}/{pri:6s} url={url_ok}] {org:30s} {loc:25s} {pitch}")

          with_url = sum(1 for p in prospects if p.get("source_url"))
          ok_overall = bool(ok) and with_url >= 1
          print()
          print(f"{'PASS' if ok_overall else 'FAIL'}: ok={ok}  prospects={len(prospects)}  with_url={with_url}")
          sys.exit(0 if ok_overall else 1)
          PY
