# READ-ONLY. Reproduces the /enterprise/programmes/new permission decision against the LIVE
# database, for every enterprise user, and names whoever would be handed the 403 the owner
# reported. It only SELECTs -- there is no confirm gate because there is nothing to confirm.
#
# See scripts/diag_enterprise_permissions.py for why the fresh-session tenant default is
# reimplemented there: it is the step that decides WHICH tenant the permission is judged
# against, and therefore the step that produces the 403.

name: Diag Enterprise Permissions

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install --quiet psycopg2-binary

      - name: Resolve solarpro-postgres
        id: pg
        run: |
          set -e
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/postgres?limit=20" -o /tmp/pg.json
          PG_ID=$(python3 -c "
          import json
          d=json.load(open('/tmp/pg.json'))
          for item in (d if isinstance(d,list) else []):
              pg=item.get('postgres', item)
              if pg.get('name')=='solarpro-postgres':
                  print(pg.get('id','')); break
          ")
          if [ -z "$PG_ID" ]; then
            echo "::error::solarpro-postgres not found"; exit 1
          fi
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/postgres/$PG_ID/connection-info" -o /tmp/conn.json
          EXT=$(python3 -c "import json; print(json.load(open('/tmp/conn.json')).get('externalConnectionString',''))")
          echo "::add-mask::$EXT"
          echo "external=$EXT" >> $GITHUB_OUTPUT

      - name: Who can create a programme?
        env:
          DATABASE_URL: ${{ steps.pg.outputs.external }}
        run: python scripts/diag_enterprise_permissions.py
