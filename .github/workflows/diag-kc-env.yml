# One-off: dump current env vars on the solarpro-keycloak Render service
# so we can see whether PUT /env-vars actually landed KC_HOSTNAME and
# friends, or if Render silently rejected/ignored them.
#
# Read-only. Delete once the issuer URL is correct.

name: Diag KC Env

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
    steps:
      - name: Find service + dump env vars
        run: |
          set -e
          SVC=$(curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?name=solarpro-keycloak" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['service']['id'])")
          echo "service id: $SVC"
          echo "---env vars---"
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SVC/env-vars?limit=50" \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          for item in d:
              ev = item.get('envVar', item)
              k = ev.get('key', '?')
              v = ev.get('value', '')
              # Mask secrets but show first/last chars for sanity.
              if any(s in k.upper() for s in ('PASSWORD','SECRET','TOKEN','KEY','URL')):
                  if v and len(v) > 12:
                      v = v[:8] + '...' + v[-4:]
              print(f'{k:35s} {v}')
          "
          echo "---deploys (latest 3)---"
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SVC/deploys?limit=3" \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          for item in d:
              dep = item.get('deploy', item)
              print(f\"{dep.get('id','?'):30s}  {dep.get('status','?'):15s}  finishedAt={dep.get('finishedAt','-')}\")
          "
