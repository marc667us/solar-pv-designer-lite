name: Diag PC BOQ 500
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Isolated probes with sleep between
        env:
          OWNER_PW: ${{ secrets.SOLARPRO_OWNER_PASSWORD }}
        run: |
          set +e
          BASE="https://solarpro.aiappinvent.com"
          COOKIE=$(mktemp)
          BODY=$(curl -sS -c "$COOKIE" -b "$COOKIE" "$BASE/login?legacy=1")
          CSRF=$(echo "$BODY" | grep -oE 'name="_csrf"[^>]+value="[^"]+"' | head -1 | sed -E 's/.*value="([^"]+)".*/\1/')
          curl -sS -o /dev/null -b "$COOKIE" -c "$COOKIE" -X POST \
            -d "username=marc667us&password=${OWNER_PW}&_csrf=${CSRF}" \
            "$BASE/login?legacy=1"

          # Create BOQ from procurement-center
          BODY=$(curl -sS -b "$COOKIE" "$BASE/procurement-center")
          CSRF=$(echo "$BODY" | grep -oE 'name="_csrf"[^>]+value="[^"]+"' | head -1 | sed -E 's/.*value="([^"]+)".*/\1/')
          IDS=$(echo "$BODY" | grep -oE 'name="product_ids" value="[0-9]+"' | grep -oE '[0-9]+' | head -3 | tr '\n' ' ')
          DATA="_csrf=${CSRF}&doc_type=boq&currency=USD&title=DiagBOQ_v2"
          for ID in $IDS; do DATA="${DATA}&product_ids=${ID}"; done
          curl -sS -b "$COOKIE" -X POST -d "$DATA" -o /dev/null "$BASE/procurement-center/add"
          LIST=$(curl -sS -b "$COOKIE" "$BASE/boms")
          BID=$(echo "$LIST" | grep -oE 'href="/boms/[0-9]+"' | head -1 | grep -oE '[0-9]+')
          echo "bom_id=$BID"
          echo ""

          # Probe rate-buildup IN ISOLATION with 30 sec sleep between
          for path in "/boms/${BID}/boq" "/boms/${BID}/rate-buildup" "/boms/${BID}/boq.xlsx?include_buildup=1" "/boms/${BID}/boq.pdf?include_buildup=1"; do
            START=$(date +%s)
            OUT=$(curl -sS -b "$COOKIE" --max-time 60 -w "\nHTTP=%{http_code}\nTIME=%{time_total}" "$BASE${path}")
            END=$(date +%s)
            STATUS=$(echo "$OUT" | grep '^HTTP=' | sed 's/HTTP=//')
            TIME=$(echo "$OUT" | grep '^TIME=' | sed 's/TIME=//')
            ELAPSED=$((END - START))
            printf "  %-55s -> %s (curl %ss, wall %ss)\n" "$path" "$STATUS" "$TIME" "$ELAPSED"
            if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
              # dump first 2000 chars of body for inspection
              echo "    ---- body sample ----"
              echo "$OUT" | head -c -200 | head -c 2000
              echo ""
              echo "    ---- end ----"
            fi
            sleep 30  # let worker recover
          done
