# Diag: list Render env-var KEYS (not values) and flag SECRET_KEY status.
#
# Triggered manually after a user reports OIDC_STATE_MISMATCH. If
# SECRET_KEY is unset, every Render restart generates a new random
# in-memory key (web_app.py:66 `secrets.token_hex(32)` fallback) and
# every in-flight OIDC session cookie becomes unverifiable -> state
# mismatch on the callback.
#
# Read-only. No env-vars are mutated. Values are NEVER printed --
# only keys + counts.

name: Diag Render env (SECRET_KEY pin check)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: List env-var KEYS on solarpro Render service
        run: |
          set -e
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100" \
            -o /tmp/env.json
          python3 - <<'PY'
          import json
          d = json.load(open('/tmp/env.json'))
          if isinstance(d, list):
              keys = []
              for item in d:
                  ev = item.get('envVar', item)
                  k = ev.get('key', '')
                  if k:
                      keys.append(k)
              keys.sort()
              print(f"Total env-vars on Render service: {len(keys)}")
              for k in keys:
                  print(f"  - {k}")
              has_secret = 'SECRET_KEY' in keys
              print()
              print("=" * 64)
              if has_secret:
                  print("  OK: SECRET_KEY is pinned on Render env.")
                  print("  Restart-stable session cookies are guaranteed.")
              else:
                  print("  FAIL: SECRET_KEY is NOT set on Render env!")
                  print()
                  print("  Root cause for OIDC_STATE_MISMATCH:")
                  print("  web_app.py:66 falls back to secrets.token_hex(32)")
                  print("  when SECRET_KEY env is unset. EVERY Render")
                  print("  restart -> new random key -> every in-flight")
                  print("  OIDC session cookie unverifiable -> state mismatch.")
                  print()
                  print("  Fix: set SECRET_KEY to a stable 64-char hex value")
                  print("  on the Render service. Once set, restart-stable.")
              print("=" * 64)
          else:
              print("Unexpected response shape:")
              print(json.dumps(d, indent=2)[:800])
          PY
