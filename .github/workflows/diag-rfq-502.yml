name: Diag RFQ 502
on: { workflow_dispatch: {} }
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Login + brute-probe RFQ ids 1..30
        env: { OWNER_PW: "${{ secrets.SOLARPRO_OWNER_PASSWORD }}" }
        run: |
          set +e
          BASE="https://solarpro.aiappinvent.com"
          COOKIE=$(mktemp)
          BODY=$(curl -sS -c "$COOKIE" -b "$COOKIE" "$BASE/login?legacy=1")
          CSRF=$(echo "$BODY" | grep -oE 'name="_csrf"[^>]+value="[^"]+"' | head -1 | sed -E 's/.*value="([^"]+)".*/\1/')
          curl -sS -o /dev/null -b "$COOKIE" -c "$COOKIE" -X POST \
            -d "username=marc667us&password=${OWNER_PW}&_csrf=${CSRF}" \
            "$BASE/login?legacy=1"
          # Dump /rfqs raw to understand what's there
          LIST=$(curl -sS -b "$COOKIE" "$BASE/rfqs")
          echo "---- /rfqs HEAD ----"
          echo "$LIST" | head -c 500
          echo ""
          echo "---- /rfqs grep for IDs ----"
          echo "$LIST" | grep -oE "rfqs/[0-9]+" | sort -u
          echo ""
          echo "---- brute probe /rfqs/1..30 ----"
          for ID in $(seq 1 30); do
            START=$(date +%s)
            STATUS=$(curl -sS -b "$COOKIE" --max-time 30 -o /dev/null -w "%{http_code}" "$BASE/rfqs/$ID")
            END=$(date +%s)
            ELAPSED=$((END - START))
            if [ "$STATUS" != "404" ]; then
              printf "  /rfqs/%-3s -> %s  (%ss)\n" "$ID" "$STATUS" "$ELAPSED"
              if [ "$STATUS" = "500" ] || [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ]; then
                echo "    !! FAIL"
                # Dump body for the failure
                BODY=$(curl -sS -b "$COOKIE" --max-time 15 "$BASE/rfqs/$ID")
                echo "$BODY" | head -c 2000
                echo ""
              fi
            fi
            sleep 3
          done
