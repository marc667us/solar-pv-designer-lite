name: Diag RFQ 502
on: { workflow_dispatch: {} }
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Login + probe RFQ view
        env: { OWNER_PW: "${{ secrets.SOLARPRO_OWNER_PASSWORD }}" }
        run: |
          set +e
          BASE="https://solarpro.aiappinvent.com"
          COOKIE=$(mktemp)
          BODY=$(curl -sS -c "$COOKIE" -b "$COOKIE" "$BASE/login?legacy=1")
          CSRF=$(echo "$BODY" | grep -oE 'name="_csrf"[^>]+value="[^"]+"' | head -1 | sed -E 's/.*value="([^"]+)".*/\1/')
          curl -sS -o /dev/null -b "$COOKIE" -c "$COOKIE" -X POST \
            -d "username=marc667us&password=${OWNER_PW}&_csrf=${CSRF}" \
            "$BASE/login?legacy=1"
          # List RFQs
          LIST=$(curl -sS -b "$COOKIE" "$BASE/rfqs")
          RIDS=$(echo "$LIST" | grep -oE 'href="/rfqs/[0-9]+"' | grep -oE '[0-9]+' | sort -u | head -5)
          echo "rfq_ids=$RIDS"
          # Try each one with 30 sec timeout
          for ID in $RIDS; do
            START=$(date +%s); OUT=$(curl -sS -b "$COOKIE" --max-time 45 -w "\nHTTP=%{http_code}" "$BASE/rfqs/$ID"); END=$(date +%s)
            STATUS=$(echo "$OUT" | grep '^HTTP=' | sed 's/HTTP=//')
            ELAPSED=$((END - START))
            printf "  /rfqs/%-4s -> %s  (%ss)\n" "$ID" "$STATUS" "$ELAPSED"
            if [ "$STATUS" = "500" ] || [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ]; then
              echo "    ---- body (first 3KB after status) ----"
              echo "$OUT" | head -c -8 | head -c 3000
              echo ""
              echo "    ---- end ----"
            fi
            sleep 8
          done
