name: Fix KC Memory OOM

# Patch the solarpro-keycloak Render service to stop the boot-time OOM kill
# cycle on the free 512 MiB tier. Diagnosed 2026-06-30:
#   - 7 OOM kills in 5 days, all {"memoryLimit":"512Mi"} at COLD START, not under load.
#   - Traffic is ~75 legitimate user requests / 12h (NOT a DDoS).
#   - JVM had no -Xmx cap so it tried to take ~70% of host memory; on Render
#     the host reports uncapped, so heap could balloon past 512 MiB at peak.
#   - Postgres pool at boot was trying to acquire connections aggressively
#     (Hibernate `Acquisition timeout while waiting for new connection`)
#     which compounded the memory spike.
#
# Patch (4 env vars, each via the SINGLE-KEY PUT endpoint -- non-destructive):
#   1. JAVA_OPTS_APPEND caps the heap to 50% (~256 MB) + serial GC + metaspace
#      ceiling + small stack -> fits inside 512 MiB cgroup with ~80 MB headroom.
#   2. KC_DB_POOL_MAX_SIZE/INITIAL/MIN tame the Agroal pool so the Postgres-init
#      memory spike stops.
#
# Trigger:  gh workflow run "Fix KC Memory OOM"

on:
  workflow_dispatch:
    inputs:
      max_ram_pct:
        description: "MaxRAMPercentage for the JVM (default 50.0 -> ~256 MB max heap on 512 MiB)"
        required: false
        default: "50.0"
      db_pool_max:
        description: "Agroal max pool size (default 5; bump to 10 if traffic grows)"
        required: false
        default: "5"

permissions:
  contents: read

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      MAX_RAM_PCT: ${{ github.event.inputs.max_ram_pct }}
      POOL_MAX:    ${{ github.event.inputs.db_pool_max }}
    steps:
      - name: Resolve solarpro-keycloak service ID
        run: |
          set -euo pipefail
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?name=solarpro-keycloak&limit=10" > /tmp/svc.json
          KC_ID=$(jq -r '.[] | .service | select(.name=="solarpro-keycloak") | .id' /tmp/svc.json | head -1)
          if [ -z "$KC_ID" ] || [ "$KC_ID" = "null" ]; then
            echo "::error::Could not resolve solarpro-keycloak service id"; exit 1
          fi
          echo "KC_SERVICE_ID=$KC_ID" >> "$GITHUB_ENV"
          echo "Resolved KC service id=$KC_ID"

      - name: PUT JAVA_OPTS_APPEND (single-key, non-destructive)
        run: |
          set -euo pipefail
          JOPTS="-XX:MaxRAMPercentage=${MAX_RAM_PCT} -XX:InitialRAMPercentage=30.0 -XX:+UseSerialGC -XX:MaxMetaspaceSize=96m -Xss256k -XX:+ExitOnOutOfMemoryError"
          echo "Setting JAVA_OPTS_APPEND=$JOPTS"
          BODY=$(jq -nc --arg v "$JOPTS" '{value: $v}')
          curl -fsS -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$KC_SERVICE_ID/env-vars/JAVA_OPTS_APPEND" \
            -d "$BODY" | jq '.'

      - name: PUT KC_DB_POOL_MAX_SIZE
        run: |
          set -euo pipefail
          BODY=$(jq -nc --arg v "$POOL_MAX" '{value: $v}')
          curl -fsS -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$KC_SERVICE_ID/env-vars/KC_DB_POOL_MAX_SIZE" \
            -d "$BODY" | jq '.'

      - name: PUT KC_DB_POOL_INITIAL_SIZE
        run: |
          set -euo pipefail
          BODY=$(jq -nc '{value: "2"}')
          curl -fsS -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$KC_SERVICE_ID/env-vars/KC_DB_POOL_INITIAL_SIZE" \
            -d "$BODY" | jq '.'

      - name: PUT KC_DB_POOL_MIN_SIZE
        run: |
          set -euo pipefail
          BODY=$(jq -nc '{value: "2"}')
          curl -fsS -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$KC_SERVICE_ID/env-vars/KC_DB_POOL_MIN_SIZE" \
            -d "$BODY" | jq '.'

      - name: Trigger a fresh deploy so the new env vars take effect
        run: |
          set -euo pipefail
          DEP=$(curl -fsS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$KC_SERVICE_ID/deploys" \
            -d '{"clearCache":"do_not_clear"}' \
            | jq -r '.id')
          echo "Triggered deploy: $DEP"
          echo "KC_DEPLOY_ID=$DEP" >> "$GITHUB_ENV"

      - name: Wait for the deploy to finish
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            STATUS=$(curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$KC_SERVICE_ID/deploys/$KC_DEPLOY_ID" \
              | jq -r '.status')
            echo "[$i] deploy status: $STATUS"
            case "$STATUS" in
              live)            echo "Deploy LIVE"; exit 0 ;;
              deactivated|build_failed|update_failed|canceled)
                                echo "::error::Deploy ended in $STATUS"; exit 1 ;;
            esac
            sleep 10
          done
          echo "::warning::Deploy did not reach live within 10 minutes; check Render dashboard"

      - name: Confirm KC responds after the patch
        run: |
          set -uo pipefail
          for i in $(seq 1 20); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              "https://auth.aiappinvent.com/realms/solarpro/.well-known/openid-configuration" || echo "000")
            echo "[$i] /realms/solarpro discovery -> $CODE"
            if [ "$CODE" = "200" ]; then
              echo "OK: KC is serving discovery; memory patch holding."
              exit 0
            fi
            sleep 15
          done
          echo "::warning::KC did not return 200 within 5 minutes -- check logs"
