# Wire SMTP into the solarpro KC realm so verification + reset-password
# emails actually leave the building. Reuses the SMTP_* GH secrets the
# solar app already authenticates with (Brevo at the moment).
#
# What it does:
#   1. Reads SMTP_HOST/PORT/USER/PASS/FROM/TLS from GH secrets.
#   2. PUTs the solarpro realm with a fully-populated smtpServer block.
#   3. Triggers a no-op test email so we get an actionable error in the
#      workflow log if the credentials are wrong, before a real user
#      hits a broken verify-email flow.
#
# Re-runnable: each invocation overwrites the smtpServer block, which
# is the easiest way to rotate the SMTP password after a Brevo key
# rotation.
#
# realm-export.json intentionally does NOT carry smtpServer -- keeping
# the password out of git. This workflow is the only source.

name: Fix KC Realm SMTP

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      KEYCLOAK_ISSUER: ${{ secrets.KEYCLOAK_ISSUER }}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.KC_BOOTSTRAP_ADMIN_PASSWORD }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_TLS:  ${{ secrets.SMTP_TLS }}
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install --quiet requests

      - name: Validate SMTP_* secrets are present
        run: |
          set -e
          for v in SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASS SMTP_FROM; do
              if [ -z "${!v}" ]; then
                  echo "::error::$v GH secret is empty"
                  exit 1
              fi
              echo "OK -- $v is set"
          done

      - name: PUT smtpServer on solarpro realm
        run: |
          python3 << 'PY'
          import os, sys, json, requests

          BASE = os.environ['KEYCLOAK_ISSUER'].rsplit('/realms/', 1)[0]
          ADM = os.environ['KC_BOOTSTRAP_ADMIN_PASSWORD']

          tok = requests.post(
              f"{BASE}/realms/master/protocol/openid-connect/token",
              data={"client_id":"admin-cli","grant_type":"password",
                    "username":"admin","password":ADM},
              timeout=10).json()["access_token"]
          H = {"Authorization": f"Bearer {tok}", "Content-Type":"application/json"}

          # KC's smtpServer schema -- all values are strings (KC parses).
          # `starttls` enables STARTTLS upgrade on port 587 (Brevo default).
          # `ssl` enables straight TLS on port 465. SMTP_TLS env tells us
          # which one to use: empty/false -> STARTTLS, "true" / "1" -> SSL.
          # auth=true means username+password auth, which is what Brevo wants.
          # Solar's convention (per web_app.py:172):
          #   SMTP_TLS=true  -> STARTTLS on 587
          #   SMTP_TLS=false -> SSL on 465
          # KC's flags are independent (starttls + ssl), so flip
          # accordingly. use_starttls=True means port 587 + STARTTLS;
          # use_starttls=False means port 465 + direct SSL.
          use_starttls = (os.environ.get('SMTP_TLS','').lower()
                          in ('true','1','yes','on'))
          use_ssl = not use_starttls
          # Render free tier blocks outbound SMTP on 25/465/587 (anti-spam
          # default). Brevo's alternative port 2525 is unblocked. We
          # override port + force STARTTLS for KC only; solar continues
          # to use the original SMTP_PORT for its own send path which
          # works because solar is also on Render free but with the
          # same restriction -- wait, actually if Render blocks 587
          # solar's mail wouldn't work either. Confirming via:
          #   solar's existing reader-followup pipeline did send 7
          #   Brevo emails on 2026-06-11 per [[project-solar-pv-session-2026-06-11]]
          # so something works there. The smtplib probe in this
          # workflow ALSO works from the GH runner. Net: GH runners +
          # solar (which is on Render free) BOTH reach 587 fine, only
          # this KC service times out. That points at KC's individual
          # pod-level network policy or quirky Render free behaviour
          # for new services. 2525 is the documented fallback.
          smtp_host = os.environ['SMTP_HOST']
          # Honor explicit override via SMTP_PORT_FOR_KC if set; else 2525.
          smtp_port = os.environ.get('SMTP_PORT_FOR_KC', '2525')
          # 2525 is always STARTTLS-mode for Brevo.
          use_starttls = True
          use_ssl = False
          smtp = {
              "host":            smtp_host,
              "port":            smtp_port,
              "from":            os.environ['SMTP_FROM'],
              "fromDisplayName": "SolarPro Global",
              "replyTo":         os.environ['SMTP_FROM'],
              "envelopeFrom":    "",
              "auth":            "true",
              "user":            os.environ['SMTP_USER'],
              "password":        os.environ['SMTP_PASS'],
              "starttls":        "true"  if use_starttls else "false",
              "ssl":             "false" if use_starttls else "true",
          }

          # Print the safe subset for diag (no creds).
          print("smtp config (password redacted):")
          for k, v in smtp.items():
              if k in ("password",):
                  print(f"  {k:18s} = <{len(v)} chars>")
              else:
                  print(f"  {k:18s} = {v}")

          r = requests.put(
              f"{BASE}/admin/realms/solarpro",
              headers=H,
              json={"smtpServer": smtp},
              timeout=10,
          )
          if r.status_code not in (204, 200):
              sys.stderr.write(f"PUT failed: {r.status_code}: {r.text[:500]}\n")
              sys.exit(1)
          print("PUT smtpServer -> 204")

          # Verify by reading it back.
          after = requests.get(f"{BASE}/admin/realms/solarpro", headers=H).json()
          stored = after.get("smtpServer", {})
          print("realm smtpServer after PUT:")
          for k in ("host","port","from","fromDisplayName","user","auth","starttls","ssl"):
              print(f"  {k:18s} = {stored.get(k)}")
          PY

      - name: Smtplib probe (verify creds independent of KC)
        run: |
          python3 << 'PY'
          import os, smtplib, ssl, sys
          h = os.environ['SMTP_HOST']
          p = int(os.environ['SMTP_PORT'])
          u = os.environ['SMTP_USER']
          pw = os.environ['SMTP_PASS']
          tls_flag = os.environ.get('SMTP_TLS','').lower()
          use_starttls = tls_flag in ('true','1','yes','on')
          print(f"connecting {h}:{p} use_starttls={use_starttls}")
          try:
              if use_starttls:
                  s = smtplib.SMTP(h, p, timeout=15)
                  s.ehlo()
                  s.starttls(context=ssl.create_default_context())
                  s.ehlo()
              else:
                  s = smtplib.SMTP_SSL(h, p, timeout=15, context=ssl.create_default_context())
              code, msg = s.login(u, pw)
              print(f"login -> {code} {msg.decode() if isinstance(msg,bytes) else msg}")
              s.quit()
              print("OK -- smtplib login succeeded; creds valid + network reachable from runner")
          except Exception as e:
              print(f"FAIL smtplib: {type(e).__name__}: {e}")
              sys.exit(1)
          PY

      - name: Ensure master admin user has email + first/last name
        run: |
          python3 << 'PY'
          import os, requests
          BASE = os.environ['KEYCLOAK_ISSUER'].rsplit('/realms/', 1)[0]
          ADM = os.environ['KC_BOOTSTRAP_ADMIN_PASSWORD']
          tok = requests.post(
              f"{BASE}/realms/master/protocol/openid-connect/token",
              data={"client_id":"admin-cli","grant_type":"password",
                    "username":"admin","password":ADM},
              timeout=10).json()["access_token"]
          H = {"Authorization": f"Bearer {tok}", "Content-Type":"application/json"}
          # KC's testSMTPConnection sends to the *master* admin's email.
          # Without one, send fails. Set it idempotently.
          # support@aiappinvent.com is a real Google Workspace mailbox
          # the owner can open + read (per CLAUDE.md project_aiapinvent.md).
          # KC's testSMTPConnection sends TO this address, so it must be
          # a real deliverable inbox.
          ADMIN_EMAIL = "support@aiappinvent.com"
          users = requests.get(
              f"{BASE}/admin/realms/master/users?username=admin&exact=true",
              headers=H, timeout=10).json()
          if not users:
              print("FAIL: master admin not found"); raise SystemExit(1)
          uid = users[0]['id']
          # Idempotent: always PUT so we overwrite any prior placeholder.
          r = requests.put(
              f"{BASE}/admin/realms/master/users/{uid}",
              headers=H,
              json={"email": ADMIN_EMAIL,
                    "firstName": "SolarPro", "lastName": "Admin",
                    "emailVerified": True},
              timeout=10)
          print(f"set master admin email -> {ADMIN_EMAIL} HTTP {r.status_code}")
          PY

      - name: Fetch KC service logs (last 60 lines) for diag context
        if: always()
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -e
          # We need the KC service id; the env block doesn't carry it
          # because the deploy workflow normally resolves it at runtime.
          SVC=$(curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?name=solarpro-keycloak" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)[0]['service']['id'])")
          OWNER=$(curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/owners?limit=5" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)[0]['owner']['id'])")
          # Render's logs endpoint takes a JSON-array param for resource.
          # We fetch the last 60 lines, filter to SMTP-related.
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            -G "https://api.render.com/v1/logs" \
            --data-urlencode "ownerId=$OWNER" \
            --data-urlencode "resource=$SVC" \
            --data-urlencode "limit=60" \
            --data-urlencode "direction=backward" \
            -o /tmp/kclogs.json || true
          echo "--- last 60 KC log lines (most recent) ---"
          python3 -c "
          import json
          try:
              d = json.load(open('/tmp/kclogs.json'))
              for entry in (d.get('logs') or []):
                  msg = entry.get('message','')
                  print(msg[:300])
          except Exception as e:
              print(f'(could not parse logs: {e})')
          " | head -60

      - name: Send a KC-side test email (admin -> admin)
        run: |
          python3 << 'PY'
          import os, sys, json, requests
          BASE = os.environ['KEYCLOAK_ISSUER'].rsplit('/realms/', 1)[0]
          ADM = os.environ['KC_BOOTSTRAP_ADMIN_PASSWORD']
          tok = requests.post(
              f"{BASE}/realms/master/protocol/openid-connect/token",
              data={"client_id":"admin-cli","grant_type":"password",
                    "username":"admin","password":ADM},
              timeout=10).json()["access_token"]
          H = {"Authorization": f"Bearer {tok}", "Content-Type":"application/json"}

          # Send to the master admin's configured email (the smtpServer
          # block also carries `from` so KC has a recipient). KC's
          # /admin/realms/{realm}/testSMTPConnection takes the same
          # smtp config and triggers a delivery attempt.
          # Port 2525 + STARTTLS -- same combo as the PUT step (Render
          # free blocks outbound on standard SMTP ports).
          smtp_test = requests.post(
              f"{BASE}/admin/realms/solarpro/testSMTPConnection",
              headers=H,
              json={
                  "host":            os.environ['SMTP_HOST'],
                  "port":            os.environ.get('SMTP_PORT_FOR_KC', '2525'),
                  "from":            os.environ['SMTP_FROM'],
                  "fromDisplayName": "SolarPro Global",
                  "replyTo":         os.environ['SMTP_FROM'],
                  "envelopeFrom":    "",
                  "user":            os.environ['SMTP_USER'],
                  "password":        os.environ['SMTP_PASS'],
                  "auth":            "true",
                  "starttls":        "true",
                  "ssl":             "false",
              },
              timeout=30)
          print(f"testSMTPConnection -> HTTP {smtp_test.status_code}")
          print(f"body (first 500 chars): {smtp_test.text[:500]}")
          if smtp_test.status_code not in (200, 204):
              sys.stderr.write("test email failed -- check SMTP creds + provider\n")
              sys.exit(1)
          print("OK -- KC reports SMTP test succeeded")
          PY
