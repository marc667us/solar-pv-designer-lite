name: Get Render Deploy Logs

on:
  workflow_dispatch:
    inputs:
      deploy_id:
        description: 'Deploy ID to get logs for (leave blank for latest)'
        required: false

jobs:
  get-logs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest deploy and logs
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "=== Service info ==="
          curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID" \
            | python3 -m json.tool 2>/dev/null | grep -E '"status"|"startCommand"|"buildCommand"|"url"|"suspendedAt"' | head -20

          echo ""
          echo "=== Latest deploys ==="
          curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=5" \
            -o /tmp/deploys.json
          cat /tmp/deploys.json | python3 -m json.tool 2>/dev/null | grep -E '"id"|"status"|"message"|"finishedAt"' | head -40

          # Use input deploy_id or latest
          if [ -n "${{ inputs.deploy_id }}" ]; then
            DEPLOY_ID="${{ inputs.deploy_id }}"
          else
            DEPLOY_ID=$(python3 -c "
          import json
          data = json.load(open('/tmp/deploys.json'))
          # Find latest update_failed deploy
          for item in data:
              d = item.get('deploy', item)
              if d.get('status') in ('update_failed','build_failed','deactivated'):
                  print(d['id'])
                  break
          else:
              if data:
                  item = data[0]
                  d = item.get('deploy', item)
                  print(d.get('id',''))
          " 2>/dev/null || echo '')
          fi

          echo ""
          echo "=== Checking deploy: $DEPLOY_ID ==="

          if [ -n "$DEPLOY_ID" ]; then
            # Try log stream endpoint
            echo "--- /logs endpoint ---"
            curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID/logs" \
              | python3 -m json.tool 2>/dev/null || echo "(no json)"

            # Try events
            echo "--- deploy events ---"
            curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/events?limit=20" \
              | python3 -m json.tool 2>/dev/null | grep -E '"type"|"reason"|"failure"|"message"|"nonZeroExit"|"exitCode"' | head -30
          fi

          echo ""
          echo "=== Service logs (last 100 lines) ==="
          curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/logs?limit=100&type=runtime" \
            | python3 -m json.tool 2>/dev/null | head -150 || echo "(log stream not available via API)"
