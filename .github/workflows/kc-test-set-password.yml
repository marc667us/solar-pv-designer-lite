# One-off diagnostic: set a known TEST password on marc667us in KC.
# Lets us verify the KC OIDC login round-trip end-to-end without
# depending on the GH-Secret plaintext being whatever-it-is right now.
#
# After this runs you can log into KC with:
#   username: marc667us
#   password: <whatever is passed in `password` input, default below>
#
# This is a TEMPORARY diagnostic workflow. Delete after the auth
# round-trip is confirmed working.

name: KC Set Test Password

on:
  workflow_dispatch:
    inputs:
      username:
        description: "KC username to reset"
        required: false
        default: "marc667us"
      password:
        description: "Plaintext password to set (>= 8 chars)"
        required: false
        default: "TestPass1234"

permissions:
  contents: read

jobs:
  set:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      KEYCLOAK_BASE_URL: https://auth.aiappinvent.com
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.KC_BOOTSTRAP_ADMIN_PASSWORD }}
      TARGET_USER:    ${{ github.event.inputs.username }}
      TARGET_PASSWORD:${{ github.event.inputs.password }}
    steps:
      - name: Set password + clear lockout
        run: |
          python3 <<'PY'
          import os, json, urllib.request, urllib.parse, urllib.error
          BASE  = os.environ["KEYCLOAK_BASE_URL"].rstrip("/")
          ADM_U = os.environ["KC_BOOTSTRAP_ADMIN_USERNAME"]
          ADM_P = os.environ["KC_BOOTSTRAP_ADMIN_PASSWORD"]
          REALM = "solarpro"
          USER  = os.environ["TARGET_USER"]
          PWD   = os.environ["TARGET_PASSWORD"]

          def http(method, url, data=None, headers=None):
              req = urllib.request.Request(url, data=data, method=method,
                                            headers=headers or {})
              return urllib.request.urlopen(req, timeout=20)

          tok = http("POST",
                     f"{BASE}/realms/master/protocol/openid-connect/token",
                     data=urllib.parse.urlencode({
                         "grant_type":"password","client_id":"admin-cli",
                         "username":ADM_U,"password":ADM_P,
                     }).encode(),
                     headers={"Content-Type":"application/x-www-form-urlencoded"})
          access = json.loads(tok.read())["access_token"]
          h = {"Authorization": f"Bearer {access}"}

          r = http("GET",
                   f"{BASE}/admin/realms/{REALM}/users?username={urllib.parse.quote(USER)}&exact=true",
                   headers=h)
          users = json.loads(r.read())
          if not users:
              print(f"NO USER {USER}"); raise SystemExit(2)
          uid = users[0]["id"]
          print(f"user uid: {uid}")

          # Set password
          http("PUT",
               f"{BASE}/admin/realms/{REALM}/users/{uid}/reset-password",
               data=json.dumps({"type":"password","value":PWD,"temporary":False}).encode(),
               headers={**h, "Content-Type":"application/json"})
          print(f"password set")

          # Clear required actions + ensure enabled+verified
          urep = json.loads(http("GET", f"{BASE}/admin/realms/{REALM}/users/{uid}", headers=h).read())
          urep["enabled"] = True
          urep["emailVerified"] = True
          urep["requiredActions"] = []
          http("PUT", f"{BASE}/admin/realms/{REALM}/users/{uid}",
               data=json.dumps(urep).encode(),
               headers={**h, "Content-Type":"application/json"})
          print("user normalised (enabled, verified, no required actions)")

          # Clear brute-force
          try:
              http("DELETE",
                   f"{BASE}/admin/realms/{REALM}/attack-detection/brute-force/users/{uid}",
                   headers=h)
              print("brute-force lockout cleared")
          except urllib.error.HTTPError as e:
              print(f"brute-force clear: HTTP {e.code} (probably no record)")

          # Verify by reading credentials back
          c = json.loads(http("GET",
                              f"{BASE}/admin/realms/{REALM}/users/{uid}/credentials",
                              headers=h).read())
          print(f"credentials now: {[(x.get('type'), x.get('createdDate')) for x in c]}")

          print()
          print(f">>> READY TO TEST: login with {USER} / {PWD}")
          PY
