# Rotate the OpenRouter API key -- WITHOUT the owner touching a dashboard.
#
# WHY THIS EXISTS. The live key was exposed in a session transcript and must be replaced.
# Claude cannot mint a key from the workstation because the key value only lives in GitHub
# Secrets and the Render env -- but a WORKFLOW can read the secret, and OpenRouter exposes a
# provisioning API at /api/v1/keys. If the current key (or a dedicated provisioning key) has
# provisioning scope, the entire rotation runs here with no dashboard and no human step.
#
# WHAT IT DOES, in order:
#   1. INSPECT   -- GET /api/v1/key: what is this key, what is its daily limit, how much is left.
#   2. PROBE     -- GET /api/v1/keys: does it have PROVISIONING scope? (401/403 = no.)
#   3. CREATE    -- POST /api/v1/keys: mint the replacement.        [only when confirm=APPLY]
#   4. INSTALL   -- write it to the GH secret + the Render env, then redeploy. [confirm=APPLY]
#   5. VERIFY    -- prove the NEW key actually works before the old one dies.  [confirm=APPLY]
#   6. REVOKE    -- delete the old key, but ONLY after step 5 passed.          [confirm=APPLY]
#
# DEFAULT IS DRY-RUN (repo workflow rule): steps 1-2 only. Nothing is created, written or
# deleted without confirm=APPLY.
#
# THE ORDERING IS THE SAFETY. The old key is revoked LAST, and only after the new one has been
# proven to answer a real request. Revoking first -- or revoking on the assumption the new key
# works -- takes the writing service down with no way back, because the old secret is gone.
#
#   gh workflow run "OpenRouter Key Rotate"                      # dry-run: can we even do this?
#   gh workflow run "OpenRouter Key Rotate" -f confirm=APPLY     # rotate for real

name: OpenRouter Key Rotate

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "DRY-RUN by default (inspect + probe only). Type APPLY to actually rotate."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # The live key. Used to inspect, and -- if it carries provisioning scope -- to mint.
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      # OPTIONAL: a dedicated provisioning key. If present it is PREFERRED for provisioning,
      # because OpenRouter issues provisioning keys separately from inference keys and an
      # ordinary inference key usually cannot manage other keys.
      OPENROUTER_PROVISIONING_KEY: ${{ secrets.OPENROUTER_PROVISIONING_KEY }}
      RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
      CONFIRM:           ${{ inputs.confirm }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve mode
        run: |
          set -e
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error::OPENROUTER_API_KEY secret is empty -- nothing to rotate."; exit 1
          fi
          if [ "$CONFIRM" = "APPLY" ]; then
            echo "MODE=apply" >> $GITHUB_ENV
            echo "=== APPLY -- a new key WILL be created and installed ==="
          else
            echo "MODE=dryrun" >> $GITHUB_ENV
            echo "=== DRY-RUN -- inspect + probe only, nothing changes ==="
          fi

      # ---------------------------------------------------------------- 1. INSPECT
      # Also settles the quota question with live evidence rather than inference: this
      # endpoint reports the daily limit and how much of it is left.
      - name: Inspect the current key
        run: |
          set -e
          curl -sS -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            "https://openrouter.ai/api/v1/key" -o /tmp/key.json -w "HTTP %{http_code}\n" || true
          echo "--- current key (label / limits / usage; the key VALUE is never returned) ---"
          python3 - <<'PY'
          import json
          try:
              d = json.load(open('/tmp/key.json')).get('data', {})
          except Exception as e:
              print("could not parse response:", e); raise SystemExit(0)
          for f in ("label","limit","usage","limit_remaining","is_free_tier","rate_limit"):
              if f in d:
                  print(f"  {f}: {d[f]}")
          PY

      # ---------------------------------------------------------------- 2. PROBE
      # The whole question: can we manage keys from here, or does this need the owner?
      - name: Probe for provisioning scope
        run: |
          set -e
          PROV="${OPENROUTER_PROVISIONING_KEY:-$OPENROUTER_API_KEY}"
          if [ -n "$OPENROUTER_PROVISIONING_KEY" ]; then
            echo "Using the dedicated OPENROUTER_PROVISIONING_KEY."
          else
            echo "No OPENROUTER_PROVISIONING_KEY secret; testing the inference key itself."
          fi
          CODE=$(curl -sS -o /tmp/keys.json -w "%{http_code}" \
            -H "Authorization: Bearer $PROV" "https://openrouter.ai/api/v1/keys")
          echo "GET /api/v1/keys -> HTTP $CODE"
          if [ "$CODE" = "200" ]; then
            echo "PROVISIONING=yes" >> $GITHUB_ENV
            echo "✅ This key CAN manage keys. Full automated rotation is possible."
            python3 -c "
          import json
          d=json.load(open('/tmp/keys.json')).get('data',[])
          print(f'  {len(d)} key(s) on the account:')
          for k in d: print('   -', k.get('name'), '| hash', str(k.get('hash'))[:12], '| disabled', k.get('disabled'))
          "
          else
            echo "PROVISIONING=no" >> $GITHUB_ENV
            echo "❌ HTTP $CODE -- this key has NO provisioning scope."
            head -c 400 /tmp/keys.json || true; echo
            echo ""
            echo "TO MAKE FULL AUTOMATION WORK, the owner creates a PROVISIONING key once:"
            echo "  https://openrouter.ai/settings/provisioning-keys  ->  Create"
            echo "  gh secret set OPENROUTER_PROVISIONING_KEY -b \"<that key>\""
            echo "After that, this workflow rotates the inference key on its own, forever."
          fi

      - name: Stop here on dry-run
        if: env.MODE == 'dryrun'
        run: |
          echo "================================================================"
          echo "  DRY-RUN complete. Nothing was created, written or deleted."
          echo "  Provisioning available: $PROVISIONING"
          echo "  Re-run with -f confirm=APPLY to rotate."
          echo "================================================================"

      - name: Cannot rotate without provisioning scope
        if: env.MODE == 'apply' && env.PROVISIONING != 'yes'
        run: |
          echo "::error::confirm=APPLY was given, but this account's key cannot manage keys."
          echo "Create a provisioning key and store it as OPENROUTER_PROVISIONING_KEY (see above)."
          echo "NOTHING WAS CHANGED -- the current key is untouched and the app is unaffected."
          exit 1

      # ---------------------------------------------------------------- 3. CREATE
      - name: Mint the replacement key
        if: env.MODE == 'apply' && env.PROVISIONING == 'yes'
        run: |
          set -e
          PROV="${OPENROUTER_PROVISIONING_KEY:-$OPENROUTER_API_KEY}"
          NAME="solarpro-rotated-${GITHUB_RUN_ID}"
          curl -sS -X POST "https://openrouter.ai/api/v1/keys" \
            -H "Authorization: Bearer $PROV" -H "Content-Type: application/json" \
            -d "{\"name\":\"$NAME\"}" -o /tmp/new.json -w "HTTP %{http_code}\n"
          NEW=$(python3 -c "import json;print(json.load(open('/tmp/new.json')).get('key',''))")
          if [ -z "$NEW" ]; then
            echo "::error::key creation returned no key value"; head -c 400 /tmp/new.json; exit 1
          fi
          echo "::add-mask::$NEW"
          echo "NEW_KEY=$NEW" >> $GITHUB_ENV
          echo "NEW_NAME=$NAME" >> $GITHUB_ENV
          echo "OK: minted $NAME"

      # ---------------------------------------------------------------- 5. VERIFY (before install)
      # Prove the new key WORKS before it replaces anything. A rotation that installs a dead
      # key is an outage; this is the step that makes the whole thing safe to automate.
      #
      # Uses a free model and a 1-token completion -- costs one request off the daily 50.
      - name: Verify the NEW key actually answers
        if: env.MODE == 'apply' && env.PROVISIONING == 'yes'
        run: |
          set -e
          CODE=$(curl -sS -o /tmp/probe.json -w "%{http_code}" --max-time 90 \
            -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer $NEW_KEY" -H "Content-Type: application/json" \
            -d '{"model":"nvidia/nemotron-nano-9b-v2:free","max_tokens":1,
                 "messages":[{"role":"user","content":"hi"}]}')
          echo "new key -> HTTP $CODE"
          if [ "$CODE" = "429" ]; then
            echo "::warning::429 -- the DAILY QUOTA is exhausted on this account, but a 429"
            echo "means the key AUTHENTICATED. Treating as valid and continuing."
          elif [ "$CODE" != "200" ]; then
            echo "::error::the new key does not work (HTTP $CODE). NOT installing it."
            head -c 300 /tmp/probe.json
            echo "The old key remains in place and the app is unaffected."
            exit 1
          fi
          echo "OK: the new key is live."

      # ---------------------------------------------------------------- 4. INSTALL
      - name: Install into the GitHub secret
        if: env.MODE == 'apply' && env.PROVISIONING == 'yes'
        run: |
          set -e
          printf '%s' "$NEW_KEY" | gh secret set OPENROUTER_API_KEY --repo "$GITHUB_REPOSITORY"
          echo "OK: GH secret OPENROUTER_API_KEY updated."

      - name: Install into the Render env + redeploy
        if: env.MODE == 'apply' && env.PROVISIONING == 'yes'
        run: |
          set -e
          [ -n "$RENDER_API_KEY" ] || { echo "::error::RENDER_API_KEY missing"; exit 1; }
          [ -n "$RENDER_SERVICE_ID" ] || { echo "::error::RENDER_SERVICE_ID missing"; exit 1; }
          # Non-destructive single-var PUT: does not disturb the other env vars.
          CODE=$(curl -sS -o /tmp/env.json -w "%{http_code}" -X PUT \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/OPENROUTER_API_KEY" \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Content-Type: application/json" \
            -d "{\"value\":\"$NEW_KEY\"}")
          echo "Render env PUT -> HTTP $CODE"
          case "$CODE" in 200|201) ;; *) echo "::error::Render env update failed"; head -c 300 /tmp/env.json; exit 1 ;; esac
          curl -sS -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' -o /dev/null -w "deploy -> HTTP %{http_code}\n"
          echo "OK: Render updated and redeploying."

      # ---------------------------------------------------------------- 6. REVOKE (last)
      - name: Revoke the OLD key
        if: env.MODE == 'apply' && env.PROVISIONING == 'yes'
        run: |
          set -e
          PROV="${OPENROUTER_PROVISIONING_KEY:-$OPENROUTER_API_KEY}"
          # Identify the old key by its hash -- the value itself is never returned by the API.
          OLD_HASH=$(curl -sS -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            "https://openrouter.ai/api/v1/key" \
            | python3 -c "import sys,json;print(json.load(sys.stdin).get('data',{}).get('hash',''))")
          if [ -z "$OLD_HASH" ]; then
            echo "::warning::could not resolve the old key's hash -- REVOKE IT MANUALLY at"
            echo "  https://openrouter.ai/keys   (the new key is already installed and working)"
            exit 0
          fi
          CODE=$(curl -sS -o /tmp/del.json -w "%{http_code}" -X DELETE \
            -H "Authorization: Bearer $PROV" "https://openrouter.ai/api/v1/keys/$OLD_HASH")
          echo "DELETE old key -> HTTP $CODE"
          if [ "$CODE" != "200" ]; then
            echo "::warning::revoke returned $CODE -- delete it by hand at https://openrouter.ai/keys"
          else
            echo "OK: the exposed key is dead."
          fi

      - name: Summary
        if: always()
        run: |
          if [ "$MODE" = "apply" ] && [ "$PROVISIONING" = "yes" ]; then
            echo "ROTATED: new key minted, verified, installed in GH + Render, app redeployed,"
            echo "old key revoked. A fresh key also carries a FRESH 50-request daily allowance."
          else
            echo "No change made. Provisioning available: ${PROVISIONING:-unknown}"
          fi
