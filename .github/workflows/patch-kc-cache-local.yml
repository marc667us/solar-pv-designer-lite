name: Patch KC Cache Local

# Minimal, single-key follow-up to the rolled-back "Fix KC Memory OOM" bundle.
# Hypothesis: KC's 7 OOM kills in 5 days on Render free 512 MiB come from
# Infinispan cluster init at cold start, NOT from JVM heap headroom. Switching
# KC_CACHE=local skips the Infinispan clustering, saving ~80 MB heap + ~30 s
# of startup -- the cheapest change with the highest signal.
#
# Why single-key and not the full bundle: the prior 4-var bundle pushed
# cold-start to ~125 s, blowing past Render's deploy health-check window and
# leaving the next deploy stuck at update_in_progress. Rollback workflow
# 28466508857 reverted it; baseline KC works. Add ONE variable at a time and
# watch the deploy clear "live" before stacking another.
#
# Trigger:
#   Dry-run (default):  gh workflow run "Patch KC Cache Local"
#   Apply:              gh workflow run "Patch KC Cache Local" -f confirm=APPLY
#
# Manual rollback if this hangs the deploy:
#   curl -X DELETE -H "Authorization: Bearer $RENDER_API_KEY" \
#     "https://api.render.com/v1/services/$KC_SERVICE_ID/env-vars/KC_CACHE"
#   then POST a new deploy on the service.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type APPLY to actually set KC_CACHE; anything else = dry-run preview"
        required: false
        default: "DRY_RUN"

permissions:
  contents: read

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      CONFIRM: ${{ github.event.inputs.confirm }}
    steps:
      - name: Resolve solarpro-keycloak service ID
        run: |
          set -euo pipefail
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?name=solarpro-keycloak&limit=10" > /tmp/svc.json
          KC_ID=$(jq -r '.[] | .service | select(.name=="solarpro-keycloak") | .id' /tmp/svc.json | head -1)
          if [ -z "$KC_ID" ] || [ "$KC_ID" = "null" ]; then
            echo "::error::Could not resolve solarpro-keycloak service id"; exit 1
          fi
          echo "KC_SERVICE_ID=$KC_ID" >> "$GITHUB_ENV"
          echo "Resolved KC service id=$KC_ID"

      - name: Show current env-vars on the service (read-only diff target)
        run: |
          set -euo pipefail
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$KC_SERVICE_ID/env-vars?limit=100" \
            | jq -r '.[] | .envVar | "\(.key)=<value-redacted>"' \
            | sort
          echo "---"
          echo "Planned change: SET KC_CACHE=local"
          echo "CONFIRM input: $CONFIRM"

      - name: PUT KC_CACHE=local (apply only on CONFIRM=APPLY)
        if: ${{ github.event.inputs.confirm == 'APPLY' }}
        run: |
          set -euo pipefail
          BODY=$(jq -nc '{value: "local"}')
          curl -fsS -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$KC_SERVICE_ID/env-vars/KC_CACHE" \
            -d "$BODY" | jq '.'

      - name: Trigger a fresh deploy (apply only)
        if: ${{ github.event.inputs.confirm == 'APPLY' }}
        run: |
          set -euo pipefail
          DEP=$(curl -fsS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$KC_SERVICE_ID/deploys" \
            -d '{"clearCache":"do_not_clear"}' \
            | jq -r '.id')
          echo "Triggered deploy: $DEP"
          echo "KC_DEPLOY_ID=$DEP" >> "$GITHUB_ENV"

      - name: Wait for the deploy to finish; auto-rollback if stuck >4 min in update_in_progress
        if: ${{ github.event.inputs.confirm == 'APPLY' }}
        run: |
          set -uo pipefail
          STUCK_COUNT=0
          for i in $(seq 1 60); do
            STATUS=$(curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$KC_SERVICE_ID/deploys/$KC_DEPLOY_ID" \
              | jq -r '.status')
            echo "[$i] deploy status: $STATUS"
            case "$STATUS" in
              live)
                echo "Deploy LIVE -- KC_CACHE=local took effect"
                exit 0
                ;;
              deactivated|build_failed|update_failed|canceled)
                echo "::error::Deploy ended in $STATUS -- rolling back KC_CACHE"
                curl -fsS -X DELETE \
                  -H "Authorization: Bearer $RENDER_API_KEY" \
                  "https://api.render.com/v1/services/$KC_SERVICE_ID/env-vars/KC_CACHE" || true
                exit 1
                ;;
              update_in_progress)
                STUCK_COUNT=$((STUCK_COUNT + 1))
                if [ "$STUCK_COUNT" -gt 24 ]; then
                  echo "::error::Stuck in update_in_progress for >4 min -- rolling back KC_CACHE"
                  curl -fsS -X DELETE \
                    -H "Authorization: Bearer $RENDER_API_KEY" \
                    "https://api.render.com/v1/services/$KC_SERVICE_ID/env-vars/KC_CACHE" || true
                  exit 1
                fi
                ;;
              *)
                STUCK_COUNT=0
                ;;
            esac
            sleep 10
          done
          echo "::warning::Deploy did not reach live within 10 minutes; check Render dashboard manually"

      - name: Confirm KC discovery endpoint after the change
        if: ${{ github.event.inputs.confirm == 'APPLY' }}
        run: |
          set -uo pipefail
          for i in $(seq 1 20); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              "https://auth.aiappinvent.com/realms/solarpro/.well-known/openid-configuration" || echo "000")
            echo "[$i] /realms/solarpro discovery -> $CODE"
            if [ "$CODE" = "200" ]; then
              echo "OK: KC is serving discovery on KC_CACHE=local."
              exit 0
            fi
            sleep 15
          done
          echo "::warning::KC did not return 200 within 5 minutes -- check logs"

      - name: Dry-run summary (no apply)
        if: ${{ github.event.inputs.confirm != 'APPLY' }}
        run: |
          echo "DRY RUN -- no changes made."
          echo "Re-run with -f confirm=APPLY to actually set KC_CACHE=local and redeploy."
