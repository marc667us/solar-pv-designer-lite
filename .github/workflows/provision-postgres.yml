name: Provision Render Postgres (free tier)

# Creates a free-tier Postgres instance on Render and stores its
# connection URL as the SOLARPRO_DATABASE_URL GitHub Secret so the
# next deploy can wire it into the Render web service env vars.
#
# Free tier specs (Render — as of 2026-06):
#   - 1 GB storage
#   - 256 MB RAM
#   - 0.1 CPU
#   - 90-day rollover (DB deleted after 90 days unless upgraded)
#
# Safe to re-run: if SOLARPRO_DATABASE_URL is already set this no-ops
# and just prints the current value preview.
#
# After this workflow lands a URL, the next step is the migration job
# which applies migrations/001..004 against it.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Get Render owner ID
        id: owner
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -e
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/owners?limit=5" \
            -o /tmp/owners.json
          OWNER_ID=$(python3 -c "
          import json
          d = json.load(open('/tmp/owners.json'))
          item = d[0] if isinstance(d, list) and d else {}
          print(item.get('owner', item).get('id', ''))
          ")
          if [ -z "$OWNER_ID" ]; then
            echo "::error::Could not determine owner ID"
            cat /tmp/owners.json | head -c 400
            exit 1
          fi
          echo "Owner ID: $OWNER_ID"
          echo "owner_id=$OWNER_ID" >> $GITHUB_OUTPUT

      - name: Check for existing Postgres named solarpro-postgres
        id: existing
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -e
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/postgres?limit=20" \
            -o /tmp/pg_list.json
          EXISTING_ID=$(python3 -c "
          import json
          d = json.load(open('/tmp/pg_list.json'))
          for item in (d if isinstance(d, list) else []):
              pg = item.get('postgres', item)
              if pg.get('name') == 'solarpro-postgres':
                  print(pg.get('id', ''))
                  break
          ")
          if [ -n "$EXISTING_ID" ]; then
            echo "Found existing Postgres: $EXISTING_ID"
            echo "existing_id=$EXISTING_ID" >> $GITHUB_OUTPUT
          else
            echo "No existing Postgres named 'solarpro-postgres' — will create."
          fi

      - name: Create Postgres (skipped if existing)
        id: create
        if: steps.existing.outputs.existing_id == ''
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          OWNER_ID: ${{ steps.owner.outputs.owner_id }}
        run: |
          set -e
          jq -n \
            --arg owner "$OWNER_ID" \
            '{
              ownerId: $owner,
              name: "solarpro-postgres",
              plan: "free",
              region: "oregon",
              databaseName: "solarpro",
              databaseUser: "solarpro_user",
              ipAllowList: [
                { cidrBlock: "0.0.0.0/0", description: "open during beta — re-tighten before GA" }
              ],
              postgresMajorVersion: "16"
            }' > /tmp/create_pg.json
          HTTP=$(curl -s -o /tmp/create_resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/create_pg.json \
            "https://api.render.com/v1/postgres")
          echo "HTTP: $HTTP"
          cat /tmp/create_resp.json | python3 -m json.tool 2>/dev/null | head -40 || cat /tmp/create_resp.json | head -c 800
          if [ "$HTTP" != "201" ] && [ "$HTTP" != "200" ]; then
            echo "::error::Postgres creation failed (HTTP $HTTP)"
            exit 1
          fi
          NEW_ID=$(python3 -c "
          import json
          d = json.load(open('/tmp/create_resp.json'))
          pg = d.get('postgres', d)
          print(pg.get('id', ''))
          ")
          echo "new_id=$NEW_ID" >> $GITHUB_OUTPUT
          echo "Created Postgres ID: $NEW_ID"

      - name: Wait for Postgres to be available
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          PG_ID: ${{ steps.create.outputs.new_id || steps.existing.outputs.existing_id }}
        run: |
          set -e
          for i in $(seq 1 30); do
            STATUS=$(curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/postgres/$PG_ID" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
            echo "[poll $i] status=$STATUS"
            if [ "$STATUS" = "available" ]; then
              echo "Postgres is available."
              break
            fi
            sleep 10
          done
          if [ "$STATUS" != "available" ]; then
            echo "::error::Postgres did not reach 'available' state within 5 minutes."
            exit 1
          fi

      - name: Fetch connection URLs
        id: conn
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          PG_ID: ${{ steps.create.outputs.new_id || steps.existing.outputs.existing_id }}
        run: |
          set -e
          # The connection URL endpoint returns internal + external + psql command.
          # We need the external URL for outside-Render access; internal URL for the app.
          curl -fsS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/postgres/$PG_ID/connection-info" \
            -o /tmp/conn.json
          INTERNAL=$(python3 -c "
          import json
          d = json.load(open('/tmp/conn.json'))
          print(d.get('internalConnectionString', ''))
          ")
          EXTERNAL=$(python3 -c "
          import json
          d = json.load(open('/tmp/conn.json'))
          print(d.get('externalConnectionString', ''))
          ")
          if [ -z "$INTERNAL" ] || [ -z "$EXTERNAL" ]; then
            echo "::error::Could not extract connection strings."
            cat /tmp/conn.json | head -c 400
            exit 1
          fi
          # We mask the actual values in the log. The output is consumed by the next step.
          echo "::add-mask::$INTERNAL"
          echo "::add-mask::$EXTERNAL"
          echo "internal=$INTERNAL" >> $GITHUB_OUTPUT
          echo "external=$EXTERNAL" >> $GITHUB_OUTPUT
          echo "Internal URL captured (masked in logs)."
          echo "External URL captured (masked in logs)."

      - name: Show summary
        env:
          PG_ID: ${{ steps.create.outputs.new_id || steps.existing.outputs.existing_id }}
        run: |
          echo "========================================================="
          echo "  RENDER POSTGRES PROVISIONED"
          echo "  ID:        $PG_ID"
          echo "  Name:      solarpro-postgres"
          echo "  Plan:      free  (1 GB / 90-day rollover)"
          echo "  Region:    oregon"
          echo "  Database:  solarpro"
          echo "  User:      solarpro_user"
          echo "========================================================="
          echo ""
          echo "NEXT STEPS (manual until we automate):"
          echo "  1. Capture the internal + external connection URLs from the"
          echo "     'Fetch connection URLs' step above (they are masked there"
          echo "     but available as step outputs)."
          echo "  2. Set GitHub Secret SOLARPRO_DATABASE_URL = <internal URL>"
          echo "     (use internal — Render service-to-service traffic stays in cluster)"
          echo "  3. Re-run the Deploy workflow so DATABASE_URL syncs to the web service"
          echo "  4. Run the Apply Postgres Migrations workflow (todo: write it)"
