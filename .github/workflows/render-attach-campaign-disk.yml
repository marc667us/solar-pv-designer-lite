# One-shot: attach a persistent disk to the Render service, set DB_PATH, redeploy.
#
# What it does
# ------------
# 1. PATCH /v1/services/{id}/disk - creates/updates a 1 GB disk mounted at /app/data.
# 2. PUT   /v1/services/{id}/env-vars - upserts DB_PATH=/app/data/solar.db.
# 3. POST  /v1/services/{id}/deploys - triggers a redeploy that picks up both.
#
# Triggered manually via `gh workflow run`. Idempotent.
name: Render attach campaign disk

on:
  workflow_dispatch:

jobs:
  attach:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Probe service + show current state
        run: |
          set -euo pipefail
          curl -sS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID" | jq '.name,.type,.serviceDetails.url' || true
          echo "--- current disk (if any) ---"
          curl -sS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/disk" || true

      - name: Attach / update disk (campaign-data, /app/data, 1 GB)
        run: |
          set -euo pipefail
          BODY='{"name":"campaign-data","mountPath":"/app/data","sizeGB":1}'
          # Render's "update disk" endpoint is PUT - safer than POST since it
          # upserts (won't fail if a disk already exists with the same mount path).
          echo "PUT body: $BODY"
          RESP=$(curl -sS -w "\n%{http_code}" -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/disk")
          STATUS=$(echo "$RESP" | tail -n1)
          BODY=$(echo "$RESP" | head -n -1)
          echo "HTTP $STATUS"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          # 200/201 = good; if PUT not supported, retry with POST
          if [ "$STATUS" -ge 400 ]; then
            echo "PUT rejected, trying POST..."
            curl -sS -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"name":"campaign-data","mountPath":"/app/data","sizeGB":1}' \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/disk" || true
          fi

      - name: Upsert DB_PATH env var
        run: |
          set -euo pipefail
          BODY='[{"key":"DB_PATH","value":"/app/data/solar.db"}]'
          echo "PUT env-vars body: $BODY"
          # PUT here REPLACES the env-vars set, so we need to fetch existing first,
          # merge DB_PATH, then send the full list.
          EXISTING=$(curl -sS -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100")
          # Normalize - Render returns [{envVar:{key,value}}, ...] from GET, but PUT wants [{key,value}]
          MERGED=$(echo "$EXISTING" | jq '
            [.[] | .envVar | {key,value}] as $e
            | [($e[] | select(.key != "DB_PATH")), {key:"DB_PATH",value:"/app/data/solar.db"}]
          ')
          echo "Merged env vars (${MERGED} chars)..."
          echo "$MERGED" | jq 'length as $n | "\($n) vars total"'
          curl -sS -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$MERGED" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars" \
            | jq 'length as $n | "Render confirmed \($n) env vars set"'

      - name: Trigger redeploy
        run: |
          set -euo pipefail
          curl -sS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            | jq '{id,status,createdAt,commit:.commit.id[:7]}'
