# Check which git commit Render is currently serving.
# Inputs:  RENDER_API_KEY, RENDER_SERVICE_ID
# Output:  the most recent deploy's commit SHA + status
name: Render Current Commit

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Show current live deploy info
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          echo "=== Latest 5 deploys ==="
          # GET deploys -> array of {deploy: {id, commit:{id,message}, status, createdAt}}
          curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=5" \
            | jq '.[] | {id:.deploy.id, status:.deploy.status, commit:.deploy.commit.id, message:(.deploy.commit.message | .[0:60]), createdAt:.deploy.createdAt}'
