# Detailed look at the latest deploy: full JSON including finishedAt + failure reason if present
name: Render Deploy Detail

on:
  workflow_dispatch:

jobs:
  detail:
    runs-on: ubuntu-latest
    steps:
      - name: Get full deploy info + events for latest deploy
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          # Get latest deploy id
          DEPLOY_ID=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=1" \
            | jq -r '.[0].deploy.id')
          echo "Latest deploy: $DEPLOY_ID"
          echo
          echo "=== Full deploy JSON ==="
          curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
            | jq .
          echo
          echo "=== Events for this service ==="
          curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/events?limit=20" \
            | jq '.[] | .event | {type, timestamp, details}'
