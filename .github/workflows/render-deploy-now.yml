name: Force Render Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sync env vars to Render then deploy
        env:
          RENDER_API_KEY:       ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID:    ${{ secrets.RENDER_SERVICE_ID }}
          SECRET_KEY:           ${{ secrets.SECRET_KEY }}
          PAYSTACK_SECRET_KEY:  ${{ secrets.PAYSTACK_SECRET_KEY }}
          PAYSTACK_PUBLIC_KEY:  ${{ secrets.PAYSTACK_PUBLIC_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          OLLAMA_URL:           ${{ secrets.OLLAMA_URL }}
          OLLAMA_MODEL:         ${{ secrets.OLLAMA_MODEL }}
          SMTP_HOST:            ${{ secrets.SMTP_HOST }}
          SMTP_PORT:            ${{ secrets.SMTP_PORT }}
          SMTP_USER:            ${{ secrets.SMTP_USER }}
          SMTP_PASS:            ${{ secrets.SMTP_PASS }}
          SMTP_FROM:            ${{ secrets.SMTP_FROM }}
          SMTP_TLS:             ${{ secrets.SMTP_TLS }}
          EMAIL_SALES:          ${{ secrets.EMAIL_SALES }}
          EMAIL_SUPPORT:        ${{ secrets.EMAIL_SUPPORT }}
          EMAIL_BILLING:        ${{ secrets.EMAIL_BILLING }}
          AXIGEN_SERVER_URL:    ${{ secrets.AXIGEN_SERVER_URL }}
          AXIGEN_USER:          ${{ secrets.AXIGEN_USER }}
          AXIGEN_PASSWORD:      ${{ secrets.AXIGEN_PASSWORD }}
          BREVO_API_KEY:        ${{ secrets.BREVO_API_KEY }}
        run: |
          set -euo pipefail

          # Build env var payload (skip empty values)
          NEW_VARS='[]'
          add() {
            local k="$1" v="$2"
            if [ -n "$v" ]; then
              NEW_VARS=$(echo "$NEW_VARS" | jq --arg k "$k" --arg v "$v" '. + [{"key":$k,"value":$v}]')
            fi
          }
          add SECRET_KEY          "$SECRET_KEY"
          add PAYSTACK_SECRET_KEY "$PAYSTACK_SECRET_KEY"
          add PAYSTACK_PUBLIC_KEY "$PAYSTACK_PUBLIC_KEY"
          add ANTHROPIC_API_KEY   "$ANTHROPIC_API_KEY"
          add OPENROUTER_API_KEY  "$OPENROUTER_API_KEY"
          add RESEND_API_KEY      "$RESEND_API_KEY"
          add OLLAMA_URL          "$OLLAMA_URL"
          add OLLAMA_MODEL        "$OLLAMA_MODEL"
          add SMTP_HOST           "$SMTP_HOST"
          add SMTP_PORT           "$SMTP_PORT"
          add SMTP_USER           "$SMTP_USER"
          add SMTP_PASS           "$SMTP_PASS"
          add SMTP_FROM           "$SMTP_FROM"
          add SMTP_TLS            "$SMTP_TLS"
          add EMAIL_SALES         "$EMAIL_SALES"
          add EMAIL_SUPPORT       "$EMAIL_SUPPORT"
          add EMAIL_BILLING       "$EMAIL_BILLING"
          add AXIGEN_SERVER_URL   "$AXIGEN_SERVER_URL"
          add AXIGEN_USER         "$AXIGEN_USER"
          add AXIGEN_PASSWORD     "$AXIGEN_PASSWORD"
          add BREVO_API_KEY       "$BREVO_API_KEY"

          echo "Syncing $(echo "$NEW_VARS" | jq 'length') vars to Render service $RENDER_SERVICE_ID..."

          # GET current vars and merge.
          # ?limit=100 is REQUIRED: Render's default page size is 20, and
          # solar holds ~30 env vars including the 5 KEYCLOAK_* keys. Without
          # the limit, KC vars fall off the page, the subsequent PUT replaces
          # the env set with the truncated list, and the live cutover goes
          # silently dormant. (Root cause of the 2026-06-22 KC outage.)
          CURRENT=$(curl -s \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100")
          CURRENT_CLEAN=$(echo "$CURRENT" | jq 'if (.[0] | has("envVar")) then [.[].envVar | {key:.key,value:.value}] else [.[] | {key:.key,value:.value}] end' 2>/dev/null || echo '[]')
          MERGED=$(echo "$CURRENT_CLEAN" | jq --argjson n "$NEW_VARS" 'map(select(.key as $k | ($n | map(.key) | index($k)) == null)) + $n')

          PUT=$(curl -s -o /tmp/put.txt -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$MERGED" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          echo "Env var sync: HTTP $PUT"
          [ "$PUT" = "200" ] || [ "$PUT" = "201" ] || echo "WARN: sync returned $PUT — check manually"

          # Trigger deploy
          echo "Triggering deploy..."
          HTTP=$(curl -s -o /tmp/deploy.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          echo "Deploy trigger: HTTP $HTTP"
          cat /tmp/deploy.json | python3 -m json.tool 2>/dev/null || cat /tmp/deploy.json
          # Accept 200, 201 (sync create) and 202 (queued/async — Render
          # returns this when the deploy is accepted but a build hasn't
          # started yet). 202 is a perfectly valid success here.
          [ "$HTTP" = "201" ] || [ "$HTTP" = "200" ] || [ "$HTTP" = "202" ] || { echo "::error::Deploy trigger failed ($HTTP)"; exit 1; }

          # Robust ID extraction. Render occasionally returns an empty
          # body with 202; the prior `cat | python3` chain killed the
          # whole job under `set -euo pipefail`. The `|| true` + the
          # tolerant python keep DEPLOY_ID empty instead of exiting —
          # the polling loop below handles an empty ID by treating the
          # deploy as fire-and-forget. Single-line python; newlines
          # inside a $(...) substitution inside YAML break parsing.
          DEPLOY_ID=$(python3 -c "import json; d=json.load(open('/tmp/deploy.json')); print(d.get('id','') if isinstance(d,dict) else '')" 2>/dev/null || true)
          echo "Deploy ID: $DEPLOY_ID — polling up to 12 minutes..."
          if [ -z "$DEPLOY_ID" ]; then
            echo "::warning::No DEPLOY_ID extracted from Render response — Render accepted the deploy ($HTTP) but didn't return an id we could parse. Skipping the status poll; check the Render service or /api/version to confirm the new build is live."
            exit 0
          fi

          for i in $(seq 1 24); do
            sleep 30
            STATUS=$(curl -s \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null)
            echo "  [$i/24] $STATUS"
            if [ "$STATUS" = "live" ]; then echo "Deploy LIVE"; exit 0; fi
            if [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "canceled" ]; then
              echo "::error::Deploy failed: $STATUS"; exit 1
            fi
          done
          echo "::warning::Timed out — check Render dashboard"
