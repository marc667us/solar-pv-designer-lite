name: Force Render Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sync env vars to Render then deploy
        env:
          RENDER_API_KEY:       ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID:    ${{ secrets.RENDER_SERVICE_ID }}
          SECRET_KEY:           ${{ secrets.SECRET_KEY }}
          PAYSTACK_SECRET_KEY:  ${{ secrets.PAYSTACK_SECRET_KEY }}
          PAYSTACK_PUBLIC_KEY:  ${{ secrets.PAYSTACK_PUBLIC_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          OLLAMA_URL:           ${{ secrets.OLLAMA_URL }}
          OLLAMA_MODEL:         ${{ secrets.OLLAMA_MODEL }}
          SMTP_HOST:            ${{ secrets.SMTP_HOST }}
          SMTP_PORT:            ${{ secrets.SMTP_PORT }}
          SMTP_USER:            ${{ secrets.SMTP_USER }}
          SMTP_PASS:            ${{ secrets.SMTP_PASS }}
          SMTP_FROM:            ${{ secrets.SMTP_FROM }}
          SMTP_TLS:             ${{ secrets.SMTP_TLS }}
          EMAIL_SALES:          ${{ secrets.EMAIL_SALES }}
          EMAIL_SUPPORT:        ${{ secrets.EMAIL_SUPPORT }}
          EMAIL_BILLING:        ${{ secrets.EMAIL_BILLING }}
        run: |
          set -euo pipefail

          # Build env var payload (skip empty values)
          NEW_VARS='[]'
          add() {
            local k="$1" v="$2"
            if [ -n "$v" ]; then
              NEW_VARS=$(echo "$NEW_VARS" | jq --arg k "$k" --arg v "$v" '. + [{"key":$k,"value":$v}]')
            fi
          }
          add SECRET_KEY          "$SECRET_KEY"
          add PAYSTACK_SECRET_KEY "$PAYSTACK_SECRET_KEY"
          add PAYSTACK_PUBLIC_KEY "$PAYSTACK_PUBLIC_KEY"
          add ANTHROPIC_API_KEY   "$ANTHROPIC_API_KEY"
          add OPENROUTER_API_KEY  "$OPENROUTER_API_KEY"
          add RESEND_API_KEY      "$RESEND_API_KEY"
          add OLLAMA_URL          "$OLLAMA_URL"
          add OLLAMA_MODEL        "$OLLAMA_MODEL"
          add SMTP_HOST           "$SMTP_HOST"
          add SMTP_PORT           "$SMTP_PORT"
          add SMTP_USER           "$SMTP_USER"
          add SMTP_PASS           "$SMTP_PASS"
          add SMTP_FROM           "$SMTP_FROM"
          add SMTP_TLS            "$SMTP_TLS"
          add EMAIL_SALES         "$EMAIL_SALES"
          add EMAIL_SUPPORT       "$EMAIL_SUPPORT"
          add EMAIL_BILLING       "$EMAIL_BILLING"

          echo "Syncing $(echo "$NEW_VARS" | jq 'length') vars to Render service $RENDER_SERVICE_ID..."

          # GET current vars and merge
          CURRENT=$(curl -s \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          CURRENT_CLEAN=$(echo "$CURRENT" | jq 'if (.[0] | has("envVar")) then [.[].envVar | {key:.key,value:.value}] else [.[] | {key:.key,value:.value}] end' 2>/dev/null || echo '[]')
          MERGED=$(echo "$CURRENT_CLEAN" | jq --argjson n "$NEW_VARS" 'map(select(.key as $k | ($n | map(.key) | index($k)) == null)) + $n')

          PUT=$(curl -s -o /tmp/put.txt -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$MERGED" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          echo "Env var sync: HTTP $PUT"
          [ "$PUT" = "200" ] || [ "$PUT" = "201" ] || echo "WARN: sync returned $PUT — check manually"

          # Trigger deploy
          echo "Triggering deploy..."
          HTTP=$(curl -s -o /tmp/deploy.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          echo "Deploy trigger: HTTP $HTTP"
          cat /tmp/deploy.json | python3 -m json.tool 2>/dev/null || cat /tmp/deploy.json
          [ "$HTTP" = "201" ] || [ "$HTTP" = "200" ] || { echo "::error::Deploy trigger failed"; exit 1; }

          DEPLOY_ID=$(cat /tmp/deploy.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null)
          echo "Deploy ID: $DEPLOY_ID — polling up to 12 minutes..."

          for i in $(seq 1 24); do
            sleep 30
            STATUS=$(curl -s \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null)
            echo "  [$i/24] $STATUS"
            if [ "$STATUS" = "live" ]; then echo "Deploy LIVE"; exit 0; fi
            if [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "canceled" ]; then
              echo "::error::Deploy failed: $STATUS"; exit 1
            fi
          done
          echo "::warning::Timed out — check Render dashboard"
