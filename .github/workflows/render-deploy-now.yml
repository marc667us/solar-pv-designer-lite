name: Force Render Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          echo "Triggering deploy on service $RENDER_SERVICE_ID ..."

          HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")

          echo "HTTP $HTTP_CODE"
          cat /tmp/resp.json | python3 -m json.tool 2>/dev/null || cat /tmp/resp.json

          if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Deploy trigger failed (HTTP $HTTP_CODE)"
            exit 1
          fi

          DEPLOY_ID=$(cat /tmp/resp.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null)
          echo "Deploy ID: $DEPLOY_ID"
          echo "Polling for up to 10 minutes..."

          for i in $(seq 1 20); do
            sleep 30
            STATUS=$(curl -s \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null)
            echo "  [$i/20] $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "Deploy LIVE"
              exit 0
            elif [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "canceled" ]; then
              echo "::error::Deploy ended with status: $STATUS"
              exit 1
            fi
          done
          echo "::warning::Timed out — check Render dashboard"
