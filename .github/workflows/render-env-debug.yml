# One-shot debug workflow: read Render's current env-var keys.
# - workflow_dispatch lets us trigger manually from gh CLI
# - No secrets are printed; only the KEY NAMES from Render are listed
# Inputs:
#   RENDER_API_KEY, RENDER_SERVICE_ID (from GitHub Secrets)
# Output:
#   Logged list of env var keys + raw shape of GET response
name: Render Env Debug

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: List Render env var keys
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        # bash flags:
        #   -e fail on first error (so jq parse failures surface)
        #   -u undefined vars are errors (catches typos)
        #   -o pipefail any failed pipe segment fails the whole pipe
        run: |
          set -euo pipefail
          # curl: -s silent, -o write body to file, -w print stdout (we want the HTTP code)
          BODY=$(curl -s \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          # jq -r prints raw strings (no quotes). length gets array size.
          echo "RAW LENGTH:"
          echo "$BODY" | jq 'length'
          echo
          echo "RAW SHAPE (first element, value redacted):"
          # NEVER print .[0] raw -- it contains a live secret's value. The
          # header of this file promises no values are printed; honour it.
          # This leaked BREVO_API_KEY's value into a public Actions log before
          # it was fixed (2026-07-10). Show only the structure.
          echo "$BODY" | jq 'if .[0].envVar then {shape:"wrapper", key:.[0].envVar.key} else {shape:"flat", key:.[0].key} end'
          echo
          echo "KEY NAMES + VALUE LENGTHS (no values printed):"
          # For each env var, print the key + the length of its value to detect empty strings.
          # The Render API can return either:
          #   [ {envVar:{key:K,value:V}}, ... ]   (wrapper shape)
          #   [ {key:K, value:V}, ... ]           (flat shape)
          # | "\(.key) len=\(.value|length)"  — string-interpolates key and value length
          echo "$BODY" | jq -r '
            if (.[0]? // {}) | has("envVar")
              then [.[].envVar | "\(.key) len=\(.value|length)"]
              else [.[]       | "\(.key) len=\(.value|length)"]
            end | .[]'

          echo
          echo "VALUE FINGERPRINT (first 3 chars + length, only for SMTP_HOST/SMTP_USER/RESEND_API_KEY/SECRET_KEY):"
          # quick non-secret-leaking fingerprint to verify the stored value isn't garbage
          echo "$BODY" | jq -r '
            if (.[0]? // {}) | has("envVar") then [.[].envVar] else [.[]] end
            | map(select(.key == "SMTP_HOST" or .key == "SMTP_USER" or .key == "RESEND_API_KEY" or .key == "SECRET_KEY"))
            | .[] | "\(.key): first3=\(.value[0:3]) length=\(.value|length)"'
