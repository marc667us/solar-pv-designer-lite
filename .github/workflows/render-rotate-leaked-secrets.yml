# Push rotated secrets from GitHub Secrets -> Render service env, non-destructively.
#
# Context: 2026-07-10 five secrets (SECRET_KEY, PAYSTACK_*, BREVO_API_KEY,
# SMTP_PASS, OPENROUTER_API_KEY) sat in a PUBLIC Actions log for 35 days. As each
# provider key is rolled, its new value is stored in GitHub Secrets; this workflow
# syncs the chosen keys into Render's env store so the live app actually uses them.
#
# SAFE BY DESIGN:
#   - Values come ONLY from `secrets.*` (never workflow inputs) so GitHub masks
#     them in logs. This is the opposite of the render-env-debug pattern that
#     caused the leak.
#   - Uses the per-key PUT endpoint  PUT /v1/services/{id}/env-vars/{KEY}
#     (non-destructive) -- NOT the bulk replace that would wipe other env vars.
#   - jq builds the JSON body so the value never appears on a command line.
#   - DRY-RUN by default; only writes when confirm=APPLY (repo workflow rule).
#
# Usage:
#   gh workflow run "Render Rotate Leaked Secrets" -f keys="PAYSTACK_SECRET_KEY,PAYSTACK_PUBLIC_KEY"
#   gh workflow run "Render Rotate Leaked Secrets" -f keys="PAYSTACK_SECRET_KEY,PAYSTACK_PUBLIC_KEY,BREVO_API_KEY,OPENROUTER_API_KEY,SMTP_PASS" -f confirm=APPLY

name: Render Rotate Leaked Secrets

on:
  workflow_dispatch:
    inputs:
      keys:
        description: "Comma list of GH-secret names to push to Render env. Only these allowed: PAYSTACK_SECRET_KEY,PAYSTACK_PUBLIC_KEY,BREVO_API_KEY,OPENROUTER_API_KEY,SMTP_PASS,SECRET_KEY"
        required: true
        default: "PAYSTACK_SECRET_KEY,PAYSTACK_PUBLIC_KEY"
      confirm:
        description: "DRY-RUN by default. Type APPLY to write to Render + deploy."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      # All allowlisted secret values referenced literally so GitHub masks them.
      PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
      PAYSTACK_PUBLIC_KEY: ${{ secrets.PAYSTACK_PUBLIC_KEY }}
      BREVO_API_KEY:       ${{ secrets.BREVO_API_KEY }}
      OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
      SMTP_PASS:           ${{ secrets.SMTP_PASS }}
      SECRET_KEY:          ${{ secrets.SECRET_KEY }}
      KEYS_IN:             ${{ inputs.keys }}
      CONFIRM:             ${{ inputs.confirm }}
    steps:
      - name: Resolve mode + validate requested keys
        run: |
          set -e
          ALLOW="PAYSTACK_SECRET_KEY PAYSTACK_PUBLIC_KEY BREVO_API_KEY OPENROUTER_API_KEY SMTP_PASS SECRET_KEY"
          REQ=$(echo "$KEYS_IN" | tr ',' ' ' | tr -s ' ')
          for k in $REQ; do
            case " $ALLOW " in
              *" $k "*) : ;;
              *) echo "::error::'$k' is not an allowlisted key."; exit 1 ;;
            esac
          done
          echo "REQ_KEYS=$REQ" >> $GITHUB_ENV
          if [ "$CONFIRM" = "APPLY" ]; then
            echo "MODE=apply" >> $GITHUB_ENV
            echo "=== APPLY MODE -- keys will be written to Render env + a deploy triggered ==="
          else
            echo "MODE=dryrun" >> $GITHUB_ENV
            echo "=== DRY-RUN -- nothing written. Re-run with -f confirm=APPLY to commit. ==="
          fi
          echo "Requested keys: $REQ"

      - name: Verify Render API creds
        run: |
          [ -n "$RENDER_API_KEY" ] || { echo "::error::RENDER_API_KEY secret missing"; exit 1; }
          [ -n "$RENDER_SERVICE_ID" ] || { echo "::error::RENDER_SERVICE_ID secret missing"; exit 1; }
          echo "OK: Render API + service id present."

      - name: Verify each requested GH secret has a value
        run: |
          set -e
          for k in $REQ_KEYS; do
            v="${!k}"
            if [ -z "$v" ]; then
              echo "::error::GH secret $k is empty -- rotate + gh secret set it first."; exit 1
            fi
            echo "OK: $k present (length=${#v})."
          done

      - name: Dry-run preview
        if: env.MODE == 'dryrun'
        run: |
          for k in $REQ_KEYS; do
            v="${!k}"
            echo "WOULD PUT https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/$k  body={\"value\":<redacted len=${#v}>}"
          done
          echo "Then ONE deploy would be triggered. No other env vars touched."

      - name: Apply -- per-key non-destructive PUT
        if: env.MODE == 'apply'
        run: |
          set -e
          for k in $REQ_KEYS; do
            v="${!k}"
            BODY=$(jq -nc --arg val "$v" '{value: $val}')
            RESP=$(curl -fsS -X PUT \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/$k" \
              -d "$BODY")
            GOT=$(python3 -c "
          import json,sys
          d=json.loads(sys.argv[1]); ev=d.get('envVar') if isinstance(d,dict) and 'envVar' in d else d
          print((ev or {}).get('key','') if isinstance(ev,dict) else '')
          " "$RESP")
            if [ "$GOT" = "$k" ]; then
              echo "OK: $k written to Render env."
            else
              echo "::error::Unexpected Render response for $k:"; echo "$RESP" | head -c 300; exit 1
            fi
          done

      - name: Trigger ONE deploy so the app reads the new env
        if: env.MODE == 'apply'
        run: |
          set -e
          DEPLOY=$(curl -fsS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -d '{"clearCache":"do_not_clear"}')
          DID=$(python3 -c "import json,sys; print(json.loads(sys.argv[1]).get('id',''))" "$DEPLOY")
          [ -n "$DID" ] && echo "OK: deploy $DID triggered." || { echo "::warning::no deploy id"; echo "$DEPLOY" | head -c 300; }

      - name: Summary
        if: always()
        run: |
          if [ "$MODE" = "apply" ]; then
            echo "Rotated into Render env: $REQ_KEYS"
            echo "App picks them up on next boot (~1-2 min). Verify /api/ping 200 after."
          else
            echo "DRY-RUN only. Re-run with -f confirm=APPLY."
          fi
