# Pull the actual runtime/build logs of the latest failed deploy.
# Render's log endpoint requires the new owner+resource format.
name: Render Runtime Logs

on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest deploy + service logs
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          # 1) get the owner ID + service slug for the logs query
          OWNER=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID" | jq -r '.ownerId')
          echo "Owner: $OWNER"
          # 2) get the latest deploy id
          DEP=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=1" \
            | jq -r '.[0].deploy.id')
          echo "Latest deploy: $DEP"
          echo
          # 3) pull logs filtered for the latest deploy — limit 200 entries
          echo "=== Logs for latest deploy ==="
          curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            -G "https://api.render.com/v1/logs" \
            --data-urlencode "ownerId=$OWNER" \
            --data-urlencode "resource=$RENDER_SERVICE_ID" \
            --data-urlencode "limit=200" \
            --data-urlencode "direction=backward" \
            | jq -r '.logs[] | "\(.timestamp)  \(.message)"' | tail -150
