# Diagnose: which Render service is RENDER_SERVICE_ID, and what are its custom domains?
# If the custom domain solarpro.aiappinvent.com is NOT on this service, we've been
# deploying to the wrong one and that explains why env vars never show up live.
name: Render Service Identity Check

on:
  workflow_dispatch:

jobs:
  whoami:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect service + custom domains
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          # 1) Service metadata: name, repo, branch, service URL
          echo "=== Service details ==="
          curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID" \
            | jq '{id, name, slug, type, repo, branch, serviceDetails:{url:.serviceDetails.url, runtime:.serviceDetails.runtime}}'
          echo
          # 2) Custom domains attached to this service
          echo "=== Custom domains on this service ==="
          curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/custom-domains" \
            | jq '. | map({name, domainType, verificationStatus})'
          echo
          # 3) All web services on this Render account — to find the one with solarpro.aiappinvent.com
          echo "=== All services on this account ==="
          curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?type=web_service&limit=20" \
            | jq '. | map(.service | {id, name, slug, serviceDetails:.serviceDetails.url})'
