# Rotate SolarPro admin + owner seed passwords on Render.
#
# Phase 0.1 of Desktop\SolarPro_Schedule_2026-06-08.md.
#
# Reads SOLARPRO_ADMIN_PASSWORD + SOLARPRO_OWNER_PASSWORD from GitHub Secrets,
# PUTs them as Render env vars on the SolarPro service, then triggers a
# redeploy. Since Render currently has no persistent disk, the redeploy
# reseeds the SQLite users table from scratch using the new env-sourced
# seed in web_app.py:_SEED_USERS (rotated 2026-06-08 byte patch).
#
# Pre-requisites:
#   - SOLARPRO_ADMIN_PASSWORD and SOLARPRO_OWNER_PASSWORD must be set as repo
#     secrets BEFORE running this workflow.
#   - RENDER_API_KEY + RENDER_SERVICE_ID must be set as repo secrets.
#
# Trigger: gh workflow run "Rotate admin password"
name: Rotate admin password
on:
  workflow_dispatch:
jobs:
  rotate:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY:            ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID:         ${{ secrets.RENDER_SERVICE_ID }}
      SOLARPRO_ADMIN_PASSWORD:   ${{ secrets.SOLARPRO_ADMIN_PASSWORD }}
      SOLARPRO_OWNER_PASSWORD:   ${{ secrets.SOLARPRO_OWNER_PASSWORD }}
    steps:
      - name: Refuse to run without required secrets
        run: |
          set -euo pipefail
          # Bail fast if any of the four required secrets are unset.
          # We intentionally do NOT echo the values — even partially.
          for v in RENDER_API_KEY RENDER_SERVICE_ID SOLARPRO_ADMIN_PASSWORD SOLARPRO_OWNER_PASSWORD; do
            eval "val=\${$v:-}"
            if [ -z "$val" ]; then
              echo "::error::secret $v is empty — set with: gh secret set $v -b '<value>'"
              exit 1
            fi
          done
          echo "All four required secrets are present."

      - name: Merge new vars into Render env
        run: |
          set -euo pipefail
          # 1. Fetch current env vars from Render.
          CURRENT=$(curl -sS \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars?limit=100")
          # 2. Normalize to [{key,value}] form regardless of API shape.
          CURRENT_CLEAN=$(echo "$CURRENT" | jq '
            if length == 0 then []
            elif (.[0] | has("envVar")) then [.[].envVar | {key:.key,value:.value}]
            else [.[] | {key:.key,value:.value}]
            end')
          # 3. Drop any prior SOLARPRO_*_PASSWORD entries, then append the new pair.
          MERGED=$(echo "$CURRENT_CLEAN" | jq \
            --arg admin "$SOLARPRO_ADMIN_PASSWORD" \
            --arg owner "$SOLARPRO_OWNER_PASSWORD" '
            map(select(.key != "SOLARPRO_ADMIN_PASSWORD" and .key != "SOLARPRO_OWNER_PASSWORD"))
            + [{key:"SOLARPRO_ADMIN_PASSWORD",value:$admin},
               {key:"SOLARPRO_OWNER_PASSWORD",value:$owner}]')
          # 4. PUT the merged set back to Render.
          PUT=$(curl -sS -o /tmp/put.body -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$MERGED" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars")
          echo "Env var PUT: HTTP $PUT"
          if [ "$PUT" != "200" ] && [ "$PUT" != "201" ]; then
            echo "::error::Env var sync returned $PUT"
            cat /tmp/put.body || true
            exit 1
          fi

      - name: Trigger redeploy (clear cache for clean seed)
        run: |
          set -euo pipefail
          DEPLOY=$(curl -sS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"clear"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          DEPLOY_ID=$(echo "$DEPLOY" | jq -r '.id // empty')
          if [ -z "$DEPLOY_ID" ]; then
            echo "::error::No deploy id returned"
            echo "$DEPLOY"
            exit 1
          fi
          echo "Deploy triggered: $DEPLOY_ID"
          # Poll up to 10 minutes for live status.
          for i in $(seq 1 20); do
            sleep 30
            STATUS=$(curl -sS \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
              | jq -r '.status // "unknown"')
            echo "  [$i/20] $STATUS"
            case "$STATUS" in
              live) echo "Deploy LIVE — new admin/owner seed passwords are in effect."; exit 0 ;;
              build_failed|update_failed|canceled|deactivated)
                echo "::error::Deploy failed: $STATUS"; exit 1 ;;
            esac
          done
          echo "::warning::Deploy still running after 10min — check Render."

      - name: Smoke-test new admin login (does NOT echo password)
        run: |
          set -euo pipefail
          # Verify the new password actually authenticates. We do NOT log the
          # password — just the resulting HTTP status. Login form posts to /login
          # with username=admin, password=<env>, _csrf=<token>.
          BASE="https://solarpro-global.onrender.com"
          JAR=$(mktemp)
          TOKEN_HTML=$(curl -sS -c "$JAR" "$BASE/login" -m 15)
          # Extract CSRF token from the login form (best-effort).
          CSRF=$(echo "$TOKEN_HTML" | grep -oE 'name="_csrf"[^>]*value="[^"]+"' | head -1 | sed -E 's/.*value="([^"]+)".*/\1/')
          if [ -z "$CSRF" ]; then
            echo "::warning::Could not extract CSRF token — skipping login smoke test."
            exit 0
          fi
          HTTP=$(curl -sS -b "$JAR" -c "$JAR" -o /dev/null -w "%{http_code}" \
            -X POST "$BASE/login" \
            --data-urlencode "username=admin" \
            --data-urlencode "password=$SOLARPRO_ADMIN_PASSWORD" \
            --data-urlencode "_csrf=$CSRF" \
            -m 15)
          echo "Login response: HTTP $HTTP (200/302 = OK)"
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "302" ]; then
            echo "::error::Admin login smoke test failed (HTTP $HTTP)"
            exit 1
          fi
