# Switch the live solarpro realm to use the custom 'solarpro' login theme.
#
# Why this workflow exists:
#   * realm-prod.json + docs/keycloak/realm-export.json both set
#     loginTheme="solarpro", but KC only reads the import file on FIRST
#     boot. After that, the realm lives in Postgres and only PATCH via
#     the admin REST API can change it.
#   * Run AFTER `Deploy Keycloak` rebuilds the image -- the new theme
#     directory at /opt/keycloak/themes/solarpro/ must be present before
#     the realm can reference it (else KC silently falls back to the
#     parent theme).
#
# Safe to re-run: PATCH is idempotent. Verifies before+after state.

name: Set KC Realm Theme

on:
  workflow_dispatch:
    inputs:
      login_theme:
        description: "Login theme name (must exist at /opt/keycloak/themes/<name>/)"
        required: false
        default: "solarpro"

permissions:
  contents: read

jobs:
  set-theme:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      KEYCLOAK_ISSUER: ${{ secrets.KEYCLOAK_ISSUER }}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.KC_BOOTSTRAP_ADMIN_PASSWORD }}
      LOGIN_THEME: ${{ github.event.inputs.login_theme }}
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install --quiet requests

      - name: PATCH realm.loginTheme
        run: |
          python3 << 'PY'
          import os, sys, requests
          BASE = os.environ['KEYCLOAK_ISSUER'].rsplit('/realms/', 1)[0]
          ADM = os.environ['KC_BOOTSTRAP_ADMIN_PASSWORD']
          THEME = os.environ['LOGIN_THEME'] or 'solarpro'

          tok = requests.post(
              f"{BASE}/realms/master/protocol/openid-connect/token",
              data={"client_id":"admin-cli","grant_type":"password",
                    "username":"admin","password":ADM},
              timeout=10).json()["access_token"]
          H = {"Authorization": f"Bearer {tok}", "Content-Type":"application/json"}

          before = requests.get(f"{BASE}/admin/realms/solarpro", headers=H).json()
          themes = ("loginTheme","accountTheme","adminTheme","emailTheme")
          print("before:", {k: before.get(k) for k in themes})

          r = requests.put(
              f"{BASE}/admin/realms/solarpro",
              headers=H,
              json={"loginTheme": THEME},
              timeout=10)
          if r.status_code not in (204, 200):
              sys.stderr.write(f"PUT failed: {r.status_code}: {r.text[:300]}\n")
              sys.exit(1)

          after = requests.get(f"{BASE}/admin/realms/solarpro", headers=H).json()
          print("after :", {k: after.get(k) for k in themes})

          if after.get("loginTheme") != THEME:
              sys.stderr.write(f"loginTheme did NOT take effect (got {after.get('loginTheme')!r})\n")
              sys.exit(1)
          print(f"OK -- loginTheme={THEME!r}")
          PY

      - name: Smoke -- render the OIDC auth page and look for theme markers
        env:
          KEYCLOAK_ISSUER: ${{ secrets.KEYCLOAK_ISSUER }}
          LOGIN_THEME: ${{ github.event.inputs.login_theme }}
        run: |
          # solarpro-web client requires PKCE (code_challenge_method=S256)
          # per realm-export.json. A bare GET without code_challenge gets
          # KC's 400 "Missing parameter: code_challenge_method" so we must
          # generate a valid PKCE pair before requesting the auth page.
          python3 << 'PY'
          import os, sys, secrets, hashlib, base64, urllib.parse, requests

          issuer = os.environ['KEYCLOAK_ISSUER'].rstrip('/')
          theme  = os.environ.get('LOGIN_THEME') or 'solarpro'

          # PKCE per RFC 7636 -- urlsafe-base64(sha256(verifier)), no '=' pad.
          verifier  = secrets.token_urlsafe(64)
          digest    = hashlib.sha256(verifier.encode('ascii')).digest()
          challenge = base64.urlsafe_b64encode(digest).rstrip(b'=').decode('ascii')

          params = {
              'client_id':            'solarpro-web',
              'response_type':        'code',
              'scope':                'openid profile email',
              'redirect_uri':         'https://solarpro.aiappinvent.com/auth/callback',
              'state':                secrets.token_urlsafe(16),
              'nonce':                secrets.token_urlsafe(16),
              'code_challenge':       challenge,
              'code_challenge_method':'S256',
          }
          url = f"{issuer}/protocol/openid-connect/auth?" + urllib.parse.urlencode(params)
          print(f"GET {url[:120]}...")

          r = requests.get(url, timeout=20, allow_redirects=True,
                           headers={'User-Agent': 'SetKCRealmTheme-Smoke/1.0'})
          print(f"final URL: {r.url[:140]}")
          print(f"status: {r.status_code} bytes: {len(r.text)}")
          if r.status_code != 200:
              sys.stderr.write(f"::error::auth page returned {r.status_code} -- expected 200\n")
              sys.stderr.write(r.text[:400] + '\n')
              sys.exit(1)

          html = r.text
          theme_path = f"/login/{theme}/css/"
          markers = {
              f"theme path '{theme_path}' present":  theme_path in html,
              "loginTheme name in HTML":             theme in html,
              "linked stylesheet present":           '<link' in html and 'login.css' in html,
          }
          for k, v in markers.items():
              print(f"  {'OK' if v else 'MISS'} -- {k}")

          if not markers[f"theme path '{theme_path}' present"]:
              sys.stderr.write("::warning::theme path missing in rendered HTML; KC may still be loading the new pod\n")
              # Don't fail the workflow on this -- PATCH succeeded and the
              # pod may need 30-60s to pick up the theme directory.
          else:
              print(f"OK -- '{theme}' theme is live on the rendered login page")
          PY
