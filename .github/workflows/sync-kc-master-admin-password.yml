# One-off: align KC master-realm admin password with SOLARPRO_ADMIN_PASSWORD.
#
# Today there are two distinct admin credentials:
#   KC master admin    `admin` / KC_BOOTSTRAP_ADMIN_PASSWORD (GH Secret)
#   SolarPro admin     `admin` / SOLARPRO_ADMIN_PASSWORD     (GH Secret)
# Owner wants ONE password for both surfaces. This workflow:
#   1. Authenticates against KC master realm using the CURRENT
#      KC_BOOTSTRAP_ADMIN_PASSWORD (master-cli password grant).
#   2. Relaxes the master realm's passwordPolicy to `length(8)` if the
#      existing policy would reject the SolarPro passphrase
#      (typically lower-case-only 4-word hyphenated phrases; the actual
#      value comes from the SOLARPRO_ADMIN_PASSWORD secret, never inline).
#   3. PUTs /reset-password on the master-realm admin user with the
#      SOLARPRO_ADMIN_PASSWORD plaintext, temporary=false.
#   4. Updates the Render env var KC_BOOTSTRAP_ADMIN_PASSWORD =
#      SOLARPRO_ADMIN_PASSWORD so KC keeps the new value on next
#      container restart (env-var-driven bootstrap admin is otherwise
#      re-applied at boot).
#
# After this completes, the owner / I must ALSO update the GH Secret
# KC_BOOTSTRAP_ADMIN_PASSWORD to match SOLARPRO_ADMIN_PASSWORD --
# otherwise the next run of `Sync KC Seed Passwords` (which uses the
# GH Secret to auth) will fail with 401.
#
# Idempotent. Re-running is safe.
#
# Triggered manually:
#   gh workflow run "Sync KC Master Admin Password"

name: Sync KC Master Admin Password

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      KEYCLOAK_BASE_URL:          https://auth.aiappinvent.com
      RENDER_API_KEY:             ${{ secrets.RENDER_API_KEY }}
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.KC_BOOTSTRAP_ADMIN_PASSWORD }}
      SOLARPRO_ADMIN_PASSWORD:    ${{ secrets.SOLARPRO_ADMIN_PASSWORD }}
    steps:
      - name: Sanity-check secrets
        run: |
          set -e
          [ -n "$KC_BOOTSTRAP_ADMIN_PASSWORD" ] || { echo "KC_BOOTSTRAP_ADMIN_PASSWORD missing"; exit 1; }
          [ -n "$SOLARPRO_ADMIN_PASSWORD" ]    || { echo "SOLARPRO_ADMIN_PASSWORD missing"; exit 1; }
          [ -n "$RENDER_API_KEY" ]              || { echo "RENDER_API_KEY missing"; exit 1; }
          echo "All required secrets present."

      - name: Align master-realm admin password with SolarPro
        run: |
          python3 <<'PY'
          import os, sys, json, urllib.request, urllib.parse, urllib.error
          BASE  = os.environ["KEYCLOAK_BASE_URL"].rstrip("/")
          ADM_U = os.environ["KC_BOOTSTRAP_ADMIN_USERNAME"]
          ADM_P = os.environ["KC_BOOTSTRAP_ADMIN_PASSWORD"]   # CURRENT
          NEW_P = os.environ["SOLARPRO_ADMIN_PASSWORD"]       # DESIRED

          def http(method, url, data=None, headers=None, timeout=20):
              req = urllib.request.Request(url, data=data, method=method,
                                            headers=headers or {})
              try:
                  return urllib.request.urlopen(req, timeout=timeout)
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8","replace")[:600]
                  print(f"HTTP {e.code} on {method} {url}: {body}", file=sys.stderr)
                  raise

          # 1. master-realm admin token via admin-cli password grant
          tok = http("POST",
                     f"{BASE}/realms/master/protocol/openid-connect/token",
                     data=urllib.parse.urlencode({
                         "grant_type":"password","client_id":"admin-cli",
                         "username":ADM_U,"password":ADM_P,
                     }).encode(),
                     headers={"Content-Type":"application/x-www-form-urlencoded"})
          access = json.loads(tok.read())["access_token"]
          print("Got master admin token.")
          h = {"Authorization": f"Bearer {access}"}

          # 2. Relax master realm passwordPolicy if it would reject NEW_P.
          rrep = http("GET", f"{BASE}/admin/realms/master", headers=h)
          realm = json.loads(rrep.read())
          current_policy = realm.get("passwordPolicy") or ""
          # If the policy contains upperCase / specialChars / digits and
          # NEW_P doesn't have those, switch to length(8).
          def policy_demands_strict(pol, plaintext):
              p = pol or ""
              if "upperCase" in p and not any(c.isupper() for c in plaintext):
                  return True
              if "lowerCase" in p and not any(c.islower() for c in plaintext):
                  return True
              if "digits" in p and not any(c.isdigit() for c in plaintext):
                  return True
              if "specialChars" in p and not any(not c.isalnum() for c in plaintext):
                  return True
              return False
          if policy_demands_strict(current_policy, NEW_P):
              realm["passwordPolicy"] = "length(8)"
              http("PUT", f"{BASE}/admin/realms/master",
                   data=json.dumps(realm).encode(),
                   headers={**h, "Content-Type":"application/json"})
              print(f"  [ok] master realm passwordPolicy '{current_policy}' -> 'length(8)'")
          else:
              print(f"  [have] master realm passwordPolicy '{current_policy}' already accepts NEW_P")

          # 3. Look up the admin user in master realm
          q = urllib.parse.urlencode({"username": ADM_U, "exact": "true"})
          r = http("GET", f"{BASE}/admin/realms/master/users?{q}", headers=h)
          users = json.loads(r.read())
          if not users:
              print(f"NO master admin user named '{ADM_U}'"); sys.exit(2)
          uid = users[0]["id"]
          print(f"  master admin uid: {uid}")

          # 4. Reset the master admin password
          http("PUT",
               f"{BASE}/admin/realms/master/users/{uid}/reset-password",
               data=json.dumps({"type":"password","value":NEW_P,"temporary":False}).encode(),
               headers={**h, "Content-Type":"application/json"})
          print("  [ok] master admin password reset to SOLARPRO_ADMIN_PASSWORD value")

          # 5. Verify by acquiring a NEW token with the NEW password
          try:
              http("POST",
                   f"{BASE}/realms/master/protocol/openid-connect/token",
                   data=urllib.parse.urlencode({
                       "grant_type":"password","client_id":"admin-cli",
                       "username":ADM_U,"password":NEW_P,
                   }).encode(),
                   headers={"Content-Type":"application/x-www-form-urlencoded"})
              print("  [ok] verified: master admin login works with new password")
          except urllib.error.HTTPError as e:
              print(f"  [fail] verification login with new password returned {e.code}")
              raise
          PY

      - name: Push new password into Render service env vars
        run: |
          python3 <<'PY'
          import os, json, urllib.request, urllib.parse
          API = "https://api.render.com/v1"
          KEY = os.environ["RENDER_API_KEY"]
          NEW = os.environ["SOLARPRO_ADMIN_PASSWORD"]

          def http(method, path, data=None):
              req = urllib.request.Request(API+path,
                  data=json.dumps(data).encode() if data is not None else None,
                  method=method,
                  headers={"Authorization":f"Bearer {KEY}",
                           "Content-Type":"application/json",
                           "Accept":"application/json"})
              return urllib.request.urlopen(req, timeout=20)

          # Find solarpro-keycloak service
          svc_id = None
          # Render REST returns a list of {service:...} dicts; ?limit=100 for safety
          page = json.loads(http("GET", "/services?limit=100").read())
          for entry in (page if isinstance(page,list) else []):
              s = entry.get("service", entry)
              if s.get("name") == "solarpro-keycloak":
                  svc_id = s.get("id"); break
          if not svc_id:
              print("[fail] solarpro-keycloak service not found"); raise SystemExit(2)
          print(f"  service id: {svc_id}")

          # Get current env vars (?limit=100 -- the same gotcha as
          # feedback-solar-deploy-keycloak-destructive-env)
          envs = json.loads(http("GET", f"/services/{svc_id}/env-vars?limit=100").read())
          # Render returns [{envVar: {key, value}}, ...]
          flat = [(e.get("envVar",e).get("key"), e.get("envVar",e).get("value")) for e in envs]
          new_block = []
          updated = False
          for k,v in flat:
              if k == "KC_BOOTSTRAP_ADMIN_PASSWORD":
                  new_block.append({"key":k, "value":NEW}); updated=True
              else:
                  new_block.append({"key":k, "value":v})
          if not updated:
              # If KC_BOOTSTRAP_ADMIN_PASSWORD isn't in env yet, add it
              new_block.append({"key":"KC_BOOTSTRAP_ADMIN_PASSWORD","value":NEW})
              print("  [add] KC_BOOTSTRAP_ADMIN_PASSWORD added to Render env vars")
          else:
              print("  [ok]  KC_BOOTSTRAP_ADMIN_PASSWORD updated in Render env vars")

          # PUT bulk replace
          req = urllib.request.Request(API + f"/services/{svc_id}/env-vars",
              data=json.dumps(new_block).encode(),
              method="PUT",
              headers={"Authorization":f"Bearer {KEY}",
                       "Content-Type":"application/json",
                       "Accept":"application/json"})
          urllib.request.urlopen(req, timeout=30)
          print(f"  [done] Render env vars saved ({len(new_block)} keys)")
          print()
          print("NEXT MANUAL STEP: update the GH Secret KC_BOOTSTRAP_ADMIN_PASSWORD")
          print("to match SOLARPRO_ADMIN_PASSWORD so future workflow runs use the")
          print("new value (this workflow can't write its own auth secret).")
          PY
        env:
          RENDER_API_KEY:          ${{ secrets.RENDER_API_KEY }}
          SOLARPRO_ADMIN_PASSWORD: ${{ secrets.SOLARPRO_ADMIN_PASSWORD }}
