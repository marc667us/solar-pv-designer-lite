# Sync the two SEED users' passwords (admin, marc667us) into Keycloak so
# the KC OIDC login flow accepts the same passwords that the legacy
# /login?legacy=1 flow does.
#
# Why this workflow exists:
#   scripts/migrate_users_to_keycloak.py deliberately does NOT carry the
#   bcrypt hash across (per Phase 4.8 + FOSS rule) -- regular users get a
#   "set your password" email from KC on first login. But the two SEED
#   accounts (admin, marc667us) need to remain usable for ops + the
#   owner without an email round-trip. This workflow pushes the plaintext
#   passwords stored in GH Secrets (the same ones web_app.py reads via
#   SOLARPRO_*_PASSWORD on every boot to keep the legacy hashes in sync)
#   into the KC user credentials so KC login works immediately.
#
# Idempotent. Sets `temporary: false` so KC does NOT prompt for a fresh
# reset on first login. Safe to re-run after every password rotation.
#
# Triggered manually:
#   gh workflow run "Sync KC Seed Passwords"
#
# Implementation:
#   1. Use KC master-realm admin-cli password grant to get an admin token.
#   2. GET /admin/realms/solarpro/users?username=<seed> for each seed.
#   3. PUT /admin/realms/solarpro/users/<id>/reset-password with
#      {type:"password", value:"<plaintext from GH secret>", temporary:false}
#   4. Report which users were synced.

name: Sync KC Seed Passwords

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      KEYCLOAK_BASE_URL: https://auth.aiappinvent.com
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.KC_BOOTSTRAP_ADMIN_PASSWORD }}
      SOLARPRO_ADMIN_PASSWORD:     ${{ secrets.SOLARPRO_ADMIN_PASSWORD }}
      SOLARPRO_OWNER_PASSWORD:     ${{ secrets.SOLARPRO_OWNER_PASSWORD }}
    steps:
      - name: Sanity-check required secrets
        run: |
          set -e
          [ -n "$KC_BOOTSTRAP_ADMIN_PASSWORD" ] || { echo "KC_BOOTSTRAP_ADMIN_PASSWORD missing"; exit 1; }
          [ -n "$SOLARPRO_ADMIN_PASSWORD" ]     || { echo "SOLARPRO_ADMIN_PASSWORD missing"; exit 1; }
          [ -n "$SOLARPRO_OWNER_PASSWORD" ]     || { echo "SOLARPRO_OWNER_PASSWORD missing"; exit 1; }
          echo "All secrets present."

      - name: Sync admin + marc667us passwords into KC
        run: |
          python3 <<'PY'
          import os, sys, json, urllib.request, urllib.parse, urllib.error
          BASE = os.environ["KEYCLOAK_BASE_URL"].rstrip("/")
          ADM_U= os.environ["KC_BOOTSTRAP_ADMIN_USERNAME"]
          ADM_P= os.environ["KC_BOOTSTRAP_ADMIN_PASSWORD"]
          REALM= "solarpro"
          SEEDS = [
              # (username, email, first_name, last_name, plaintext password, [realm roles])
              ("admin",     "support@aiappinvent.com",   "Solar",   "Admin",
               os.environ["SOLARPRO_ADMIN_PASSWORD"],
               ["platform_super_admin", "tenant_admin"]),
              ("marc667us", "marc667us@yahoo.com",       "Marc",    "Owner",
               os.environ["SOLARPRO_OWNER_PASSWORD"],
               ["platform_super_admin", "tenant_admin"]),
          ]

          def http(method, url, data=None, headers=None, timeout=20):
              req = urllib.request.Request(
                  url, data=data, method=method,
                  headers=headers or {})
              try:
                  return urllib.request.urlopen(req, timeout=timeout)
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8","replace")[:500]
                  print(f"HTTP {e.code} on {method} {url}: {body}", file=sys.stderr)
                  raise

          # 1. Admin token via master-realm admin-cli password grant
          tok_url = f"{BASE}/realms/master/protocol/openid-connect/token"
          tok = http("POST", tok_url,
                     data=urllib.parse.urlencode({
                         "grant_type": "password",
                         "client_id":  "admin-cli",
                         "username":   ADM_U,
                         "password":   ADM_P,
                     }).encode(),
                     headers={"Content-Type":"application/x-www-form-urlencoded"})
          access = json.loads(tok.read())["access_token"]
          print("Admin token acquired.")

          auth_hdr = {"Authorization": f"Bearer {access}"}

          # 1a. Relax the realm password policy. Default realm-export.json
          # set "upperCase(1) and digits(1)" which rejected the all-lowercase
          # 4-word passphrases SolarPro stores in SOLARPRO_*_PASSWORD. Drop
          # to just length(8) so legacy + KC accept the same plaintext.
          # PUT to /admin/realms/<realm> takes a full realm representation;
          # GET first, mutate one key, PUT back.
          rrep = http("GET", f"{BASE}/admin/realms/{REALM}", headers=auth_hdr)
          realm_obj = json.loads(rrep.read())
          current_policy = realm_obj.get("passwordPolicy") or ""
          if current_policy != "length(8)":
              realm_obj["passwordPolicy"] = "length(8)"
              http("PUT", f"{BASE}/admin/realms/{REALM}",
                   data=json.dumps(realm_obj).encode(),
                   headers={**auth_hdr, "Content-Type":"application/json"})
              print(f"  [ok]   realm passwordPolicy: '{current_policy}' -> 'length(8)'")
          else:
              print(f"  [have] realm passwordPolicy already 'length(8)'")

          # 2. For each seed: ensure user exists, then reset password, then assign roles.
          def find_user(username=None, email=None):
              q = {}
              if username: q["username"] = username
              if email:    q["email"]    = email
              q["exact"] = "true"
              r = http("GET", f"{BASE}/admin/realms/{REALM}/users?{urllib.parse.urlencode(q)}",
                       headers=auth_hdr)
              users = json.loads(r.read())
              return users[0]["id"] if users else None

          def create_user(username, email, first, last):
              body = json.dumps({
                  "username":      username,
                  "email":         email,
                  "firstName":     first,
                  "lastName":      last,
                  "enabled":       True,
                  "emailVerified": True,
              }).encode()
              try:
                  r = http("POST", f"{BASE}/admin/realms/{REALM}/users",
                           data=body,
                           headers={**auth_hdr, "Content-Type":"application/json"})
                  loc = r.headers.get("Location") or ""
                  return loc.rsplit("/", 1)[-1]
              except urllib.error.HTTPError as e:
                  if e.code != 409:
                      raise
                  # Conflict: user already exists by username or email. Try
                  # to look up by email (covers the case where the username
                  # search returned None due to casing / encoding quirks).
                  uid = find_user(email=email) or find_user(username=username)
                  if not uid:
                      raise SystemExit(
                          f"409 creating '{username}' but can't find by email '{email}' either"
                      )
                  return uid

          # Pre-fetch realm roles for assignment.
          rr = http("GET", f"{BASE}/admin/realms/{REALM}/roles", headers=auth_hdr)
          all_roles = {r["name"]: r for r in json.loads(rr.read())}

          for username, email, first, last, plaintext, role_names in SEEDS:
              uid = find_user(username=username) or find_user(email=email)
              if not uid:
                  uid = create_user(username, email, first, last)
                  print(f"  [new]  created KC user '{username}' (uid={uid})")
              else:
                  print(f"  [have] KC user '{username}' already exists (uid={uid})")

              # Reset password (temporary:false so no first-login prompt)
              body = json.dumps({
                  "type":      "password",
                  "value":     plaintext,
                  "temporary": False,
              }).encode()
              http("PUT", f"{BASE}/admin/realms/{REALM}/users/{uid}/reset-password",
                   data=body,
                   headers={**auth_hdr, "Content-Type":"application/json"})
              print(f"  [ok]   synced KC password for '{username}'")

              # Read back the credential list to confirm the password
              # entry actually persisted.
              cred = http("GET", f"{BASE}/admin/realms/{REALM}/users/{uid}/credentials",
                          headers=auth_hdr)
              creds = json.loads(cred.read())
              pw_creds = [c for c in creds if c.get("type") == "password"]
              print(f"  [chk]  user '{username}' has {len(pw_creds)} password credential(s); types: {[c.get('type') for c in creds]}")

              # Ensure user is enabled + email verified + no required actions
              # left over from creation (a leftover UPDATE_PASSWORD action
              # would force a reset on next login and KC would reject the
              # plaintext we just set).
              urep = http("GET", f"{BASE}/admin/realms/{REALM}/users/{uid}",
                          headers=auth_hdr).read()
              uobj = json.loads(urep)
              dirty = False
              if not uobj.get("enabled"):       uobj["enabled"] = True;        dirty = True
              if not uobj.get("emailVerified"): uobj["emailVerified"] = True;  dirty = True
              if uobj.get("requiredActions"):
                  print(f"  [chk]  clearing requiredActions: {uobj['requiredActions']}")
                  uobj["requiredActions"] = []; dirty = True
              if dirty:
                  http("PUT", f"{BASE}/admin/realms/{REALM}/users/{uid}",
                       data=json.dumps(uobj).encode(),
                       headers={**auth_hdr, "Content-Type":"application/json"})
                  print(f"  [ok]   normalised flags on '{username}' (enabled+verified, no requiredActions)")

              # Clear brute-force lockout (my earlier wrong-password probes
              # may have temp-disabled the account; KC's default flow is
              # to silently reject auth as 'Invalid username or password'
              # while a brute-force lockout is in effect, which looks
              # identical to a wrong password).
              try:
                  http("DELETE",
                       f"{BASE}/admin/realms/{REALM}/attack-detection/brute-force/users/{uid}",
                       headers=auth_hdr)
                  print(f"  [ok]   cleared brute-force lockout on '{username}'")
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      print(f"  [info] no brute-force record for '{username}' (clean)")
                  else:
                      raise

              # Assign realm roles (silently skip any that don't exist).
              wanted = [all_roles[n] for n in role_names if n in all_roles]
              missing = [n for n in role_names if n not in all_roles]
              if wanted:
                  http("POST",
                       f"{BASE}/admin/realms/{REALM}/users/{uid}/role-mappings/realm",
                       data=json.dumps(wanted).encode(),
                       headers={**auth_hdr, "Content-Type":"application/json"})
                  print(f"  [ok]   assigned roles to '{username}': {[r['name'] for r in wanted]}")
              if missing:
                  print(f"  [warn] realm roles not found (skipped): {missing}")

          print("Done.")
          PY
