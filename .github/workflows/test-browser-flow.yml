# Drive the live campaign portal in a real Chromium browser and verify
# that login + dashboard actually work end-to-end (not just the API).
# Rewritten 2026-06-07 per quality-gate work-schedule Phase 5 + 0.4:
# - Uses @playwright/test with expect() assertions (not console.log)
# - Pinned Playwright version + npm ci (Phase 3.8)
# - Credentials from GitHub Actions secrets, not plaintext (Phase 0.1)
# - Element waits, not fixed sleeps (Phase 5.3)
# - Enumerates every visible tab (Phase 5.2)
# - Daily schedule + PR trigger (Phase 5.4)
name: Test browser flow
on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC daily
  pull_request:
    branches: [master]
    paths:
      - 'tests/browser/**'
      - '.github/workflows/test-browser-flow.yml'
      - 'campaign_api.py'
      - 'web_app.py'
jobs:
  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/browser
    env:
      CAMPAIGN_TEST_EMAIL: ${{ secrets.CAMPAIGN_TEST_EMAIL }}
      CAMPAIGN_TEST_PASSWORD: ${{ secrets.CAMPAIGN_TEST_PASSWORD }}
      PORTAL_BASE_URL: ${{ vars.PORTAL_BASE_URL || 'https://marc667us.github.io/campaign-portal/' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/browser/package-lock.json
      - name: Install pinned Playwright
        run: npm ci
      - name: Install Chromium with deps
        run: npx playwright install --with-deps chromium
      - name: Run portal smoke suite
        run: npx playwright test --reporter=list
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: portal-test-report
          path: |
            tests/browser/playwright-report/**
            tests/browser/test-results/**
          retention-days: 14
