# Drive the live campaign portal in a real Chromium browser and verify
# that login + dashboard actually work end-to-end (not just the API).
# Uploads screenshots so we can see exactly what the user is seeing.
name: Test browser flow
on: { workflow_dispatch: }
jobs:
  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install Playwright Chromium
        run: |
          npm init -y >/dev/null
          npm install playwright >/dev/null
          npx playwright install --with-deps chromium >/dev/null
      - name: Drive the portal — sign in, screenshot dashboard, click each tab
        run: |
          cat > test.js << 'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const ctx = await browser.newContext({ viewport: { width: 1400, height: 900 } });
            const page = await ctx.newPage();
            const log = [];
            page.on('console', m => log.push(`CONSOLE ${m.type()}: ${m.text()}`));
            page.on('pageerror', e => log.push(`PAGEERROR: ${e.message}`));

            console.log('1. Loading portal');
            await page.goto('https://marc667us.github.io/campaign-portal/?cb=' + Date.now(), { waitUntil: 'networkidle' });
            await page.screenshot({ path: '01-login.png', fullPage: true });

            console.log('2. Login screen present?');
            const signinCard = await page.$('#step-signin');
            console.log('   step-signin element:', signinCard ? 'YES' : 'NO');

            console.log('3. Fill credentials');
            await page.fill('#rep-email', 'marc667us@yahoo.com');
            await page.fill('#rep-password', 'ChangeMe2026/');
            await page.screenshot({ path: '02-filled.png', fullPage: true });

            console.log('4. Click Sign in');
            await page.click('#signin-btn');
            await page.waitForTimeout(3000);
            await page.screenshot({ path: '03-after-signin.png', fullPage: true });

            console.log('5. Product picker visible?');
            const productVisible = await page.$eval('#step-product', el => getComputedStyle(el).display !== 'none').catch(() => false);
            console.log('   product card visible:', productVisible);

            if (productVisible) {
              console.log('6. Pick product + Connect');
              await page.click('.product-card[data-id="solarpro-ghana"]');
              await page.waitForTimeout(500);
              await page.click('#connect-btn');
              await page.waitForTimeout(4000);
              await page.screenshot({ path: '04-dashboard.png', fullPage: true });
            }

            console.log('7. Dashboard visible?');
            const loginHidden = await page.$eval('#login', el => el.classList.contains('hidden')).catch(() => false);
            console.log('   login overlay hidden:', loginHidden);

            console.log('8. Check KPI values + chart canvases');
            const kpis = {};
            for (const s of ['INVITED','CONTACTED','SIGNED UP','ACTIVE','FEEDBACK','NURTURED','PAID']) {
              kpis[s] = await page.$eval(`#kpi-${CSS.escape(s).replace(/\\\\ /g,' ')}`, el => el.textContent).catch(() => 'n/a');
            }
            console.log('   KPIs:', JSON.stringify(kpis));
            const canvases = await page.$$eval('canvas', els => els.map(e => ({ id: e.id, w: e.width, h: e.height })));
            console.log('   chart canvases:', JSON.stringify(canvases));

            console.log('9. Try clicking Customers tab');
            await page.click('.tab[data-tab="entities"]');
            await page.waitForTimeout(800);
            await page.screenshot({ path: '05-customers.png', fullPage: true });
            const rowCount = await page.$$eval('#entity-tbody tr', rs => rs.length);
            console.log('   customer rows visible:', rowCount);

            console.log('10. Try clicking Admin tab');
            await page.click('.tab[data-tab="admin"]');
            await page.waitForTimeout(500);
            await page.screenshot({ path: '06-admin.png', fullPage: true });

            console.log('--- console + page errors ---');
            log.forEach(l => console.log(l));

            await browser.close();
          })();
          EOF
          node test.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: portal-screenshots
          path: '*.png'
