# End-to-end smoke test of the post-cutover login flow.
#
# Why this workflow exists:
#   After cutover, /auth/login on solar -> KC -> /auth/callback on solar.
#   We've curl-verified the 302 chain, but the callback's token exchange
#   + session-cookie write only works under a real browser (cookies,
#   redirects, JavaScript redirect interceptors). Playwright handles
#   the full ceremony.
#
# Flow:
#   1. Admin-API call sets a temporary password on the marc667us KC
#      user AND removes the UPDATE_PASSWORD required action so the
#      smoke test isn't blocked by the first-login wizard.
#   2. Playwright launches headless chromium, hits
#      https://solarpro.aiappinvent.com/login, follows redirects to KC,
#      fills the form, submits, follows the callback back to solar.
#   3. Asserts: final URL is /dashboard AND a solar session cookie is set.
#   4. Re-locks the marc667us account: re-add UPDATE_PASSWORD required
#      action AND rotate the password to a fresh random value (we
#      print it for owner's records).
#
# Production safety:
#   * Only touches the marc667us user (owner account; well-known).
#   * Always re-applies UPDATE_PASSWORD on cleanup so the temporary
#     password we used can't accidentally persist as a real cred.
#   * No new data written to solar -- read-only browse to /dashboard.

name: Test KC Login

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      KEYCLOAK_ISSUER: ${{ secrets.KEYCLOAK_ISSUER }}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.KC_BOOTSTRAP_ADMIN_PASSWORD }}
      SOLAR_BASE: https://solarpro.aiappinvent.com
      TEST_USERNAME: marc667us
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + chromium
        run: |
          set -e
          python -m pip install --quiet --upgrade pip
          pip install --quiet requests playwright
          python -m playwright install --with-deps chromium

      - name: Fetch admin token
        id: tok
        run: |
          set -e
          BASE=$(echo "$KEYCLOAK_ISSUER" | sed 's|/realms/.*||')
          TOKEN=$(curl -fsS -X POST \
            "${BASE}/realms/master/protocol/openid-connect/token" \
            -d "client_id=admin-cli" -d "grant_type=password" \
            -d "username=admin" \
            --data-urlencode "password=${KC_BOOTSTRAP_ADMIN_PASSWORD}" \
            | python3 -c "import json,sys;print(json.load(sys.stdin)['access_token'])")
          echo "::add-mask::$TOKEN"
          echo "value=$TOKEN" >> $GITHUB_OUTPUT
          echo "base=$BASE" >> $GITHUB_OUTPUT

      - name: Find marc667us user id + remove UPDATE_PASSWORD action
        id: user
        env:
          TOKEN: ${{ steps.tok.outputs.value }}
          BASE: ${{ steps.tok.outputs.base }}
        run: |
          set -e
          USER_ID=$(curl -fsS -H "Authorization: Bearer $TOKEN" \
            "$BASE/admin/realms/solarpro/users?username=$TEST_USERNAME&exact=true" \
            | python3 -c "import json,sys;print(json.load(sys.stdin)[0]['id'])")
          echo "user id: $USER_ID"
          echo "id=$USER_ID" >> $GITHUB_OUTPUT
          # PUT the user with requiredActions=[] so the login flow skips
          # the "update password" wizard during this smoke.
          curl -fsS -X PUT \
            "$BASE/admin/realms/solarpro/users/$USER_ID" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"requiredActions":[]}'

      - name: Set temporary password
        id: pwd
        env:
          TOKEN: ${{ steps.tok.outputs.value }}
          BASE: ${{ steps.tok.outputs.base }}
          USER_ID: ${{ steps.user.outputs.id }}
        run: |
          set -e
          # Generate a fresh password each run -- realm's history(5) policy
          # rejects any of the last 5 passwords for the user. 24 urlsafe
          # chars + sentinel suffix satisfies length(12), digits, upper,
          # lower, special policies.
          PWD="$(python3 -c "import secrets;print(secrets.token_urlsafe(20))")Aa1!"
          echo "::add-mask::$PWD"
          PAYLOAD=$(python3 -c "import os,json;print(json.dumps({'type':'password','value':os.environ['PWD'],'temporary':False}))" PWD="$PWD")
          # Pipe payload via stdin to avoid leaking via process args.
          HTTP=$(echo "$PAYLOAD" | curl -sS -o /tmp/pwd.json -w "%{http_code}" -X PUT \
            "$BASE/admin/realms/solarpro/users/$USER_ID/reset-password" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @-)
          echo "HTTP $HTTP"
          cat /tmp/pwd.json
          echo
          if [ "$HTTP" != "204" ] && [ "$HTTP" != "200" ]; then
            echo "::error::reset-password returned $HTTP"; exit 1
          fi
          echo "temp password set on $TEST_USERNAME"
          echo "value=$PWD" >> $GITHUB_OUTPUT

      - name: Run Playwright login flow
        id: play
        env:
          TEST_PWD: ${{ steps.pwd.outputs.value }}
        run: |
          cat > /tmp/login_test.py << 'PY'
          import os, sys
          from playwright.sync_api import sync_playwright

          SOLAR = os.environ['SOLAR_BASE']
          USER  = os.environ['TEST_USERNAME']
          PWD   = os.environ['TEST_PWD']

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context()
              page = context.new_page()

              print(f"GET {SOLAR}/login")
              page.goto(f"{SOLAR}/login", wait_until="domcontentloaded", timeout=60000)
              print(f"  landed: {page.url}")
              assert "auth.aiappinvent.com" in page.url, \
                  f"expected KC, got {page.url}"

              # KC standard login form: input#username + input#password + button#kc-login
              page.fill("input#username", USER)
              page.fill("input#password", PWD)
              print("  submitting credentials")
              page.click("input#kc-login")
              page.wait_for_load_state("domcontentloaded", timeout=60000)
              print(f"  post-login: {page.url}")

              # Expect we're back on solar's dashboard (or /).
              # Some flows may need an extra redirect tick.
              if "solarpro.aiappinvent.com" not in page.url:
                  print(f"  WARN: not on solar yet: {page.url}")
                  page.wait_for_url(lambda u: "solarpro.aiappinvent.com" in u, timeout=15000)

              final = page.url
              print(f"  final URL: {final}")

              # Look for either /dashboard or a known logged-in marker.
              cookies = context.cookies()
              session_cookies = [c['name'] for c in cookies if 'session' in c['name'].lower() or c['name'].startswith('solarpro')]
              print(f"  cookies that look session-ish: {session_cookies}")

              # Hit the dashboard explicitly to confirm we're authenticated.
              page.goto(f"{SOLAR}/dashboard", wait_until="domcontentloaded", timeout=30000)
              body = page.content()
              # Solar's dashboard contains the username when logged in.
              if USER not in body and "Sign in" in body:
                  print("FAIL -- dashboard shows Sign in form, not authenticated")
                  print(body[:500])
                  sys.exit(1)
              print("OK -- /dashboard accessible after KC login")

              browser.close()
          PY
          python /tmp/login_test.py

      - name: Cleanup -- rotate password + re-arm UPDATE_PASSWORD
        if: always()
        env:
          TOKEN: ${{ steps.tok.outputs.value }}
          BASE: ${{ steps.tok.outputs.base }}
          USER_ID: ${{ steps.user.outputs.id }}
        run: |
          set -e
          NEW=$(python3 -c "import secrets;print(secrets.token_urlsafe(32))")
          echo "::add-mask::$NEW"
          curl -fsS -X PUT \
            "$BASE/admin/realms/solarpro/users/$USER_ID/reset-password" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(printf '{"type":"password","value":"%s","temporary":true}' "$NEW")"
          curl -fsS -X PUT \
            "$BASE/admin/realms/solarpro/users/$USER_ID" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"requiredActions":["UPDATE_PASSWORD"]}'
          echo "rotated to random temp + re-armed UPDATE_PASSWORD"
