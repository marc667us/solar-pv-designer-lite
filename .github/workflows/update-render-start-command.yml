name: Update Render Start Command

# Render ignores the Procfile when the service has an explicit startCommand in
# its config (set at create time). This workflow PATCHes that startCommand via
# the Render API and triggers a redeploy so it takes effect. Use it to change
# gunicorn flags (e.g. --timeout) on the live free-tier service.
on:
  workflow_dispatch:
    inputs:
      start_command:
        description: 'gunicorn start command to set as the Render startCommand'
        required: true
        default: 'gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300 --graceful-timeout 30'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: PATCH startCommand, verify, and redeploy
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          START:             ${{ inputs.start_command }}
        run: |
          set -euo pipefail

          echo "=== BEFORE ==="
          curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID" \
            | python3 -m json.tool | grep -E '"startCommand"' || true

          # --arg keeps $PORT literal (no shell expansion), matching create-render-service.yml
          jq -n --arg start "$START" \
            '{serviceDetails:{envSpecificDetails:{startCommand:$start}}}' > /tmp/patch.json
          echo "=== PATCH payload ==="; cat /tmp/patch.json

          HTTP=$(curl -s -o /tmp/patch_resp.json -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID" \
            --data @/tmp/patch.json)
          echo "PATCH HTTP $HTTP"; python3 -m json.tool < /tmp/patch_resp.json | head -60 || cat /tmp/patch_resp.json
          if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then echo "::error::PATCH failed"; exit 1; fi

          echo "=== AFTER (verify) ==="
          curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID" \
            | python3 -m json.tool | grep -E '"startCommand"'

          echo "=== trigger redeploy so the new startCommand takes effect ==="
          HTTP2=$(curl -s -o /tmp/deploy_resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            --data '{"clearCache":"do_not_clear"}')
          echo "DEPLOY HTTP $HTTP2"; python3 -m json.tool < /tmp/deploy_resp.json | grep -E '"id"|"status"' | head || cat /tmp/deploy_resp.json
          if [ "$HTTP2" -lt 200 ] || [ "$HTTP2" -ge 300 ]; then echo "::error::deploy trigger failed"; exit 1; fi
          echo "Done. Deploy triggered; watch it in the Render dashboard or via Get Render Deploy Logs."
