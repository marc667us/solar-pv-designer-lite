# Local Keycloak + Postgres stack for SolarPro authentication migration.
#
# Phase 1 of docs/SECURITY_MIGRATION_KEYCLOAK.md. NOT for production --
# production uses k8s manifests (planned at k8s/keycloak/). This stack
# is purely for:
#   - local development
#   - Phase 2-6 integration tests
#   - smoke-testing the realm export before staging cutover
#
# Bring up:
#   bash scripts/keycloak/bootstrap.sh
# Tear down:
#   bash scripts/keycloak/teardown.sh
#
# The realm import file at docs/keycloak/realm-export.json defines:
#   - realm `solarpro`
#   - 17 roles (13 base + 4 composite aliases)
#   - 10 clients (5 core + 5 AI agent service accounts)
#   - 7 top-level groups (Platform Admins, Marketplace Admins,
#     Engineering Firms/, Suppliers/, Procurement Teams/, Customers,
#     AI Agents)
#   - 13 test users covering every role with credential
#     "Test1234!Test" (forced password change on first login)

services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: solarpro-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak-dev}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: solarpro-keycloak
    restart: unless-stopped
    environment:
      # Bootstrap admin user -- the master-realm root admin.
      # Replace at production deploy with a Vault-fetched value.
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-StrongAdminPassword!Replace}

      # Persistence -- Postgres in the sibling container.
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak-dev}

      # HTTP / hostname -- dev mode only. Production uses HTTPS at the LB.
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY: edge

      # Metrics + health for observability (matches production K8s spec).
      KC_METRICS_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"

      # Logging -- structured JSON makes it easy to ship to Loki later.
      KC_LOG: console
      KC_LOG_LEVEL: INFO
      KC_LOG_CONSOLE_OUTPUT: default

    command: ["start-dev", "--import-realm"]

    volumes:
      # Realm import directory -- Keycloak reads any *.json on first
      # start with the --import-realm flag.
      - ./docs/keycloak:/opt/keycloak/data/import:ro

    ports:
      - "8080:8080"        # HTTP frontend + admin
      - "9000:9000"        # metrics + health

    depends_on:
      keycloak-db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:9000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  keycloak-db-data:
    name: solarpro-keycloak-db-data

# Network: implicit default bridge -- both containers share it via the
# service-name DNS resolution (keycloak resolves keycloak-db).
