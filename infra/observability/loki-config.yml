# Minimal Loki monolithic config (single binary, local filesystem
# storage) tuned for a small-traffic Solar service. Production-grade
# Loki splits into ingester/distributor/querier roles backed by S3;
# that's a Phase-7 ops upgrade.

auth_enabled: false

server:
  http_listen_port: 3100
  log_level: info

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2026-06-26
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 720h           # 30 days; tune by audit horizon
  max_query_length: 0s             # default; raise if dashboards lag
  reject_old_samples: true
  reject_old_samples_max_age: 168h # 7 days

compactor:
  working_directory: /loki/compactor
  compaction_interval: 5m

analytics:
  reporting_enabled: false
