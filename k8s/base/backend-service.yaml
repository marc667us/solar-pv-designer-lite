---
# SolarPro Global — Backend Service (internal load balancing across backend pods)

apiVersion: v1
kind: Service
metadata:
  name: solarpro-backend-service
  namespace: solar-production
  labels:
    app.kubernetes.io/name: solarpro
    app.kubernetes.io/component: backend
    app: solarpro-backend
  annotations:
    # Prometheus scraping
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "5000"
spec:
  type: ClusterIP               # Internal only — Ingress handles external traffic
  selector:
    app: solarpro-backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
  sessionAffinity: None         # Stateless — any pod can handle any request
