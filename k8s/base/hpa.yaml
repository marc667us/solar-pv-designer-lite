---
# SolarPro Global — Horizontal Pod Autoscaler
# Scales backend pods 3 → 20 based on CPU + memory utilization

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: solarpro-backend-hpa
  namespace: solar-production
  labels:
    app.kubernetes.io/name: solarpro
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: solarpro-backend

  minReplicas: 3       # production minimum
  maxReplicas: 20      # max burst capacity

  metrics:
    # Scale up when average CPU > 65%
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65

    # Scale up when average memory > 75%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60     # wait 1 min before scaling up again
      policies:
        - type: Pods
          value: 3                        # add up to 3 pods at a time
          periodSeconds: 60
        - type: Percent
          value: 50                       # or 50% of current replicas
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 300    # wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1                        # remove 1 pod at a time
          periodSeconds: 120
      selectPolicy: Min

---
# Celery worker HPA — scales queue workers with backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: solarpro-celery-hpa
  namespace: solar-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: solarpro-celery-worker

  minReplicas: 2
  maxReplicas: 10

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600   # 10 min — let running jobs finish
