---
# SolarPro Global — Ingress Controller
# Routes external traffic:
#   /api/* → solarpro-backend-service (Flask API)
#   /*     → solarpro-backend-service (Flask handles all routes — no separate frontend pod)
# TLS terminated at Ingress (cert-manager)

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: solarpro-ingress
  namespace: solar-production
  labels:
    app.kubernetes.io/name: solarpro
    app.kubernetes.io/component: ingress
  annotations:
    # nginx ingress controller
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/use-regex: "true"

    # TLS — cert-manager issues Let's Encrypt cert
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # CORS for API
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://solarpro.aiappinvent.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,X-CSRF-Token"

    # Upload size limit (for file exports)
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"

    # Timeouts for AI/heavy requests
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"

spec:
  tls:
    - hosts:
        - solarpro.aiappinvent.com
      secretName: solarpro-tls-cert

  rules:
    - host: solarpro.aiappinvent.com
      http:
        paths:
          # Health checks (unauthenticated, used by load balancer)
          - path: /api/health
            pathType: Prefix
            backend:
              service:
                name: solarpro-backend-service
                port:
                  number: 80

          # API routes → backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: solarpro-backend-service
                port:
                  number: 80

          # All other routes → backend (Flask handles routing)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: solarpro-backend-service
                port:
                  number: 80
