---
# SolarPro Global — Secret Template
# DO NOT commit real values. Use this as a reference.
# Real secrets injected via:
#   - GitHub Actions → Kubernetes Secrets (CI/CD pipeline)
#   - kubectl create secret generic solarpro-secrets --from-env-file=.env.production
#
# Values must be base64-encoded: echo -n "value" | base64

apiVersion: v1
kind: Secret
metadata:
  name: solarpro-secrets
  namespace: solar-production       # overridden per env
  labels:
    app.kubernetes.io/name: solarpro
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # ---------- Application ----------
  SECRET_KEY: "REPLACE_WITH_STRONG_SECRET_KEY_32_CHARS_MIN"

  # ---------- Database ----------
  # Neon PostgreSQL pooled connection (use pooler URL for multi-pod apps)
  DATABASE_URL: "postgresql://user:password@ep-example-pooler.us-east-2.aws.neon.tech/solarpro_db?sslmode=require"
  DATABASE_URL_DEV: "postgresql://user:password@ep-example-pooler.neon.tech/solarpro_dev?sslmode=require"

  # ---------- Redis ----------
  REDIS_URL: "redis://:password@redis-service:6379/0"

  # ---------- AI APIs ----------
  ANTHROPIC_API_KEY: "REPLACE_WITH_ANTHROPIC_KEY"
  OPENROUTER_API_KEY: "REPLACE_WITH_OPENROUTER_KEY"
  GITHUB_MODELS_TOKEN: "REPLACE_WITH_GITHUB_TOKEN"

  # ---------- Payments ----------
  PAYSTACK_SECRET_KEY: "REPLACE_WITH_PAYSTACK_SECRET"
  PAYSTACK_PUBLIC_KEY: "REPLACE_WITH_PAYSTACK_PUBLIC"
  STRIPE_SECRET_KEY: "REPLACE_WITH_STRIPE_SECRET"
  STRIPE_WEBHOOK_SECRET: "REPLACE_WITH_STRIPE_WEBHOOK_SECRET"

  # ---------- Email ----------
  RESEND_API_KEY: "REPLACE_WITH_RESEND_KEY"
  SMTP_HOST: "mail.privateemail.com"
  SMTP_PORT: "465"
  SMTP_USER: "support@aiappinvent.com"
  SMTP_PASS: "REPLACE_WITH_SMTP_PASSWORD"
  SMTP_FROM: "support@aiappinvent.com"

  # ---------- Monitoring ----------
  SENTRY_DSN: "REPLACE_WITH_SENTRY_DSN"

  # ---------- Admin ----------
  ADMIN_INITIAL_PASSWORD: "REPLACE_WITH_STRONG_ADMIN_PASSWORD"
