---
# SolarPro Global — Development environment overlay (Kustomize)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: solar-dev

resources:
  - ../base
  # NOTE: HPA pulled from base but deleted in the patches block below
  # so dev runs with fixed replicas.

patches:
  # Dev: drop the HPA — fixed-replica deployment is enough
  - patch: |-
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: solarpro-backend-hpa
    target:
      kind: HorizontalPodAutoscaler
      name: solarpro-backend-hpa

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: solarpro-backend

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: solarpro-celery-worker

  - patch: |-
      - op: replace
        path: /data/APP_ENV
        value: development
      - op: replace
        path: /data/LOG_LEVEL
        value: DEBUG
      - op: replace
        path: /data/SENTRY_TRACES_SAMPLE_RATE
        value: "0.0"
    target:
      kind: ConfigMap
      name: solarpro-config

  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: solarpro-dev.aiappinvent.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: solarpro-dev.aiappinvent.com
    target:
      kind: Ingress
      name: solarpro-ingress

commonLabels:
  environment: development

images:
  - name: ghcr.io/marc667us/solarpro-backend
    newTag: dev-latest
