<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-label="SolarPro Global">
  <defs>
    <linearGradient id="sp-sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="sp-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <!-- Sun rays -->
  <g stroke="url(#sp-sun)" stroke-width="2" stroke-linecap="round">
    <line x1="20" y1="6"  x2="20" y2="2"/>
    <line x1="20" y1="38" x2="20" y2="34"/>
    <line x1="4"  y1="20" x2="0"  y2="20"/>
    <line x1="40" y1="20" x2="36" y2="20"/>
    <line x1="9"  y1="9"  x2="6"  y2="6"/>
    <line x1="34" y1="9"  x2="31" y2="6"/>
    <line x1="9"  y1="31" x2="6"  y2="34"/>
    <line x1="34" y1="31" x2="31" y2="34"/>
  </g>
  <!-- Sun disc -->
  <circle cx="20" cy="20" r="9" fill="url(#sp-sun)"/>
  <!-- Solar panel -->
  <g transform="translate(28 32) rotate(-12)">
    <rect x="0" y="0" width="34" height="22" rx="2" fill="url(#sp-panel)" stroke="#f59e0b" stroke-width="1"/>
    <!-- panel grid -->
    <line x1="11.3" y1="0" x2="11.3" y2="22" stroke="#f59e0b" stroke-width="0.6" opacity="0.5"/>
    <line x1="22.6" y1="0" x2="22.6" y2="22" stroke="#f59e0b" stroke-width="0.6" opacity="0.5"/>
    <line x1="0" y1="7.3"  x2="34" y2="7.3"  stroke="#f59e0b" stroke-width="0.6" opacity="0.5"/>
    <line x1="0" y1="14.6" x2="34" y2="14.6" stroke="#f59e0b" stroke-width="0.6" opacity="0.5"/>
  </g>
</svg>
