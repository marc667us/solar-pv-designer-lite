---
# SolarPro Global — Prometheus Alert Rules

groups:

  - name: solarpro-backend
    rules:
      # Backend down
      - alert: SolarProBackendDown
        expr: up{job="solarpro-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SolarPro backend is DOWN"
          description: "Backend pod {{ $labels.instance }} has been down for 1 minute."

      # High error rate (5xx > 5%)
      - alert: HighErrorRate
        expr: |
          rate(flask_http_request_total{status=~"5.."}[5m])
          / rate(flask_http_request_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on SolarPro backend"
          description: "Error rate is {{ $value | humanizePercentage }} over last 5 minutes."

      # Slow response time (p95 > 3s)
      - alert: SlowResponseTime
        expr: |
          histogram_quantile(0.95,
            rate(flask_http_request_duration_seconds_bucket[5m])
          ) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow API response time"
          description: "P95 response time is {{ $value }}s — above 3s threshold."

      # Too many pods restarting
      - alert: PodRestartLoop
        expr: |
          increase(kube_pod_container_status_restarts_total{
            namespace=~"solar-.*"
          }[15m]) > 3
        labels:
          severity: critical
        annotations:
          summary: "Pod restart loop detected in {{ $labels.namespace }}"

  - name: solarpro-redis
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is DOWN — cache and queue unavailable"

      - alert: RedisHighMemory
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage above 85%"
          description: "Redis memory at {{ $value | humanizePercentage }}"

  - name: solarpro-security
    rules:
      # Brute force: >20 failed logins in 5 minutes
      - alert: BruteForceLoginAttempt
        expr: |
          increase(solarpro_failed_logins_total[5m]) > 20
        labels:
          severity: critical
        annotations:
          summary: "Possible brute-force login attack detected"
          description: "{{ $value }} failed login attempts in 5 minutes."

      # Tenant isolation violation
      - alert: TenantIsolationViolation
        expr: |
          increase(solarpro_tenant_violations_total[5m]) > 0
        labels:
          severity: critical
        annotations:
          summary: "Tenant isolation violation detected"
          description: "{{ $value }} cross-tenant access attempts blocked."

  - name: solarpro-celery
    rules:
      - alert: CeleryQueueBacklog
        expr: celery_queue_length > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Celery queue backlog growing"
          description: "{{ $value }} tasks waiting in queue."

      - alert: CeleryWorkerDown
        expr: celery_workers_online == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "No Celery workers online"
