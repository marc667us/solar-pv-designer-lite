[build]
# DOCKERFILE preferred over NIXPACKS so we get reproducible Python 3.12-slim
# with libpq + non-root user already configured.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# 1 worker fits Railway free-tier 512MB RAM; gunicorn binds to $PORT (Railway env)
startCommand = "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
# /api/ping is exempted from Flask-Limiter so Railway health checks don't 429
healthcheckPath = "/api/ping"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
