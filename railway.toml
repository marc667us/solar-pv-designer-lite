[build]
# DOCKERFILE preferred over NIXPACKS so we get reproducible Python 3.12-slim
# with libpq + non-root user already configured.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# 1 worker fits Railway free-tier 512MB RAM. Wrap in `sh -c` so $PORT (Railway-injected)
# is expanded by the shell — without the wrapper Railway passes the literal "$PORT" string
# to gunicorn which then errors with "not a valid port number".
startCommand = "sh -c 'gunicorn wsgi:app --bind 0.0.0.0:${PORT:-5000} --workers 1 --timeout 120'"
# /api/ping is exempted from Flask-Limiter so Railway health checks don't 429
healthcheckPath = "/api/ping"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
