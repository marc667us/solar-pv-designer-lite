services:
  - type: web
    name: solarpro-global
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from dotenv import load_dotenv; load_dotenv(); from waitress import serve; from web_app import app, init_db; init_db(); serve(app, host='0.0.0.0', port=int(__import__('os').environ.get('PORT',5000)), threads=8)"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_MODE
        value: "true"
    disk:
      name: solar-db
      mountPath: /opt/render/project/src
      sizeGB: 1
