services:
  - type: web
    name: solarpro-global
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_MODE
        value: "true"
    disk:
      name: solar-db
      mountPath: /opt/render/project/src
      sizeGB: 1
