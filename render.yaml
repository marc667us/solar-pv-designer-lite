services:
  - type: web
    name: solarpro-global
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "from web_app import app, init_db; print('Import OK')"
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /api/ping
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_MODE
        value: "true"
      - key: ANTHROPIC_API_KEY
        sync: false
    disk:
      name: solar-db-v2
      mountPath: /opt/render/project/src/data
      sizeGB: 1
