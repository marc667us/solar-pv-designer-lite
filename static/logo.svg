<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 52" fill="none">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Sun circle + rays ── -->
  <circle cx="26" cy="26" r="10" fill="url(#sunGrad)" filter="url(#glow)"/>

  <!-- Rays (8 directions) -->
  <g stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.85">
    <line x1="26" y1="8"  x2="26" y2="13"/>   <!-- top -->
    <line x1="26" y1="39" x2="26" y2="44"/>   <!-- bottom -->
    <line x1="8"  y1="26" x2="13" y2="26"/>   <!-- left -->
    <line x1="39" y1="26" x2="44" y2="26"/>   <!-- right -->
    <line x1="13.7" y1="13.7" x2="17.2" y2="17.2"/>  <!-- top-left -->
    <line x1="34.8" y1="34.8" x2="38.3" y2="38.3"/>  <!-- bottom-right -->
    <line x1="38.3" y1="13.7" x2="34.8" y2="17.2"/>  <!-- top-right -->
    <line x1="17.2" y1="34.8" x2="13.7" y2="38.3"/>  <!-- bottom-left -->
  </g>

  <!-- ── Mini solar panel grid (bottom-right of icon area) ── -->
  <g transform="translate(33, 30)" opacity="0.9">
    <!-- Panel backing -->
    <rect x="0" y="0" width="14" height="10" rx="1.5" fill="url(#panelGrad)" opacity="0.25"/>
    <!-- Grid lines horizontal -->
    <line x1="0" y1="3.3" x2="14" y2="3.3" stroke="#0ea5e9" stroke-width="0.6" opacity="0.7"/>
    <line x1="0" y1="6.6" x2="14" y2="6.6" stroke="#0ea5e9" stroke-width="0.6" opacity="0.7"/>
    <!-- Grid lines vertical -->
    <line x1="4.7" y1="0" x2="4.7" y2="10" stroke="#0ea5e9" stroke-width="0.6" opacity="0.7"/>
    <line x1="9.3" y1="0" x2="9.3" y2="10" stroke="#0ea5e9" stroke-width="0.6" opacity="0.7"/>
    <!-- Outer border -->
    <rect x="0" y="0" width="14" height="10" rx="1.5" fill="none" stroke="#0ea5e9" stroke-width="0.8"/>
  </g>

  <!-- ── Wordmark ── -->
  <text x="56" y="22" font-family="'Segoe UI',Arial,sans-serif" font-weight="900"
        font-size="18" letter-spacing="-0.3" fill="url(#textGrad)">SolarPro</text>
  <text x="56" y="38" font-family="'Segoe UI',Arial,sans-serif" font-weight="700"
        font-size="13" letter-spacing="2.5" fill="#5a8aaa" opacity="0.9">GLOBAL</text>

  <!-- ── Tagline underline accent ── -->
  <line x1="56" y1="42" x2="136" y2="42" stroke="url(#textGrad)" stroke-width="1.2" opacity="0.35"/>
</svg>
