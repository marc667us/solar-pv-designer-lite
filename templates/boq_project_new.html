{% extends "base.html" %}
{% block title %}New BOQ Project{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3">
  <h5 class="fw-black mb-0"><i class="bi bi-plus-circle text-warning me-1"></i>New BOQ Project</h5>
  <a href="{{ url_for('boq_projects_list') }}" class="text-secondary small">Back to BOQ projects</a>
</div>

<div class="solar-card p-4">
  <form method="POST">
    <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label small text-secondary">Project name *</label>
        <input class="form-control" name="project_name" required maxlength="300">
      </div>
      <div class="col-md-6">
        <label class="form-label small text-secondary">Client name</label>
        <input class="form-control" name="client_name" maxlength="300">
      </div>
      <div class="col-md-6">
        <label class="form-label small text-secondary">Project location</label>
        <input class="form-control" name="location" placeholder="City, region, country" maxlength="300">
      </div>
      <div class="col-md-6">
        <label class="form-label small text-secondary">Project type</label>
        <select class="form-select" name="project_type">
          <option value="single_building">Single building</option>
          <option value="multiple_buildings">Multiple buildings</option>
          <option value="campus">Campus</option>
          <option value="estate">Estate</option>
        </select>
      </div>
      <div class="col-md-6">
        <div class="form-check mt-3">
          <input class="form-check-input" type="checkbox" name="external_works_included" id="ew">
          <label class="form-check-label small" for="ew">External works included</label>
        </div>
      </div>
      <div class="col-md-6">
        <div class="form-check mt-3">
          <input class="form-check-input" type="checkbox" name="infrastructure_included" id="inf">
          <label class="form-check-label small" for="inf">Infrastructure included</label>
        </div>
      </div>
    </div>
    <hr class="my-4" style="border-color:#1e1e3a">
    <div class="text-secondary small mb-3">Next step after save: add the first building (purpose, subtype, number of floors).</div>
    <button class="btn btn-warning fw-bold"><i class="bi bi-arrow-right-circle me-1"></i>Create project &amp; add building</button>
  </form>
</div>
{% endblock %}
