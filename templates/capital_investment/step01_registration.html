{% extends "base.html" %}
{% block title %}Step 1 - Project Registration{% endblock %}
{% block content %}
<div class="mb-3">
  <h5 class="fw-bold mb-0"><i class="bi bi-clipboard-plus text-warning me-1"></i>Step 1 &mdash; Project Registration</h5>
  <div class="text-secondary small">Register the legal &amp; commercial identity of the generation-station project.</div>
</div>

<form method="post" action="{{ url_for('capital_investment_new') }}" class="card bg-dark border-secondary">
  <input type="hidden" name="_csrf" value="{{ session.get('_csrf', '') }}">
  <div class="card-body">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label small">Project name *</label>
        <input name="project_name" class="form-control form-control-sm" required maxlength="300"
               placeholder="e.g. Tema 20 MWp Solar Farm">
      </div>
      <div class="col-md-6">
        <label class="form-label small">Project type</label>
        <select name="project_type" class="form-select form-select-sm">
          <option value="">Select&hellip;</option>
          {% for code, label, icon in project_types %}<option value="{{ code }}">{{ label }}</option>{% endfor %}
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label small">Client</label>
        <input name="client_name" class="form-control form-control-sm" maxlength="300">
      </div>
      <div class="col-md-4">
        <label class="form-label small">Investor</label>
        <input name="investor" class="form-control form-control-sm" maxlength="300">
      </div>
      <div class="col-md-4">
        <label class="form-label small">Developer</label>
        <input name="developer" class="form-control form-control-sm" maxlength="300">
      </div>
      <div class="col-md-4">
        <label class="form-label small">Country</label>
        <input name="country" class="form-control form-control-sm" value="Ghana" maxlength="120">
      </div>
      <div class="col-md-4">
        <label class="form-label small">Region</label>
        <input name="region" class="form-control form-control-sm" maxlength="120">
      </div>
      <div class="col-md-4">
        <label class="form-label small">District</label>
        <input name="district" class="form-control form-control-sm" maxlength="120">
      </div>
      <div class="col-md-3">
        <label class="form-label small">GPS latitude</label>
        <input name="gps_lat" type="number" step="any" class="form-control form-control-sm">
      </div>
      <div class="col-md-3">
        <label class="form-label small">GPS longitude</label>
        <input name="gps_lon" type="number" step="any" class="form-control form-control-sm">
      </div>
      <div class="col-md-3">
        <label class="form-label small">Target capacity (MWp)</label>
        <input name="target_mwp" type="number" step="any" min="0" class="form-control form-control-sm">
      </div>
      <div class="col-md-3">
        <label class="form-label small">Target COD</label>
        <input name="target_cod" class="form-control form-control-sm" placeholder="2028-06" maxlength="40">
      </div>
      <div class="col-md-4">
        <label class="form-label small">Project status</label>
        <select name="project_status" class="form-select form-select-sm">
          {% for code, label in project_statuses %}<option value="{{ code }}">{{ label }}</option>{% endfor %}
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label small">Design standard</label>
        <select name="design_standard" class="form-select form-select-sm">
          {% for code, label in design_standards %}<option value="{{ code }}">{{ label }}</option>{% endfor %}
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label small">Currency</label>
        <select name="currency" class="form-select form-select-sm">
          {% for code, label in currencies %}<option value="{{ code }}">{{ code }}</option>{% endfor %}
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label small">Tax regime</label>
        <select name="tax_regime" class="form-select form-select-sm">
          {% for code, label in tax_regimes %}<option value="{{ code }}">{{ label }}</option>{% endfor %}
        </select>
      </div>
      <div class="col-12">
        <label class="form-label small">Description</label>
        <textarea name="description" class="form-control form-control-sm" rows="2" maxlength="4000"></textarea>
      </div>
    </div>
  </div>
  <div class="card-footer d-flex justify-content-between">
    <a href="{{ url_for('capital_investment_landing') }}" class="btn btn-outline-secondary btn-sm">Cancel</a>
    <button class="btn btn-warning btn-sm fw-bold" type="submit">Register &amp; continue <i class="bi bi-arrow-right ms-1"></i></button>
  </div>
</form>
{% endblock %}
