{% extends "base.html" %}
{% block title %}{{ code }} — {{ title }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:55vh">
  <div class="text-center" style="max-width:480px">

    <div style="font-size:80px;font-weight:900;line-height:1;
                background:linear-gradient(135deg,var(--solar-gold),var(--solar-orange));
                -webkit-background-clip:text;-webkit-text-fill-color:transparent;
                background-clip:text;margin-bottom:8px">
      {{ code }}
    </div>

    <h3 class="fw-bold mb-3">{{ title }}</h3>
    <p class="text-secondary mb-4">{{ message }}</p>

    <div class="d-flex gap-3 justify-content-center flex-wrap">
      {% if user %}
      <a href="{{ url_for('dashboard') }}" class="btn btn-solar px-4">
        <i class="bi bi-grid-3x3-gap me-1"></i> Dashboard
      </a>
      {% else %}
      <a href="{{ url_for('landing') }}" class="btn btn-solar px-4">
        <i class="bi bi-house me-1"></i> Home
      </a>
      {% endif %}
      <button onclick="history.back()" class="btn btn-outline-secondary px-4">
        <i class="bi bi-arrow-left me-1"></i> Go Back
      </button>
    </div>

  </div>
</div>
{% endblock %}
