{% extends "base.html" %}
{% block title %}Add product — {{ supplier.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="text-secondary small mb-1"><a href="{{ url_for('supplier_dashboard') }}" class="text-warning">Dashboard</a> / <a href="{{ url_for('supplier_products') }}" class="text-warning">Products</a> / Add</div>
    <h5 class="fw-black mb-3">Add a new product</h5>

    <div class="solar-card p-4">
      <form method="POST" action="{{ url_for('supplier_product_add') }}">
        <input type="hidden" name="_csrf" value="{{ csrf_token() }}">

        <div class="row g-3 mb-3">
          <div class="col-md-12">
            <label class="form-label small text-secondary">Product name *</label>
            <input class="form-control" name="name" required placeholder="ABB 500 kVA Distribution Transformer">
          </div>
          <div class="col-md-6">
            <label class="form-label small text-secondary">Brand</label>
            <input class="form-control" name="brand" placeholder="ABB">
          </div>
          <div class="col-md-6">
            <label class="form-label small text-secondary">Model</label>
            <input class="form-control" name="model" placeholder="TRF-500-DT">
          </div>
          <div class="col-md-6">
            <label class="form-label small text-secondary">Category *</label>
            <select class="form-select" name="category_id" required>
              <option value="">Select category</option>
              {% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label small text-secondary">Subcategory</label>
            <input class="form-control" name="subcategory" placeholder="Distribution">
          </div>
          <div class="col-md-12">
            <label class="form-label small text-secondary">Specification</label>
            <textarea class="form-control" name="spec" rows="3" placeholder="500 kVA, 11/0.433 kV, Dyn11, ONAN, IEC 60076"></textarea>
          </div>
          <div class="col-md-3">
            <label class="form-label small text-secondary">Unit</label>
            <input class="form-control" name="unit" value="No." placeholder="No.">
          </div>
          <div class="col-md-5">
            <label class="form-label small text-secondary">Unit price (USD) *</label>
            <input type="number" step="0.01" class="form-control" name="price_usd" required min="0" placeholder="9800.00">
          </div>
          <div class="col-md-4">
            <label class="form-label small text-secondary">Lead time (days)</label>
            <input type="number" class="form-control" name="lead_time_days" value="30" min="0">
          </div>
        </div>

        <div class="d-flex gap-2 justify-content-end">
          <a href="{{ url_for('supplier_products') }}" class="btn btn-outline-secondary">Cancel</a>
          <button type="submit" class="btn btn-warning fw-bold px-4"><i class="bi bi-check2-circle me-1"></i>Add product</button>
        </div>
      </form>
    </div>

    <div class="text-secondary small text-center mt-3">
      <i class="bi bi-info-circle me-1"></i>New products are reviewed by our team before appearing on the public marketplace.
    </div>
  </div>
</div>
{% endblock %}
